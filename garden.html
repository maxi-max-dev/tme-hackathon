<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>音乐花园 · 一首歌长成一片能上手玩的活世界</title>
<style>
  :root{
    --ink:#f3f0ff; --muted:#a7a3c4; --line:rgba(255,255,255,.10); --glass:rgba(20,18,34,.55);
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#07060e;color:var(--ink);font-family:var(--font);}
  #scene{position:fixed;inset:0;display:block;width:100vw;height:100vh;touch-action:none;cursor:crosshair;}

  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    text-align:center;padding:24px;z-index:10;transition:opacity .6s ease;}
  .overlay.hidden{opacity:0;pointer-events:none;}

  #intro .kicker{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
  #intro h1{font-size:clamp(27px,5.6vw,52px);font-weight:800;margin:0 0 14px;
    background:linear-gradient(120deg,#fff,#c9bcff 55%,#7ad7ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #intro p.sub{color:var(--muted);font-size:15.5px;margin:0 0 32px;max-width:460px;line-height:1.7;}
  .drop{width:min(440px,86vw);border:1.5px dashed rgba(255,255,255,.22);border-radius:22px;padding:28px 24px;
    background:rgba(255,255,255,.025);cursor:pointer;transition:.25s;backdrop-filter:blur(6px);}
  .drop:hover,.drop.hot{border-color:rgba(160,200,255,.7);background:rgba(120,160,255,.10);transform:translateY(-2px);}
  .drop .big{font-size:18px;font-weight:700;margin-bottom:6px;}
  .drop .small{font-size:12.5px;color:var(--muted);}
  .or{margin:24px 0 13px;color:var(--muted);font-size:12px;letter-spacing:.2em;}
  .seeds{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:560px;}
  .seed{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);padding:8px 15px;border-radius:999px;
    font-size:13.5px;cursor:pointer;transition:.18s;font-family:var(--font);}
  .seed:hover{background:rgba(255,255,255,.13);transform:translateY(-2px);}
  .seed .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;box-shadow:0 0 8px currentColor;}

  #hud{position:fixed;left:0;right:0;bottom:0;z-index:8;padding:16px 20px 18px;
    background:linear-gradient(180deg,transparent,rgba(6,5,14,.55));transition:opacity .5s,transform .5s;
    display:flex;flex-direction:column;gap:9px;align-items:center;}
  #hud.hidden{opacity:0;pointer-events:none;transform:translateY(14px);}
  .npline{display:flex;align-items:baseline;gap:11px;justify-content:center;flex-wrap:wrap;}
  .npname{font-size:15px;font-weight:700;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .npmood{font-size:12px;color:var(--muted);letter-spacing:.07em;}
  .bar{width:min(540px,82vw);height:3.5px;border-radius:4px;background:rgba(255,255,255,.14);overflow:hidden;}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#9b8cff,#7ad7ff);box-shadow:0 0 12px rgba(140,180,255,.7);}
  .ctrls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .btn{border:1px solid var(--line);background:var(--glass);color:var(--ink);backdrop-filter:blur(8px);border-radius:999px;
    padding:7px 14px;font-size:13px;cursor:pointer;transition:.18s;font-family:var(--font);}
  .btn:hover{background:rgba(255,255,255,.14);}
  .btn.primary{border-color:rgba(160,200,255,.5);background:rgba(120,160,255,.16);}

  #hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:8;font-size:12.5px;color:var(--muted);
    background:rgba(12,10,22,.5);border:1px solid var(--line);border-radius:999px;padding:6px 15px;backdrop-filter:blur(8px);
    transition:opacity .8s;pointer-events:none;}
  #hint.gone{opacity:0;}
  .toast{position:fixed;left:50%;top:20%;transform:translateX(-50%);background:rgba(20,18,34,.85);border:1px solid var(--line);
    padding:9px 18px;border-radius:999px;z-index:30;font-size:13.5px;backdrop-filter:blur(8px);transition:.5s;}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="overlay" id="intro">
  <div class="kicker">音 乐 花 园</div>
  <h1>一首歌，长成一片能上手玩的活世界</h1>
  <p class="sub">丢一首歌进来。它会一边放，一边长成只属于这首歌的活花园——而你能用手去拨它、扫它、逗它。它同时回应你的手和音乐。听过的歌，一首首攒进同一座有纵深的园子。</p>
  <label class="drop" id="drop">
    <div class="big">把歌拖进来，或点这里选一首</div>
    <div class="small">mp3 / wav / m4a / flac · 全在你本机播放，不上传</div>
    <input type="file" id="file" accept="audio/*" hidden>
  </label>
  <div class="or">— 或者，先试试这些 —</div>
  <div class="seeds" id="seeds"></div>
</div>

<div id="hint">挥动鼠标 / 手指去拨花草 · 按住地面拖动可在园子里走</div>

<div id="hud" class="hidden">
  <div class="npline"><span class="npname" id="npName">—</span><span class="npmood" id="npMood"></span></div>
  <div class="bar"><i id="npBar"></i></div>
  <div class="ctrls">
    <button class="btn" id="pauseBtn">暂停</button>
    <button class="btn" id="newBtn">换一首</button>
    <button class="btn" id="recenterBtn">回到这株</button>
  </div>
</div>

<script>
"use strict";
/* =========================================================================
   音乐花园 v2 — a song grows into a living world you can play with by hand.
   Single file. Canvas2D + WebAudio + spring physics. No deps.
   ========================================================================= */
const TAU=Math.PI*2;
const clamp=(x,a=0,b=1)=>x<a?a:x>b?b:x;
const lerp=(a,b,t)=>a+(b-a)*t;
const mix=lerp;
const easeOut=t=>1-Math.pow(1-t,3);
function mulberry32(s){let a=s>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function snoise(x){return Math.sin(x)*0.55+Math.sin(x*2.17+1.3)*0.3+Math.sin(x*4.7+4.1)*0.15;}
const hsl=(h,s,l,a=1)=>`hsla(${((h%360)+360)%360},${clamp(s,0,100)}%,${clamp(l,0,100)}%,${a})`;
function withA(c,a){if(c.indexOf('hsla')===0)return c.replace(/,[^,]+\)$/,`,${a})`);if(c.indexOf('hsl(')===0)return c.replace('hsl(','hsla(').replace(')',`,${a})`);return c;}
function parseHSL(c){const m=c.match(/hsla?\(([-\d.]+),\s*([-\d.]+)%,\s*([-\d.]+)%(?:,\s*([\d.]+))?\)/);return m?{h:+m[1],s:+m[2],l:+m[3],a:m[4]!=null?+m[4]:1}:null;}
function mixColor(a,b,t){const pa=parseHSL(a),pb=parseHSL(b);if(!pa||!pb)return a;let dh=pb.h-pa.h;if(dh>180)dh-=360;if(dh<-180)dh+=360;return hsl(pa.h+dh*t,lerp(pa.s,pb.s,t),lerp(pa.l,pb.l,t),lerp(pa.a,pb.a,t));}

const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d',{alpha:false});
let W=0,H=0,DPR=1,horizonY=0;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=W*DPR|0;canvas.height=H*DPR|0;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);horizonY=H*0.5;}
addEventListener('resize',resize);document.addEventListener('visibilitychange',()=>{if(!document.hidden)resize();});resize();

/* =========================================================================
   AUDIO
   ========================================================================= */
const Audio_={
  ac:null,src:null,analyser:null,buf:null,freq:null,startT:0,pauseT:0,playing:false,duration:0,
  bass:0,mid:0,treble:0,level:0,energyHist:[],beat:0,beatFlash:0,lastBeat:-1,
  ensure(){if(!this.ac)this.ac=new (window.AudioContext||window.webkitAudioContext)();if(this.ac.state==='suspended')this.ac.resume();},
  async load(ab){this.ensure();this.buf=await this.ac.decodeAudioData(ab);this.duration=this.buf.duration;return this.buf;},
  play(onEnd){
    this.stopNode();
    const s=this.ac.createBufferSource();s.buffer=this.buf;
    const an=this.ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.78;
    const g=this.ac.createGain();g.gain.value=0.9;
    s.connect(an);an.connect(g);g.connect(this.ac.destination);
    this.src=s;this.analyser=an;this.freq=new Uint8Array(an.frequencyBinCount);
    s.onended=()=>{if(this.playing&&this.curTime()>=this.duration-0.25){this.playing=false;onEnd&&onEnd();}};
    const off=this.pauseT||0;s.start(0,off);this.startT=this.ac.currentTime-off;this.playing=true;this.energyHist.length=0;
  },
  stopNode(){if(this.src){try{this.src.onended=null;this.src.stop();}catch(e){}this.src=null;}},
  pause(){if(!this.playing)return;this.pauseT=this.curTime();this.playing=false;this.stopNode();},
  resume(onEnd){if(this.playing)return;this.play(onEnd);},
  reset(){this.stopNode();this.playing=false;this.pauseT=0;this.startT=0;},
  curTime(){return this.playing?Math.min(this.duration,this.ac.currentTime-this.startT):(this.pauseT||0);},
  progress(){return this.duration?clamp(this.curTime()/this.duration):0;},
  sample(){
    if(!this.analyser){this.bass=this.mid=this.treble=this.level=0;this.beat=0;return;}
    this.analyser.getByteFrequencyData(this.freq);
    const f=this.freq,n=f.length;let b=0,m=0,t=0;const bE=8,mE=64,tE=Math.min(n,260);
    for(let i=1;i<bE;i++)b+=f[i];for(let i=bE;i<mE;i++)m+=f[i];for(let i=mE;i<tE;i++)t+=f[i];
    b/=(bE-1)*255;m/=(mE-bE)*255;t/=(tE-mE)*255;
    const k=this.playing?0.35:0.08;
    this.bass=mix(this.bass,b,k);this.mid=mix(this.mid,m,k);this.treble=mix(this.treble,t,k);
    this.level=mix(this.level,(b*1.1+m+t*0.8)/3,k);
    const e=b*1.4+m*0.6;const hist=this.energyHist;hist.push(e);if(hist.length>43)hist.shift();
    let avg=0;for(let i=0;i<hist.length;i++)avg+=hist[i];avg/=Math.max(1,hist.length);
    let vc=0;for(let i=0;i<hist.length;i++){const d=hist[i]-avg;vc+=d*d;}vc/=Math.max(1,hist.length);
    const th=avg*1.32+Math.sqrt(vc)*0.6+0.02;const now=this.ac.currentTime;this.beat=0;
    if(this.playing&&e>th&&now-this.lastBeat>0.16&&e>0.06){this.beat=clamp(e*1.4);this.beatFlash=1;this.lastBeat=now;}
    this.beatFlash*=0.90;
  }
};
function fingerprint(buf,name){
  const ch=buf.getChannelData(0),N=ch.length,step=Math.max(1,Math.floor(N/24000));
  let sumSq=0,hf=0,cnt=0,prev=0,hashAcc=2166136261^Math.floor(buf.duration*1000);
  const wc=64,env=new Float32Array(wc),perWin=Math.max(1,Math.floor(N/wc));
  for(let i=0;i<N;i+=step){const s=ch[i];sumSq+=s*s;hf+=Math.abs(s-prev);prev=s;cnt++;
    if((cnt&255)===0){hashAcc^=Math.floor(s*32768)&0xffff;hashAcc=Math.imul(hashAcc,16777619);}
    const w=Math.min(wc-1,Math.floor(i/perWin));env[w]+=s*s;}
  const rms=Math.sqrt(sumSq/Math.max(1,cnt));const bright=(hf/Math.max(1,cnt))/(rms+1e-4);
  let em=0;for(let i=0;i<wc;i++){env[i]=Math.sqrt(env[i]/perWin*step);em+=env[i];}em/=wc;
  let ev=0;for(let i=0;i<wc;i++){const d=env[i]-em;ev+=d*d;}ev=Math.sqrt(ev/wc);
  return{energy:clamp(rms*3.4),brightness:clamp(bright*0.62),dynamics:clamp((ev/(em+1e-4))*0.9),
         seed:(hashAcc^hashStr(name||'song'))>>>0,duration:buf.duration};
}

/* =========================================================================
   WORLD / SPECIES  (deterministic from fingerprint)
   ========================================================================= */
function warmHue(r){return[40,12,330,350,20][(r()*5)|0];}
function emberHue(r){return[12,24,0,345][(r()*4)|0];}
function coolHue(r){return[190,210,265,300,170][(r()*5)|0];}
const ARCHE={
  dawn:(r)=>({name:'晨曦',label:'平静 · 明亮',
    sky:[hsl(28,70,78),hsl(330,55,72),hsl(255,45,40)],
    light:{x:0.24,y:0.20,col:hsl(36,90,82),glow:hsl(40,95,72),r:1.0,kind:'sun'},
    hills:[hsl(285,28,30),hsl(305,22,22),hsl(320,18,15)],ground:[hsl(95,30,30),hsl(110,32,13)],
    plant:{stem:hsl(120,28,30),stemLit:hsl(95,45,55),leaf:hsl(115,42,42),leafLit:hsl(95,55,62),petal:hsl(340,75,72),petalCore:hsl(45,95,78)},
    fog:hsl(330,40,72),fogA:0.16,particle:'pollen',pCol:hsl(45,90,80),pRate:0.5,stars:0,godray:0.18,vignette:0.34,droopy:false}),
  sunlit:(r)=>({name:'盛日',label:'热烈 · 明亮',
    sky:[hsl(205,75,72),hsl(195,60,60),hsl(170,40,42)],
    light:{x:0.72,y:0.18,col:hsl(48,100,86),glow:hsl(50,100,76),r:1.15,kind:'sun'},
    hills:[hsl(150,30,32),hsl(160,28,23),hsl(170,24,16)],ground:[hsl(105,42,30),hsl(120,46,14)],
    plant:{stem:hsl(125,40,30),stemLit:hsl(100,60,56),leaf:hsl(120,52,42),leafLit:hsl(95,65,60),petal:hsl(warmHue(r),85,66),petalCore:hsl(52,100,80)},
    fog:hsl(190,40,70),fogA:0.10,particle:'firefly',pCol:hsl(52,100,80),pRate:0.85,stars:0,godray:0.30,vignette:0.30,droopy:false}),
  ember:(r)=>({name:'暮烬',label:'激烈 · 暗',
    sky:[hsl(15,65,30),hsl(345,60,22),hsl(265,50,12)],
    light:{x:0.5,y:0.30,col:hsl(28,95,64),glow:hsl(12,95,52),r:1.1,kind:'sun'},
    hills:[hsl(330,30,18),hsl(345,26,12),hsl(0,20,8)],ground:[hsl(20,35,16),hsl(0,30,7)],
    plant:{stem:hsl(15,30,22),stemLit:hsl(30,70,48),leaf:hsl(355,40,32),leafLit:hsl(25,75,52),petal:hsl(emberHue(r),90,58),petalCore:hsl(45,100,72)},
    fog:hsl(10,50,30),fogA:0.20,particle:'ember',pCol:hsl(25,95,60),pRate:1.0,stars:0,godray:0.34,vignette:0.46,lightning:0.4,droopy:false}),
  rain:(r)=>({name:'蓝雨',label:'平静 · 暗',
    sky:[hsl(215,40,40),hsl(220,38,26),hsl(230,35,12)],
    light:{x:0.66,y:0.16,col:hsl(210,40,68),glow:hsl(205,45,56),r:0.8,kind:'moon'},
    hills:[hsl(220,28,24),hsl(225,26,16),hsl(232,24,10)],ground:[hsl(200,24,20),hsl(220,28,9)],
    plant:{stem:hsl(205,22,30),stemLit:hsl(190,40,52),leaf:hsl(195,32,40),leafLit:hsl(180,45,56),petal:hsl(200,60,68),petalCore:hsl(185,70,80)},
    fog:hsl(215,35,52),fogA:0.22,particle:'rain',pCol:hsl(205,50,80),pRate:1.0,stars:0,godray:0,vignette:0.42,droopy:true}),
  gloom:(r)=>({name:'雾霭',label:'低沉 · 雾',
    sky:[hsl(250,18,46),hsl(255,16,32),hsl(260,18,16)],
    light:{x:0.38,y:0.22,col:hsl(250,25,70),glow:hsl(255,28,58),r:0.85,kind:'sun'},
    hills:[hsl(255,14,30),hsl(258,12,21),hsl(262,12,13)],ground:[hsl(250,12,22),hsl(258,14,11)],
    plant:{stem:hsl(255,14,30),stemLit:hsl(260,28,50),leaf:hsl(250,18,38),leafLit:hsl(265,32,54),petal:hsl(280,42,64),petalCore:hsl(300,55,76)},
    fog:hsl(255,20,58),fogA:0.34,particle:'spore',pCol:hsl(280,40,80),pRate:0.55,stars:0,godray:0.12,vignette:0.40,droopy:true}),
  twilight:(r)=>({name:'暮色',label:'流动 · 暮',
    sky:[hsl(265,55,40),hsl(300,45,30),hsl(225,50,14)],
    light:{x:0.74,y:0.22,col:hsl(40,90,80),glow:hsl(330,75,60),r:1.0,kind:'sun'},
    hills:[hsl(285,32,26),hsl(300,28,18),hsl(255,30,12)],ground:[hsl(280,26,22),hsl(255,30,10)],
    plant:{stem:hsl(285,22,28),stemLit:hsl(320,50,56),leaf:hsl(270,30,38),leafLit:hsl(310,55,58),petal:hsl(warmHue(r),80,66),petalCore:hsl(50,95,80)},
    fog:hsl(300,40,52),fogA:0.18,particle:'firefly',pCol:hsl(45,95,78),pRate:0.8,stars:0.4,godray:0.26,vignette:0.38,droopy:false}),
  nightbloom:(r)=>({name:'夜放',label:'静 · 夜光',
    sky:[hsl(245,55,22),hsl(255,50,14),hsl(265,45,7)],
    light:{x:0.30,y:0.18,col:hsl(220,30,86),glow:hsl(235,40,66),r:0.78,kind:'moon'},
    hills:[hsl(250,32,18),hsl(255,30,12),hsl(262,28,7)],ground:[hsl(248,26,15),hsl(258,28,7)],
    plant:{stem:hsl(250,20,26),stemLit:hsl(265,42,48),leaf:hsl(245,26,34),leafLit:hsl(280,46,54),petal:hsl(coolHue(r),75,70),petalCore:hsl(190,85,82)},
    fog:hsl(250,30,40),fogA:0.16,particle:'firefly',pCol:hsl(190,90,82),pRate:0.7,stars:1,godray:0,vignette:0.44,droopy:false})
};
const ARCHE_KEYS=['dawn','sunlit','ember','rain','gloom','twilight','nightbloom'];
const IDEAL={dawn:[0.74,0.30,0.18],sunlit:[0.88,0.88,0.35],ember:[0.24,0.78,0.50],
  rain:[0.33,0.34,0.46],gloom:[0.42,0.46,0.20],twilight:[0.82,0.46,0.38],nightbloom:[0.58,0.10,0.42]};

function genSpec(fp,name){
  const rng=mulberry32(fp.seed);
  const v=clamp((fp.brightness-0.52)*2.6+0.5);
  const a=clamp((fp.energy-0.32)*1.95+0.48);
  const dyn=fp.dynamics;
  let arche='dawn',best=1e9;
  for(const k of ARCHE_KEYS){const I=IDEAL[k];const dv=v-I[0],da=a-I[1],dd=dyn-I[2];
    const s=dv*dv+da*da+dd*dd*0.7+(rng()-0.5)*0.11;if(s<best){best=s;arche=k;}}
  const A=ARCHE[arche](rng,v,a,dyn);
  const branch=rng()<0.55?2:3;
  const depth=branch===3?(3+Math.round(a+rng())):(4+Math.round(a*1.2+rng()*1.4));
  const species={
    stalks:1+Math.round(a*1.6+rng()*1.3),depth,branch,
    spread:lerp(0.34,0.78,rng())*(A.droopy?0.7:1),
    droop:A.droopy?lerp(0.25,0.55,rng()):lerp(-0.04,0.12,rng()),
    lenBase:lerp(0.11,0.155,rng()),lenFall:lerp(0.75,0.82,rng()),curl:(rng()-0.5)*0.5,
    flower:['orb','star','bell','fan','willow'][(rng()*5)|0],
    flowerSize:lerp(0.65,1.2,rng())*(0.75+a*0.55),
    flowerDensity:clamp(0.5+v*0.4+dyn*0.3),leafShape:rng()<0.5?'oval':'blade'
  };
  return {fp,name,v,a,dyn,arche,A,species};
}

/* =========================================================================
   PLANT  (bounded tree -> spring-physics nodes; grows, settles, plays back)
   ========================================================================= */
function makePlant(spec,gx,gz,opts){
  opts=opts||{};
  const sp=spec.species,A=spec.A,P=A.plant;
  const rng=mulberry32((spec.fp.seed^0x51ed)>>>0);
  const unit=Math.min(W,H);                       // structure sized in screen-units at scale 1
  const colFor=d=>mixColor(P.stem,P.stemLit,clamp(d/sp.depth*0.7+0.2));
  const N=[];
  const maxLen=unit*sp.lenBase*(0.85+0.4*rng());
  N.push({p:-1,depth:0,ang:(rng()-0.5)*0.12,len:maxLen,appear:0,leaf:false,flower:null,col:colFor(0),seed:rng()*1000});
  (function grow(parent,depth){
    if(depth>=sp.depth||N.length>(opts.maxNodes||540))return;
    const kids=depth===0?1:sp.branch;
    for(let c=0;c<kids;c++){
      if(N.length>(opts.maxNodes||540))break;
      const t=kids===1?0:(c/(kids-1)-0.5);
      const ang=t*sp.spread*2+sp.droop*depth*0.18+(rng()-0.5)*0.18+sp.curl*depth*0.12;
      const len=N[parent].len*sp.lenFall*(0.9+0.2*rng());
      const cd=depth+1;
      const appear=clamp(cd/sp.depth*0.78+(rng()-0.5)*0.07,N[parent].appear+0.005,0.80);
      const isTip=depth>=sp.depth-1;
      const node={p:parent,depth:cd,ang,len,appear,col:colFor(cd),seed:rng()*1000,
        leaf:depth>=1&&rng()<0.5,side:Math.sign(t||(rng()-0.5))||1,flower:null};
      if(node.leaf){const lk=A.light.x<0.5?(node.side<0?0.7:0.3):(node.side>0?0.7:0.3);node.leafCol=mixColor(P.leaf,P.leafLit,lk);}
      if(isTip&&rng()<sp.flowerDensity){

        const petals=[];for(let k=0;k<np;k++)petals.push({present:true,pop:1});
        node.flower={petals,phase:rng()*TAU,glow:0};
      }
      N.push(node);grow(N.length-1,cd);
    }
  })(0,0);
  const n=N.length;
  const pl={spec,sp,A,nodes:N,n,gx,gz,
    growth:opts.growth!=null?opts.growth:0, live:!!opts.live, srcUrl:opts.srcUrl||null,
    rx:new Float32Array(n),ry:new Float32Array(n),     // rest local pos (origin = base, +y up)
    x:new Float32Array(n),y:new Float32Array(n),px:new Float32Array(n),py:new Float32Array(n),
    rdir:new Float32Array(n),vis:new Uint8Array(n),scale:lerp(0.92,1.12,rng()),
    K:new Float32Array(n),wm:new Float32Array(n),lit:0};
  for(let i=0;i<n;i++){const d=N[i].depth/sp.depth;pl.K[i]=lerp(0.17,0.05,d);pl.wm[i]=lerp(0.06,1.0,d*d);}
  computeRest(pl);
  for(let i=0;i<n;i++){pl.x[i]=pl.rx[i];pl.y[i]=pl.ry[i];pl.px[i]=pl.rx[i];pl.py[i]=pl.ry[i];}

}
function computeRest(pl){            // forward-kinematics rest pose at current growth
  const N=pl.nodes,g=pl.growth;
  for(let i=0;i<pl.n;i++){
    const nd=N[i];
    if(nd.p<0){pl.rx[i]=0;pl.ry[i]=0;pl.rdir[i]=nd.ang;pl.vis[i]=1;continue;}
    if(g<nd.appear-0.001){pl.vis[i]=0;pl.rx[i]=pl.rx[nd.p];pl.ry[i]=pl.ry[nd.p];pl.rdir[i]=pl.rdir[nd.p];continue;}
    const f=clamp((g-nd.appear)/0.16),ef=easeOut(f);
    pl.rdir[i]=pl.rdir[nd.p]+nd.ang;
    const L=nd.len*ef;
    pl.rx[i]=pl.rx[nd.p]+Math.sin(pl.rdir[i])*L;
    pl.ry[i]=pl.ry[nd.p]+Math.cos(pl.rdir[i])*L;
    if(!pl.vis[i]){pl.x[i]=pl.rx[i];pl.y[i]=pl.ry[i];pl.px[i]=pl.rx[i];pl.py[i]=pl.ry[i];}
    pl.vis[i]=1;
  }
}

/* projection: ground position (gx world, gz depth 0..1) -> screen base + scale */
function project(gx,gz){
  const s=clamp(lerp(1.18,0.13,gz/0.96),0.13,1.25);
  const parX=lerp(1.0,0.30,gz);
  const sx=W*0.5+(gx-Cam.x)*parX;
  const sy=horizonY+(H-horizonY)*(1-gz*0.93);
  return {sx,sy,s,parX};
}

function placeSlot(seed,index){

/* physics step for one plant */
function stepPlant(pl,dtf){
  const N=pl.nodes,A=pl.A;
  const proj=pl._proj;
  const s=proj.s, bx=proj.sx, by=proj.sy;
  // cursor in this plant's local frame (only if pointer near on screen)
  const interactive=(pl.live|| pl.gz<0.42) && Ptr.active;
  const curR=150*Math.max(0.45,s);
  const windX=wind.x*(0.7+Audio_.bass*1.6);
  const droopG=A.droopy?0.06:0.012;
  for(let i=1;i<pl.n;i++){
    if(!pl.vis[i])continue;
    let velx=(pl.x[i]-pl.px[i])*0.86, vely=(pl.y[i]-pl.py[i])*0.86;
    let ax=pl.K[i]*(pl.rx[i]-pl.x[i]) + windX*pl.wm[i];
    let ay=pl.K[i]*(pl.ry[i]-pl.y[i]) - droopG*pl.wm[i];
    if(interactive){
      const nsx=bx+pl.x[i]*s, nsy=by-pl.y[i]*s;
      const dx=Ptr.sx-nsx, dy=Ptr.sy-nsy, d=Math.hypot(dx,dy);
      if(d<curR){
        const fall=(1-d/curR), tip=pl.wm[i];
        // gentle lean toward the hand (screen->local: y inverts; /s to local units)
        const inv=1/(d+0.001);
        ax+= (dx*inv)*fall*tip*1.5/s*Math.max(0.5,s);
        ay+= (-dy*inv)*fall*tip*1.5/s*Math.max(0.5,s);
        // gust from hand motion (whips the plant, scatters)
        const gk=fall*tip*0.9;
        ax+= (Ptr.vx)*gk/s*Math.max(0.5,s);
        ay+= (-Ptr.vy)*gk/s*Math.max(0.5,s);
      }
    }
    pl.px[i]=pl.x[i];pl.py[i]=pl.y[i];
    let nx=pl.x[i]+velx+ax, ny=pl.y[i]+vely+ay;
    // clamp stretch from rest so nothing explodes
    const dxr=nx-pl.rx[i],dyr=ny-pl.ry[i],st=Math.hypot(dxr,dyr),mx=46;
    if(st>mx){nx=pl.rx[i]+dxr/st*mx;ny=pl.ry[i]+dyr/st*mx;}
    pl.x[i]=nx;pl.y[i]=ny;
  }
  // flowers: glow + beat re-bloom + cursor scatter
  const cs=Ptr.speed;
  for(let i=0;i<pl.n;i++){
    const fl=pl.nodes[i].flower; if(!fl)continue;
    fl.glow=mix(fl.glow, Audio_.beatFlash*0.8+0.2+pl.lit*0.6, 0.2);
    const fsx=bx+pl.x[i]*s, fsy=by-pl.y[i]*s;
    if(Audio_.beat>0.2){for(const pe of fl.petals){if(!pe.present&&Math.random()<0.5){pe.present=true;pe.pop=0;}}}
    for(const pe of fl.petals){if(pe.pop<1)pe.pop=Math.min(1,pe.pop+0.12);}
    if(interactive && cs>9){
      const dd=Math.hypot(Ptr.sx-fsx,Ptr.sy-fsy);
      if(dd< 34*Math.max(0.5,s)){
        for(const pe of fl.petals){
          if(pe.present&&Math.random()<0.4){pe.present=false;
            if(petals.length<260)petals.push({x:fsx,y:fsy,vx:Ptr.vx*0.5+(Math.random()-0.5)*2,vy:Ptr.vy*0.5-Math.random()*1.5-0.5,
              rot:Math.random()*TAU,vr:(Math.random()-0.5)*0.3,life:1,size:5*Math.max(0.5,s)*pl.spec.species.flowerSize,
              col:pl.A.plant.petal});}
        }
      }
    }
  }
}

function drawPlant(pl){
  const proj=pl._proj, s=proj.s, bx=proj.sx, by=proj.sy, A=pl.A, P=A.plant, sp=pl.sp, N=pl.nodes;
  const haze=clamp(1-pl.gz*0.85);
  // shadow
  ctx.globalAlpha=0.20*haze;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(bx,by+3*s,42*s,8*s,0,0,TAU);ctx.fill();ctx.globalAlpha=1;
  ctx.lineCap='round';
  const lightX=A.light.x;
  for(let i=1;i<pl.n;i++){
    if(!pl.vis[i])continue;
    const nd=N[i],par=nd.p;
    if(!pl.vis[par])continue;
    const x0=bx+pl.x[par]*s, y0=by-pl.y[par]*s, x1=bx+pl.x[i]*s, y1=by-pl.y[i]*s;
    const w=Math.max(0.6,(sp.depth-nd.depth+1)*1.5*s);
    ctx.globalAlpha=haze;
    ctx.strokeStyle=nd.col;ctx.lineWidth=w;ctx.beginPath();ctx.moveTo(x0,y0);ctx.lineTo(x1,y1);ctx.stroke();
    if(nd.leaf){drawLeaf(x0,y0,x1,y1,nd,sp,s,haze);}
  }
  // flowers (front pass, with glow)
  for(let i=0;i<pl.n;i++){const fl=N[i].flower;if(!fl||!pl.vis[i])continue;
    drawFlower(bx+pl.x[i]*s, by-pl.y[i]*s, fl, sp, P, s, haze, N[i].seed);}
  ctx.globalAlpha=1;
}
function drawLeaf(x0,y0,x1,y1,nd,sp,s,haze){
  const lx=(x0+x1)/2,ly=(y0+y1)/2;const ang=Math.atan2(x1-x0,-(y1-y0));
  const size=(sp.leafShape==='blade'?6.5:4.8)*s;const dir=ang+(nd.side||1)*0.9;
  const ex=lx+Math.sin(dir)*size*2.1,ey=ly-Math.cos(dir)*size*2.1;
  ctx.globalAlpha=haze;ctx.fillStyle=nd.leafCol;
  const px=-Math.cos(dir),py=-Math.sin(dir),wlt=size*0.9;
  ctx.beginPath();ctx.moveTo(lx,ly);
  ctx.quadraticCurveTo(lx+px*wlt+Math.sin(dir)*size,ly+py*wlt-Math.cos(dir)*size,ex,ey);
  ctx.quadraticCurveTo(lx-px*wlt+Math.sin(dir)*size,ly-py*wlt-Math.cos(dir)*size,lx,ly);
  ctx.fill();
}
function drawFlower(x,y,fl,sp,P,s,haze,seed){
  const glow=fl.glow;const size=6*sp.flowerSize*s;
  ctx.save();ctx.translate(x,y);
  ctx.globalCompositeOperation='lighter';
  const gR=size*(2.8+glow*2.2);
  const gg=ctx.createRadialGradient(0,0,0,0,0,gR);gg.addColorStop(0,withA(P.petalCore,(0.4+glow*0.4)*haze));gg.addColorStop(0.4,withA(P.petal,0.16*haze));gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(0,0,gR,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';
  ctx.globalAlpha=haze;

    for(let i=0;i<5;i++){const a=(i/5-0.5)*1.2+wind.x*0.1;ctx.beginPath();ctx.moveTo(0,0);
      ctx.quadraticCurveTo(Math.sin(a)*size,size*1.2,Math.sin(a)*size*1.4+wind.x*1.5,size*3.0);ctx.stroke();}
  }else{
    const core=mixColor(P.petal,P.petalCore,0.6),dark=mixColor(P.petal,'hsl(0,0%,8%)',0.25);
    const np=fl.petals.length;
    for(let i=0;i<np;i++){const pe=fl.petals[i];if(!pe.present)continue;
      ctx.save();ctx.rotate(i/np*TAU+fl.phase);const op=easeOut(pe.pop);
      const pl_=size*(sp.flower==='fan'?1.6:1.25)*op,pw=size*(sp.flower==='star'?0.36:0.7);
      const g=ctx.createLinearGradient(0,0,0,-pl_);g.addColorStop(0,dark);g.addColorStop(0.5,P.petal);g.addColorStop(1,core);
      ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(pw,-pl_*0.5,0,-pl_);ctx.quadraticCurveTo(-pw,-pl_*0.5,0,0);ctx.fill();ctx.restore();}
  }
  ctx.globalCompositeOperation='lighter';
  const cR=size*0.6*(1+glow*0.3);const cg=ctx.createRadialGradient(0,0,0,0,0,cR);cg.addColorStop(0,'#fff');cg.addColorStop(0.5,P.petalCore);cg.addColorStop(1,withA(P.petalCore,0));
  ctx.fillStyle=cg;ctx.globalAlpha=haze;ctx.beginPath();ctx.arc(0,0,cR,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';ctx.restore();
}

/* ambient + scattered particles */
function spawnAmb(A,burst){

  if(k==='rain'){p.x=Math.random()*W;p.y=-20-Math.random()*H*0.4;p.vy=560+Math.random()*240;p.vx=-26;p.len=12+Math.random()*16;}
  else if(k==='ember'||k==='firefly'){p.x=Math.random()*W;p.y=H*0.5+Math.random()*H*0.5;p.vx=(Math.random()-0.5)*16;p.vy=-12-Math.random()*24;p.decay=k==='ember'?0.0035:0.0021;p.r=(k==='ember'?1.4:1.8)+Math.random()*2;p.ph=Math.random()*TAU;p.life=1;}
  else{p.x=Math.random()*W;p.y=Math.random()*H;p.vx=(Math.random()-0.5)*10;p.vy=-6-Math.random()*15;p.decay=0.0015;p.r=1+Math.random()*2.2;p.ph=Math.random()*TAU;p.life=1;}
  amb.push(p);
}
function updateAmb(A,dt){
  const rate=A.particle==='rain'?A.pRate*dt*150*(0.5+Audio_.level):A.pRate*(0.4+Audio_.level*1.3)*dt*55;
  let e=rate;while(e>0){if(amb.length>=300)break;if(e>=1||Math.random()<e)spawnAmb(A);e-=1;}
  const t=performance.now()*0.001;
  for(let i=amb.length-1;i>=0;i--){const p=amb[i];
    if(p.kind==='rain'){p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.y>H+10)amb.splice(i,1);}
    else{p.vx+=Math.sin(t*0.6+p.ph)*6*dt+wind.x*0.5*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=p.decay*60*dt;if(p.kind==='ember')p.vy-=4*dt;if(p.life<=0||p.y<-30)amb.splice(i,1);}}
}
function drawAmb(A){
  if(A.particle==='rain'){ctx.strokeStyle=A.pCol;ctx.lineWidth=1.1;for(const p of amb){ctx.globalAlpha=0.16+p.z*0.32;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.vx*0.02,p.y+p.len*p.z);ctx.stroke();}ctx.globalAlpha=1;return;}
  ctx.globalCompositeOperation='lighter';const now=performance.now();
  for(const p of amb){const a=clamp(p.life)*(0.4+p.z*0.6);const rr=p.r*(0.6+p.z)*4;const fl=p.kind==='firefly'?0.45+0.55*(0.5+0.5*Math.sin(now*0.005+p.ph)):1;
    ctx.globalAlpha=a*fl;const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr);g.addColorStop(0,A.pCol);g.addColorStop(0.4,A.pCol);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,rr,0,TAU);ctx.fill();}
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
}
function updatePetals(dt){

function drawCursorLight(A){

  g.addColorStop(0,withA(A.light.glow,0.18));g.addColorStop(0.5,withA(A.light.glow,0.05));g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(Ptr.sx,Ptr.sy,r,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';
}
function drawVignette(A){
  const g=ctx.createRadialGradient(W*0.5,H*0.45,Math.min(W,H)*0.2,W*0.5,H*0.5,Math.max(W,H)*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${A.vignette})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

/* =========================================================================
   MAIN LOOP
   ========================================================================= */
let endedAt=0, lastT=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(now-lastT)/1000);lastT=now;
  if((!W||!H)&&innerWidth&&innerHeight)resize();   // self-heal if it ever booted at 0x0
  if(!Field.live && Field.plants.length===0){ctx.fillStyle='#07060e';ctx.fillRect(0,0,W,H);return;}
  Audio_.sample();
  const A=(Field.live||Field.plants[0]).A;

  // pointer velocity decay + idle
  Ptr.vx*=0.82;Ptr.vy*=0.82;Ptr.speed=Math.hypot(Ptr.vx,Ptr.vy);
  Ptr.idle+=dt; if(Ptr.idle>1.2)Ptr.active=false;

  // wind from music (+ idle breeze), settles to ~0 when ended & quiet
  let breeze;
  if(Audio_.playing) breeze=0.4+Math.sin(now*0.0006)*0.5*(0.5+Audio_.level);
  else{const since=(now-endedAt)/1000;breeze=(endedAt&&since>2.5)?0.05:0.35;}
  wind.x=mix(wind.x, breeze*(0.6+Audio_.level*1.4), 0.04);

  // camera ease
  Cam.x=mix(Cam.x,Cam.tx,0.12);

  // growth (live), bounded -> stops
  const live=Field.live;
  if(live){
    let g=easeOut(clamp(Audio_.progress()*1.04));
    if(!Audio_.playing&&Audio_.duration>0&&Audio_.curTime()>=Audio_.duration-0.3)g=1;
    if(g>live.growth){live.growth=g;computeRest(live);}
  }

  // project + light boost + physics
  const all=Field.plants.concat(live?[live]:[]);
  for(const pl of all){
    pl._proj=project(pl.gx,pl.gz);
    // light from cursor proximity to base
    let litT=0;
    if(Ptr.active&&!Ptr.drag){const d=Math.hypot(Ptr.sx-pl._proj.sx,Ptr.sy-pl._proj.sy);litT=clamp(1-d/(220*Math.max(0.4,pl._proj.s)));}
    pl.lit=mix(pl.lit,litT,0.15);
  }
  // sort far->near
  all.sort((a,b)=>b.gz-a.gz);

  drawSky(A);drawHills(A);drawGround(A);
  updateAmb(A,dt); if(A.particle==='rain')drawAmb(A);
  for(const pl of all){stepPlant(pl,dt*60);drawPlant(pl);}
  updatePetals(dt);drawPetals();
  if(A.particle!=='rain')drawAmb(A);
  drawCursorLight(A);
  drawVignette(A);

  if(live&&mode==='play')npBar.style.width=(Audio_.progress()*100)+'%';
}
requestAnimationFrame(frame);

/* =========================================================================
   POINTER
   ========================================================================= */
function pointerPos(e){const r=canvas.getBoundingClientRect();return {x:e.clientX-r.left,y:e.clientY-r.top};}
canvas.addEventListener('pointerdown',e=>{
  canvas.setPointerCapture(e.pointerId);
  const p=pointerPos(e);Ptr.down=true;Ptr.drag=false;Ptr.downX=p.x;Ptr.downY=p.y;Ptr.downCam=Cam.tx;Ptr.moved=0;
  Ptr.sx=p.x;Ptr.sy=p.y;Ptr.px=p.x;Ptr.py=p.y;Ptr.active=true;Ptr.idle=0;hideHint();
});
canvas.addEventListener('pointermove',e=>{
  const p=pointerPos(e);
  Ptr.vx=mix(Ptr.vx,p.x-Ptr.px,0.6);Ptr.vy=mix(Ptr.vy,p.y-Ptr.py,0.6);
  Ptr.px=Ptr.sx;Ptr.py=Ptr.sy;Ptr.sx=p.x;Ptr.sy=p.y;Ptr.active=true;Ptr.idle=0;
  if(Ptr.down){
    Ptr.moved+=Math.hypot(p.x-Ptr.px,p.y-Ptr.py);
    // decide: drag-to-pan if started on empty ground (not near a plant) OR moved horizontally a lot
    if(!Ptr.drag && Ptr.moved>10){Ptr.drag=!nearAnyPlant(Ptr.downX,Ptr.downY);}
    if(Ptr.drag){Cam.tx=clamp(Ptr.downCam-(p.x-Ptr.downX),Cam.min,Cam.max);}
  }
  hideHint();
});
function endPtr(e){
  if(Ptr.down&&!Ptr.drag&&Ptr.moved<10){ // tap -> recall a plant
    const hit=hitPlant(Ptr.sx,Ptr.sy); if(hit)recall(hit);
  }
  Ptr.down=false;Ptr.drag=false;
}
canvas.addEventListener('pointerup',endPtr);
canvas.addEventListener('pointercancel',endPtr);
canvas.addEventListener('pointerleave',()=>{Ptr.down=false;Ptr.drag=false;});
function nearAnyPlant(x,y){for(const pl of allPlants()){const pr=pl._proj;if(!pr)continue;if(Math.hypot(x-pr.sx,y-(pr.sy-60*pr.s))<90*Math.max(0.5,pr.s))return true;}return false;}
function hitPlant(x,y){let best=null,bd=1e9;for(const pl of allPlants()){const pr=pl._proj;if(!pr)continue;const d=Math.hypot(x-pr.sx,y-(pr.sy-50*pr.s));if(d<90*Math.max(0.5,pr.s)&&d<bd){bd=d;best=pl;}}return best;}
function allPlants(){return Field.plants.concat(Field.live?[Field.live]:[]);}
function recall(pl){
  Cam.tx=clamp(pl.gx,Cam.min,Cam.max);
  if(pl.srcUrl){ playSample(pl.srcUrl, pl.spec.name); }
  else toast('《'+pl.spec.name+'》— 把这首再拖进来就能再听一次');
}

/* =========================================================================
   UI / FLOW
   ========================================================================= */
const intro=document.getElementById('intro'),hud=document.getElementById('hud');
const npName=document.getElementById('npName'),npMood=document.getElementById('npMood'),npBar=document.getElementById('npBar');
const hintEl=document.getElementById('hint');
let mode='intro',hintHidden=false;
const show=el=>el.classList.remove('hidden'),hide=el=>el.classList.add('hidden');
function hideHint(){if(!hintHidden){hintHidden=true;hintEl.classList.add('gone');}}
function toast(msg){const d=document.createElement('div');d.className='toast';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.style.opacity='0',1500);setTimeout(()=>d.remove(),2100);}

const STORE='musicgarden.v2';
const loadG=()=>{try{return JSON.parse(localStorage.getItem(STORE))||[];}catch(e){return[];}};
const saveG=g=>localStorage.setItem(STORE,JSON.stringify(g.slice(-40)));
function rebuildField(){
  Field.plants.length=0;
  const g=loadG();
  g.forEach((it,idx)=>{
    const spec=genSpec({energy:it.e,brightness:it.b,dynamics:it.d,seed:it.seed,duration:it.dur},it.name);
    const slot=placeSlot(it.seed,idx);
    Field.plants.push(makePlant(spec,slot.gx,slot.gz,{growth:1,maxNodes:300,srcUrl:it.src||null}));
  });
}
function commitLiveToField(){
  if(!Field.live)return;
  const g=loadG(),fp=Field.live.spec.fp,spec=Field.live.spec;
  if(!g.some(x=>x.seed===fp.seed)){
    g.push({seed:fp.seed,name:spec.name,when:Date.now(),e:fp.energy,b:fp.brightness,d:fp.dynamics,dur:fp.duration,src:Field.live.srcUrl||null});
    saveG(g);
  }
  // move the live plant into the field (becomes a memory at a slot)
  const idx=g.length-1, slot=placeSlot(fp.seed,idx);
  Field.live.gx=slot.gx;Field.live.gz=slot.gz;Field.live.live=false;Field.live.growth=1;
  Field.plants.push(Field.live);Field.live=null;
}

async function startBuffer(ab,name,srcUrl){
  intro.style.pointerEvents='none';
  try{
    const buf=await Audio_.load(ab);
    const fp=fingerprint(buf,name);
    const spec=genSpec(fp,name);
    // any currently-loaded live song becomes a memory in the field
    if(Field.live)commitLiveToField();
    rebuildField();                       // field = all stored memories
    Field.plants=Field.plants.filter(p=>p.spec.fp.seed!==fp.seed); // the one we're about to play stays live, not doubled
    Cam.x=0;Cam.tx=0;
    Field.live=makePlant(spec,0,0.05,{growth:0,live:true,maxNodes:560,srcUrl:srcUrl||null});
    endedAt=0;Audio_.reset();Audio_.play(onEnd);mode='play';keptThis=false;
    npName.textContent=name;npMood.textContent='· '+spec.A.label;
    document.getElementById('pauseBtn').textContent='暂停';
    // widen camera range as the garden grows
    const span=200+Field.plants.length*30;Cam.min=-span;Cam.max=span;
    hide(intro);show(hud);
  }catch(e){console.error(e);alert('这首歌没读出来，换一首试试？\n'+(e.message||e));intro.style.pointerEvents='';}
}
let keptThis=false;
function onEnd(){endedAt=performance.now();if(!keptThis){keptThis=true;
  const g=loadG(),fp=Field.live.spec.fp;
  if(!g.some(x=>x.seed===fp.seed)){g.push({seed:fp.seed,name:Field.live.spec.name,when:Date.now(),e:fp.energy,b:fp.brightness,d:fp.dynamics,dur:fp.duration,src:Field.live.srcUrl||null});saveG(g);}
  toast('这一株收进了你的花园 🌱');
}}

const drop=document.getElementById('drop'),fileInput=document.getElementById('file');
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);});
['dragenter','dragover'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==='drop'){const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio'))readFile(f);}drop.classList.remove('hot');}));
function readFile(f){Audio_.ensure();const r=new FileReader();r.onload=()=>startBuffer(r.result,f.name.replace(/\.[^.]+$/,''),null);r.readAsArrayBuffer(f);}

const SAMPLES=[['calm','晨之歌',hsl(330,60,72)],['happy','明亮日',hsl(50,90,70)],['epic','史诗',hsl(15,85,58)],['sad','蓝色雨',hsl(210,55,62)],['dark','夜',hsl(255,45,55)],['tense','紧绷',hsl(280,50,60)],['gloom','雾',hsl(250,20,62)]];
const seedsEl=document.getElementById('seeds');
for(const[file,label,col] of SAMPLES){
  const b=document.createElement('div');b.className='seed';b.innerHTML=`<span class="dot" style="color:${col}"></span>${label}`;
  b.onclick=()=>playSample('assets/'+file+'.mp3',label);
  seedsEl.appendChild(b);
}
async function playSample(url,label){
  Audio_.ensure();
  try{const ab=await fetch(url).then(r=>r.arrayBuffer());startBuffer(ab,label,url);}
  catch(e){toast('试听文件没加载到');console.error(e);}
}

document.getElementById('pauseBtn').onclick=function(){if(Audio_.playing){Audio_.pause();this.textContent='继续';}else{Audio_.resume(onEnd);this.textContent='暂停';}};
document.getElementById('newBtn').onclick=()=>{
  if(Field.live)commitLiveToField();
  Audio_.reset();mode='intro';hide(hud);show(intro);intro.style.pointerEvents='';
};
document.getElementById('recenterBtn').onclick=()=>{Cam.tx=Field.live?Field.live.gx:0;};

// boot: load any saved garden so it's there from the first frame
rebuildField();
if(Field.plants.length){ /* show a quiet existing garden behind the intro */ }
</script>
</body>
</html>
