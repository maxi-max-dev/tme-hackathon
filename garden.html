<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>音乐花园 · 听一首歌，看它长成一个世界</title>
<style>
  :root{
    --ink:#f3f0ff;
    --muted:#a7a3c4;
    --line:rgba(255,255,255,.10);
    --glass:rgba(20,18,34,.55);
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#08070f;color:var(--ink);font-family:var(--font);}
  #scene{position:fixed;inset:0;display:block;width:100vw;height:100vh;}

  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    flex-direction:column;text-align:center;padding:24px;z-index:10;transition:opacity .6s ease;}
  .overlay.hidden{opacity:0;pointer-events:none;}

  /* intro */
  #intro .kicker{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
  #intro h1{font-size:clamp(28px,6vw,54px);font-weight:800;letter-spacing:.01em;margin:0 0 14px;
    background:linear-gradient(120deg,#fff,#c9bcff 55%,#7ad7ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #intro p.sub{color:var(--muted);font-size:16px;margin:0 0 34px;max-width:450px;line-height:1.7;}
  .drop{width:min(440px,86vw);border:1.5px dashed rgba(255,255,255,.22);border-radius:22px;
    padding:30px 24px;background:rgba(255,255,255,.025);cursor:pointer;transition:.25s;backdrop-filter:blur(6px);}
  .drop:hover,.drop.hot{border-color:rgba(160,200,255,.7);background:rgba(120,160,255,.10);transform:translateY(-2px);}
  .drop .big{font-size:19px;font-weight:700;margin-bottom:6px;}
  .drop .small{font-size:13px;color:var(--muted);}
  .or{margin:26px 0 14px;color:var(--muted);font-size:12px;letter-spacing:.2em;}
  .seeds{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:560px;}
  .seed{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);
    padding:8px 15px;border-radius:999px;font-size:13.5px;cursor:pointer;transition:.18s;font-family:var(--font);}
  .seed:hover{background:rgba(255,255,255,.13);transform:translateY(-2px);}
  .seed .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;box-shadow:0 0 8px currentColor;}
  .gardenlink{margin-top:30px;color:var(--muted);font-size:13px;cursor:pointer;border-bottom:1px solid transparent;transition:.2s;}
  .gardenlink:hover{color:var(--ink);border-color:var(--line);}
  .gardenlink b{color:#c9bcff;}

  /* HUD */
  #hud{position:fixed;left:0;right:0;bottom:0;z-index:8;padding:20px 22px 22px;
    background:linear-gradient(180deg,transparent,rgba(6,5,14,.66));
    transition:opacity .5s, transform .5s;display:flex;flex-direction:column;gap:11px;align-items:center;}
  #hud.hidden{opacity:0;pointer-events:none;transform:translateY(14px);}
  .npline{display:flex;align-items:baseline;gap:12px;justify-content:center;flex-wrap:wrap;}
  .npname{font-size:16px;font-weight:700;max-width:60vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .npmood{font-size:12.5px;color:var(--muted);letter-spacing:.08em;}
  .bar{width:min(560px,82vw);height:4px;border-radius:4px;background:rgba(255,255,255,.14);overflow:hidden;}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,#9b8cff,#7ad7ff);box-shadow:0 0 12px rgba(140,180,255,.7);}
  .ctrls{display:flex;gap:10px;align-items:center;}
  .btn{border:1px solid var(--line);background:var(--glass);color:var(--ink);backdrop-filter:blur(8px);
    border-radius:999px;padding:8px 16px;font-size:13.5px;cursor:pointer;transition:.18s;font-family:var(--font);}
  .btn:hover{background:rgba(255,255,255,.14);}
  .btn.primary{border-color:rgba(160,200,255,.5);background:rgba(120,160,255,.16);}

  /* garden */
  #gardenView{background:radial-gradient(120% 90% at 50% 0%,#16132a,#08070f 70%);z-index:9;justify-content:flex-start;overflow-y:auto;}
  #gardenView h2{font-size:24px;font-weight:800;margin:46px 0 4px;}
  #gardenView .gsub{color:var(--muted);font-size:13.5px;margin-bottom:26px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:16px;width:min(1040px,92vw);padding-bottom:60px;}
  .card{border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;background:#0d0b18;transition:.22s;position:relative;}
  .card:hover{transform:translateY(-4px);border-color:rgba(160,200,255,.5);box-shadow:0 14px 40px rgba(0,0,0,.5);}
  .card canvas{display:block;width:100%;height:150px;}
  .card .meta{padding:10px 12px;text-align:left;}
  .card .mname{font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .card .mwhen{font-size:11px;color:var(--muted);margin-top:2px;}
  .card .del{position:absolute;top:8px;right:8px;width:24px;height:24px;border-radius:50%;border:none;
    background:rgba(0,0,0,.45);color:#fff;font-size:14px;cursor:pointer;opacity:0;transition:.18s;line-height:1;}
  .card:hover .del{opacity:1;}
  .empty{color:var(--muted);font-size:15px;margin-top:50px;line-height:1.9;}
  .topbtn{position:fixed;top:18px;font-size:13.5px;z-index:9;}
  #backBtn{left:20px;}
  #toGarden2{right:20px;z-index:8;}
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div class="overlay" id="intro">
  <div class="kicker">音 乐 花 园</div>
  <h1>听一首歌，看它长成一个世界</h1>
  <p class="sub">丢一首歌进来。它会一边放，一边长成一座只属于这首歌的活花园——什么情绪、什么走向，就什么颜色、什么天气、什么形状。</p>
  <label class="drop" id="drop">
    <div class="big">把歌拖进来，或点这里选一首</div>
    <div class="small">mp3 / wav / m4a / flac · 全部在你本机播放，不上传</div>
    <input type="file" id="file" accept="audio/*" hidden>
  </label>
  <div class="or">— 或者，先试试这些 —</div>
  <div class="seeds" id="seeds"></div>
  <div class="gardenlink" id="toGarden">看看 <b>我的花园</b> →</div>
</div>

<div id="hud" class="hidden">
  <div class="npline"><span class="npname" id="npName">—</span><span class="npmood" id="npMood"></span></div>
  <div class="bar"><i id="npBar"></i></div>
  <div class="ctrls">
    <button class="btn" id="pauseBtn">暂停</button>
    <button class="btn" id="newBtn">换一首</button>
    <button class="btn primary" id="keepBtn">收进花园</button>
  </div>
</div>

<div class="overlay hidden" id="gardenView">
  <button class="btn topbtn" id="backBtn">← 返回</button>
  <h2>我的花园</h2>
  <div class="gsub" id="gardenSub">你听过的每一首歌，都在这里长着。</div>
  <div class="grid" id="grid"></div>
</div>

<button class="btn topbtn hidden" id="toGarden2">我的花园 →</button>

<script>
"use strict";
/* =========================================================================
   音乐花园 — a song becomes a living, bounded world.  Canvas2D + WebAudio.
   ========================================================================= */
const TAU=Math.PI*2;
const clamp=(x,a=0,b=1)=>x<a?a:x>b?b:x;
const lerp=(a,b,t)=>a+(b-a)*t;
const mix=lerp;
const easeOut=t=>1-Math.pow(1-t,3);
function mulberry32(s){let a=s>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function snoise(x){return Math.sin(x)*0.55+Math.sin(x*2.17+1.3)*0.3+Math.sin(x*4.7+4.1)*0.15;}
const hsl=(h,s,l,a=1)=>`hsla(${((h%360)+360)%360},${clamp(s,0,100)}%,${clamp(l,0,100)}%,${a})`;
function withA(c,a){if(c.indexOf('hsla')===0)return c.replace(/,[^,]+\)$/,`,${a})`);if(c.indexOf('hsl(')===0)return c.replace('hsl(','hsla(').replace(')',`,${a})`);return c;}
function parseHSL(c){const m=c.match(/hsla?\(([-\d.]+),\s*([-\d.]+)%,\s*([-\d.]+)%(?:,\s*([\d.]+))?\)/);return m?{h:+m[1],s:+m[2],l:+m[3],a:m[4]!=null?+m[4]:1}:null;}
function mixColor(a,b,t){const pa=parseHSL(a),pb=parseHSL(b);if(!pa||!pb)return a;let dh=pb.h-pa.h;if(dh>180)dh-=360;if(dh<-180)dh+=360;return hsl(pa.h+dh*t,lerp(pa.s,pb.s,t),lerp(pa.l,pb.l,t),lerp(pa.a,pb.a,t));}

/* ---------- canvas ---------- */
const canvas=document.getElementById('scene');
const ctx=canvas.getContext('2d',{alpha:false});
let W=0,H=0,DPR=1;
function resize(){DPR=Math.min(2,window.devicePixelRatio||1);W=innerWidth;H=innerHeight;canvas.width=W*DPR|0;canvas.height=H*DPR|0;canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);}
addEventListener('resize',resize);resize();

/* =========================================================================
   AUDIO
   ========================================================================= */
const Audio_={
  ac:null,src:null,analyser:null,buf:null,freq:null,startT:0,pauseT:0,playing:false,duration:0,
  bass:0,mid:0,treble:0,level:0,energyHist:[],beat:0,beatFlash:0,lastBeat:-1,
  ensure(){if(!this.ac)this.ac=new (window.AudioContext||window.webkitAudioContext)();if(this.ac.state==='suspended')this.ac.resume();},
  async load(ab){this.ensure();this.buf=await this.ac.decodeAudioData(ab);this.duration=this.buf.duration;return this.buf;},
  play(onEnd){
    this.stopNode();
    const s=this.ac.createBufferSource();s.buffer=this.buf;
    const an=this.ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.78;
    const g=this.ac.createGain();g.gain.value=0.9;
    s.connect(an);an.connect(g);g.connect(this.ac.destination);
    this.src=s;this.analyser=an;this.freq=new Uint8Array(an.frequencyBinCount);
    s.onended=()=>{if(this.playing&&this.curTime()>=this.duration-0.25){this.playing=false;onEnd&&onEnd();}};
    const off=this.pauseT||0;s.start(0,off);this.startT=this.ac.currentTime-off;this.playing=true;this.energyHist.length=0;
  },
  stopNode(){if(this.src){try{this.src.onended=null;this.src.stop();}catch(e){}this.src=null;}},
  pause(){if(!this.playing)return;this.pauseT=this.curTime();this.playing=false;this.stopNode();},
  resume(onEnd){if(this.playing)return;this.play(onEnd);},
  reset(){this.stopNode();this.playing=false;this.pauseT=0;this.startT=0;},
  curTime(){return this.playing?Math.min(this.duration,this.ac.currentTime-this.startT):(this.pauseT||0);},
  progress(){return this.duration?clamp(this.curTime()/this.duration):0;},
  sample(){
    if(!this.analyser){this.bass=this.mid=this.treble=this.level=0;this.beat=0;return;}
    this.analyser.getByteFrequencyData(this.freq);
    const f=this.freq,n=f.length;let b=0,m=0,t=0;const bE=8,mE=64,tE=Math.min(n,260);
    for(let i=1;i<bE;i++)b+=f[i];for(let i=bE;i<mE;i++)m+=f[i];for(let i=mE;i<tE;i++)t+=f[i];
    b/=(bE-1)*255;m/=(mE-bE)*255;t/=(tE-mE)*255;
    const k=this.playing?0.35:0.08;
    this.bass=mix(this.bass,b,k);this.mid=mix(this.mid,m,k);this.treble=mix(this.treble,t,k);
    this.level=mix(this.level,(b*1.1+m+t*0.8)/3,k);
    const e=b*1.4+m*0.6;const hist=this.energyHist;hist.push(e);if(hist.length>43)hist.shift();
    let avg=0;for(let i=0;i<hist.length;i++)avg+=hist[i];avg/=Math.max(1,hist.length);
    let vc=0;for(let i=0;i<hist.length;i++){const d=hist[i]-avg;vc+=d*d;}vc/=Math.max(1,hist.length);
    const th=avg*1.32+Math.sqrt(vc)*0.6+0.02;const now=this.ac.currentTime;this.beat=0;
    if(this.playing&&e>th&&now-this.lastBeat>0.16&&e>0.06){this.beat=clamp(e*1.4);this.beatFlash=1;this.lastBeat=now;}
    this.beatFlash*=0.90;
  }
};
function fingerprint(buf,name){
  const ch=buf.getChannelData(0),N=ch.length,step=Math.max(1,Math.floor(N/24000));
  let sumSq=0,hf=0,cnt=0,prev=0,hashAcc=2166136261^Math.floor(buf.duration*1000);
  const wc=64,env=new Float32Array(wc),perWin=Math.max(1,Math.floor(N/wc));
  for(let i=0;i<N;i+=step){const s=ch[i];sumSq+=s*s;hf+=Math.abs(s-prev);prev=s;cnt++;
    if((cnt&255)===0){hashAcc^=Math.floor(s*32768)&0xffff;hashAcc=Math.imul(hashAcc,16777619);}
    const w=Math.min(wc-1,Math.floor(i/perWin));env[w]+=s*s;}
  const rms=Math.sqrt(sumSq/Math.max(1,cnt));const bright=(hf/Math.max(1,cnt))/(rms+1e-4);
  let em=0;for(let i=0;i<wc;i++){env[i]=Math.sqrt(env[i]/perWin*step);em+=env[i];}em/=wc;
  let ev=0;for(let i=0;i<wc;i++){const d=env[i]-em;ev+=d*d;}ev=Math.sqrt(ev/wc);
  return{energy:clamp(rms*3.4),brightness:clamp(bright*0.62),dynamics:clamp((ev/(em+1e-4))*0.9),
         seed:(hashAcc^hashStr(name||'song'))>>>0,duration:buf.duration};
}

/* =========================================================================
   WORLD  (deterministic from fingerprint)
   ========================================================================= */
function warmHue(r){return[40,12,330,350,20][(r()*5)|0];}
function emberHue(r){return[12,24,0,345][(r()*4)|0];}
function coolHue(r){return[190,210,265,300,170][(r()*5)|0];}
const ARCHE={
  dawn:(r)=>({name:'晨曦',label:'平静 · 明亮',
    sky:[hsl(28,70,78),hsl(330,55,72),hsl(255,45,40)],
    light:{x:0.24,y:0.20,col:hsl(36,90,82),glow:hsl(40,95,72),r:1.0,kind:'sun'},
    hills:[hsl(285,28,30),hsl(305,22,22),hsl(320,18,15)],ground:[hsl(95,30,28),hsl(110,32,15)],
    plant:{stem:hsl(120,28,30),stemLit:hsl(95,45,55),leaf:hsl(115,42,42),leafLit:hsl(95,55,62),petal:hsl(340,75,72),petalCore:hsl(45,95,78)},
    fog:hsl(330,40,72),fogA:0.16,particle:'pollen',pCol:hsl(45,90,80),pRate:0.5,stars:0,godray:0.18,vignette:0.34,droopy:false}),
  sunlit:(r)=>({name:'盛日',label:'热烈 · 明亮',
    sky:[hsl(205,75,72),hsl(195,60,60),hsl(170,40,42)],
    light:{x:0.72,y:0.18,col:hsl(48,100,86),glow:hsl(50,100,76),r:1.15,kind:'sun'},
    hills:[hsl(150,30,32),hsl(160,28,23),hsl(170,24,16)],ground:[hsl(105,42,30),hsl(120,46,16)],
    plant:{stem:hsl(125,40,30),stemLit:hsl(100,60,56),leaf:hsl(120,52,42),leafLit:hsl(95,65,60),petal:hsl(warmHue(r),85,66),petalCore:hsl(52,100,80)},
    fog:hsl(190,40,70),fogA:0.10,particle:'firefly',pCol:hsl(52,100,80),pRate:0.85,stars:0,godray:0.30,vignette:0.30,droopy:false}),
  ember:(r)=>({name:'暮烬',label:'激烈 · 暗',
    sky:[hsl(15,65,30),hsl(345,60,22),hsl(265,50,12)],
    light:{x:0.5,y:0.30,col:hsl(28,95,64),glow:hsl(12,95,52),r:1.1,kind:'sun'},
    hills:[hsl(330,30,18),hsl(345,26,12),hsl(0,20,8)],ground:[hsl(20,35,16),hsl(0,30,8)],
    plant:{stem:hsl(15,30,22),stemLit:hsl(30,70,48),leaf:hsl(355,40,32),leafLit:hsl(25,75,52),petal:hsl(emberHue(r),90,58),petalCore:hsl(45,100,72)},
    fog:hsl(10,50,30),fogA:0.20,particle:'ember',pCol:hsl(25,95,60),pRate:1.0,stars:0,godray:0.34,vignette:0.46,lightning:0.4,droopy:false}),
  rain:(r)=>({name:'蓝雨',label:'平静 · 暗',
    sky:[hsl(215,40,40),hsl(220,38,26),hsl(230,35,12)],
    light:{x:0.66,y:0.16,col:hsl(210,40,68),glow:hsl(205,45,56),r:0.8,kind:'moon'},
    hills:[hsl(220,28,24),hsl(225,26,16),hsl(232,24,10)],ground:[hsl(200,24,20),hsl(220,28,10)],
    plant:{stem:hsl(205,22,30),stemLit:hsl(190,40,52),leaf:hsl(195,32,40),leafLit:hsl(180,45,56),petal:hsl(200,60,68),petalCore:hsl(185,70,80)},
    fog:hsl(215,35,52),fogA:0.22,particle:'rain',pCol:hsl(205,50,80),pRate:1.0,stars:0,godray:0,vignette:0.42,droopy:true}),
  gloom:(r)=>({name:'雾霭',label:'低沉 · 雾',
    sky:[hsl(250,18,46),hsl(255,16,32),hsl(260,18,16)],
    light:{x:0.38,y:0.22,col:hsl(250,25,70),glow:hsl(255,28,58),r:0.85,kind:'sun'},
    hills:[hsl(255,14,30),hsl(258,12,21),hsl(262,12,13)],ground:[hsl(250,12,22),hsl(258,14,12)],
    plant:{stem:hsl(255,14,30),stemLit:hsl(260,28,50),leaf:hsl(250,18,38),leafLit:hsl(265,32,54),petal:hsl(280,42,64),petalCore:hsl(300,55,76)},
    fog:hsl(255,20,58),fogA:0.34,particle:'spore',pCol:hsl(280,40,80),pRate:0.55,stars:0,godray:0.12,vignette:0.40,droopy:true}),
  twilight:(r)=>({name:'暮色',label:'流动 · 暮',
    sky:[hsl(265,55,40),hsl(300,45,30),hsl(225,50,14)],
    light:{x:0.74,y:0.22,col:hsl(40,90,80),glow:hsl(330,75,60),r:1.0,kind:'sun'},
    hills:[hsl(285,32,26),hsl(300,28,18),hsl(255,30,12)],ground:[hsl(280,26,22),hsl(255,30,11)],
    plant:{stem:hsl(285,22,28),stemLit:hsl(320,50,56),leaf:hsl(270,30,38),leafLit:hsl(310,55,58),petal:hsl(warmHue(r),80,66),petalCore:hsl(50,95,80)},
    fog:hsl(300,40,52),fogA:0.18,particle:'firefly',pCol:hsl(45,95,78),pRate:0.8,stars:0.4,godray:0.26,vignette:0.38,droopy:false}),
  nightbloom:(r)=>({name:'夜放',label:'静 · 夜光',
    sky:[hsl(245,55,22),hsl(255,50,14),hsl(265,45,7)],
    light:{x:0.30,y:0.18,col:hsl(220,30,86),glow:hsl(235,40,66),r:0.78,kind:'moon'},
    hills:[hsl(250,32,18),hsl(255,30,12),hsl(262,28,7)],ground:[hsl(248,26,15),hsl(258,28,8)],
    plant:{stem:hsl(250,20,26),stemLit:hsl(265,42,48),leaf:hsl(245,26,34),leafLit:hsl(280,46,54),petal:hsl(coolHue(r),75,70),petalCore:hsl(190,85,82)},
    fog:hsl(250,30,40),fogA:0.16,particle:'firefly',pCol:hsl(190,90,82),pRate:0.7,stars:1,godray:0,vignette:0.44,droopy:false})
};
const ARCHE_KEYS=['dawn','sunlit','ember','rain','gloom','twilight','nightbloom'];

// each archetype's ideal point in (valence, arousal, dynamics) space
const IDEAL={dawn:[0.74,0.30,0.18],sunlit:[0.88,0.88,0.35],ember:[0.24,0.78,0.50],
  rain:[0.33,0.34,0.46],gloom:[0.42,0.46,0.20],twilight:[0.82,0.46,0.38],nightbloom:[0.58,0.10,0.42]};
function buildWorld(fp,name){
  const rng=mulberry32(fp.seed);
  // widen the narrow raw features into a usable spread
  const v=clamp((fp.brightness-0.52)*2.6+0.5);
  const a=clamp((fp.energy-0.32)*1.95+0.48);
  const dyn=fp.dynamics;
  // pick the nearest mood-ideal, with seed noise so it stays song-driven but surprising
  let arche='dawn',best=1e9;
  for(const k of ARCHE_KEYS){const I=IDEAL[k];
    const dv=v-I[0],da=a-I[1],dd=dyn-I[2];
    const s=dv*dv+da*da+dd*dd*0.7+(rng()-0.5)*0.11;
    if(s<best){best=s;arche=k;}
  }
  const A=ARCHE[arche](rng,v,a,dyn);

  const branch=rng()<0.55?2:3;
  const depth=branch===3?(3+Math.round(a+rng())):(4+Math.round(a*1.2+rng()*1.4));
  const species={
    stalks:1+Math.round(a*1.8+rng()*1.4),
    depth,branch,
    spread:lerp(0.32,0.78,rng())*(A.droopy?0.7:1),
    droop:A.droopy?lerp(0.25,0.6,rng()):lerp(-0.04,0.12,rng()),
    lenBase:lerp(0.10,0.15,rng()),lenFall:lerp(0.74,0.82,rng()),
    curl:(rng()-0.5)*0.5,
    flower:['orb','star','bell','fan','willow'][(rng()*5)|0],
    flowerSize:lerp(0.6,1.25,rng())*(0.7+a*0.6),
    flowerDensity:clamp(0.45+v*0.4+dyn*0.3),
    leafShape:rng()<0.5?'oval':'blade'
  };
  const world={fp,name,v,a,dyn,arche,A,species,plants:[],particles:[],_wind:0.6};
  const baseY=H*0.9, spreadW=Math.min(W*0.5,120+species.stalks*70);
  for(let i=0;i<species.stalks;i++){
    const tx=species.stalks===1?0:lerp(-1,1,i/(species.stalks-1));
    const sx=W*0.5+tx*spreadW*0.5*(0.6+0.4*rng());
    const sr=mulberry32((fp.seed^(i*2654435761))>>>0);
    world.plants.push(makePlant(sx,baseY,species,A,sr,H));
  }
  return world;
}

function makePlant(x,baseY,sp,A,rng,Hh){
  const P=A.plant, nodes=[];
  const maxLen=Hh*sp.lenBase*(0.85+0.4*rng());
  const colFor=(depth)=>{const k=clamp(depth/sp.depth*0.7+0.2);return mixColor(P.stem,P.stemLit,k);};
  nodes.push({p:-1,depth:0,ang:(rng()-0.5)*0.12,len:maxLen,appear:0,col:colFor(0),seed:rng()*1000,leaf:false,flower:false});
  // appear is scheduled by depth into [0,0.80] so EVERYTHING fully blooms by
  // ~growth 0.96 and then holds — bounded, no infinite growth, flowers do open.
  function grow(parent,depth){
    if(depth>=sp.depth||nodes.length>620)return;
    const kids=depth===0?1:sp.branch;
    for(let c=0;c<kids;c++){
      if(nodes.length>620)break;
      const t=kids===1?0:(c/(kids-1)-0.5);
      const ang=t*sp.spread*2+sp.droop*depth*0.18+(rng()-0.5)*0.18+sp.curl*depth*0.12;
      const len=nodes[parent].len*sp.lenFall*(0.9+0.2*rng());
      const cd=depth+1;
      const appear=clamp(cd/sp.depth*0.78 + (rng()-0.5)*0.07, nodes[parent].appear+0.005, 0.80);
      const isTip=depth>=sp.depth-1;
      const side=Math.sign(t||(rng()-0.5))||1;
      const ni=nodes.length;
      const node={p:parent,depth:depth+1,ang,len,appear,col:colFor(depth+1),
        type:isTip?'tip':'branch',side,leaf:depth>=1&&rng()<0.55,
        flower:isTip&&rng()<sp.flowerDensity,seed:rng()*1000};
      if(node.leaf){const lk=A.light.x<0.5?(side<0?0.72:0.3):(side>0?0.72:0.3);node.leafCol=mixColor(P.leaf,P.leafLit,lk);}
      nodes.push(node);
      grow(ni,depth+1);
    }
  }
  grow(0,0);
  return{x,baseY,nodes,sp,scale:lerp(0.78,1.12,rng())*(sp.stalks>3?0.85:1),z:0.6+0.4*rng()};
}

let world=null, mode='intro', endedAt=0;

function spawnParticle(world,burst){
  const k=world.A.particle,p={kind:k,z:0.3+Math.random()*0.7};
  if(k==='rain'){p.x=Math.random()*W;p.y=-20-Math.random()*H*0.5;p.vy=520+Math.random()*260;p.vx=-30;p.len=12+Math.random()*16;}
  else if(k==='ember'||k==='firefly'){
    if(burst){p.x=burst.x;p.y=burst.y;p.vx=(Math.random()-0.5)*80;p.vy=-30-Math.random()*90;}
    else{p.x=Math.random()*W;p.y=H*0.55+Math.random()*H*0.5;p.vx=(Math.random()-0.5)*16;p.vy=-12-Math.random()*26;}
    p.decay=k==='ember'?0.0035:0.0022;p.r=(k==='ember'?1.4:1.8)+Math.random()*2;p.ph=Math.random()*TAU;p.life=1;
  }else{
    if(burst){p.x=burst.x;p.y=burst.y;p.vx=(Math.random()-0.5)*60;p.vy=-20-Math.random()*60;}
    else{p.x=Math.random()*W;p.y=Math.random()*H;p.vx=(Math.random()-0.5)*10;p.vy=-6-Math.random()*16;}
    p.decay=0.0016;p.r=1+Math.random()*2.4;p.ph=Math.random()*TAU;p.life=1;
  }
  world.particles.push(p);
}
function updateParticles(world,dt,t,wind){
  const A=world.A,P=world.particles,cap=340;
  let emit=A.particle==='rain'?A.pRate*dt*150*(0.5+Audio_.level):A.pRate*(0.4+Audio_.level*1.4)*dt*60;
  while(emit>0){if(P.length>=cap)break;if(emit>=1||Math.random()<emit)spawnParticle(world);emit-=1;}
  if(Audio_.beat>0.15&&(A.particle==='firefly'||A.particle==='ember'||A.particle==='pollen')){
    for(const pl of world.plants)for(const f of (pl._flowers||[]))if(Math.random()<0.5&&P.length<cap)spawnParticle(world,f);
  }
  for(let i=P.length-1;i>=0;i--){const p=P[i];
    if(p.kind==='rain'){p.x+=p.vx*dt;p.y+=p.vy*dt;if(p.y>H+10)P.splice(i,1);}
    else{p.vx+=Math.sin(t*0.6+p.ph)*6*dt+wind*22*dt*p.z;p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=p.decay*60*dt;
      if(p.kind==='ember')p.vy-=4*dt;if(p.life<=0||p.y<-30)P.splice(i,1);}
  }
}
function drawParticles(world){
  const A=world.A,P=world.particles;
  if(A.particle==='rain'){ctx.strokeStyle=A.pCol;ctx.lineWidth=1.1;
    for(const p of P){ctx.globalAlpha=0.18+p.z*0.35;ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x+p.vx*0.02,p.y+p.len*p.z);ctx.stroke();}
    ctx.globalAlpha=1;return;}
  ctx.globalCompositeOperation='lighter';const now=performance.now();
  for(const p of P){const a=clamp(p.life)*(0.4+p.z*0.6);const rr=p.r*(0.6+p.z)*4;
    let fl=p.kind==='firefly'?0.45+0.55*(0.5+0.5*Math.sin(now*0.005+p.ph)):1;
    ctx.globalAlpha=a*fl;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,rr);g.addColorStop(0,A.pCol);g.addColorStop(0.4,A.pCol);g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,rr,0,TAU);ctx.fill();}
  ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;
}
function drawSky(world){
  const A=world.A;
  const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,A.sky[0]);g.addColorStop(0.5,A.sky[1]);g.addColorStop(1,A.sky[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  if(A.stars>0){ctx.globalCompositeOperation='lighter';const rs=mulberry32(world.fp.seed^0x9e37);const n=120*A.stars|0;const now=performance.now();
    for(let i=0;i<n;i++){const x=rs()*W,y=rs()*H*0.62,r=rs()*1.3+0.2;ctx.globalAlpha=(0.5+0.5*Math.sin(now*0.002+i))*0.8*A.stars;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.fill();}
    ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;}
  const L=A.light,lx=L.x*W,ly=L.y*H,R=Math.min(W,H)*0.10*L.r,pulse=1+Audio_.level*0.25+Audio_.beatFlash*0.15;
  ctx.globalCompositeOperation='lighter';
  const gg=ctx.createRadialGradient(lx,ly,0,lx,ly,R*6*pulse);gg.addColorStop(0,L.glow);gg.addColorStop(0.18,withA(L.glow,0.5));gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.globalAlpha=0.55;ctx.fillStyle=gg;ctx.beginPath();ctx.arc(lx,ly,R*6*pulse,0,TAU);ctx.fill();ctx.globalAlpha=1;
  const cg=ctx.createRadialGradient(lx-R*0.3,ly-R*0.3,0,lx,ly,R);cg.addColorStop(0,'#fff');cg.addColorStop(0.6,L.col);cg.addColorStop(1,withA(L.col,0.6));
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(lx,ly,R*pulse,0,TAU);ctx.fill();
  if(A.godray>0){ctx.save();ctx.translate(lx,ly);const len=Math.max(W,H),now=performance.now();
    for(let i=0;i<10;i++){const ang=i/10*TAU+now*0.00004,wd=0.05+0.03*Math.sin(i*2.1);
      ctx.globalAlpha=A.godray*(0.05+0.05*Math.sin(now*0.001+i))*(0.6+Audio_.level);
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(ang-wd)*len,Math.sin(ang-wd)*len);ctx.lineTo(Math.cos(ang+wd)*len,Math.sin(ang+wd)*len);ctx.closePath();ctx.fillStyle=L.glow;ctx.fill();}
    ctx.restore();ctx.globalAlpha=1;}
  ctx.globalCompositeOperation='source-over';
  if(A.lightning&&Audio_.beatFlash>0.6&&Math.random()<0.22){ctx.globalAlpha=Audio_.beatFlash*0.35;ctx.fillStyle='rgba(255,240,210,1)';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
}
function drawHills(world){
  const A=world.A,now=performance.now();
  for(let layer=0;layer<3;layer++){
    const baseY=H*(0.66+layer*0.075),amp=H*(0.05+layer*0.03),seed=world.fp.seed^(layer*0x1111),rs=mulberry32(seed),off=now*0.00001*(layer+1);
    ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,baseY);
    for(let i=0;i<=8;i++){const x=i/8*W,y=baseY-(snoise(i*1.3+seed*0.001+off)*0.5+0.5)*amp-rs()*amp*0.3;ctx.lineTo(x,y);}
    ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle=A.hills[layer];ctx.fill();
    if(layer<2){ctx.globalAlpha=A.fogA*(1-layer*0.4);const fg=ctx.createLinearGradient(0,baseY-amp,0,baseY+amp);fg.addColorStop(0,withA(A.fog,0));fg.addColorStop(1,withA(A.fog,0.9));ctx.fillStyle=fg;ctx.fillRect(0,baseY-amp,W,amp*2.2);ctx.globalAlpha=1;}
  }
}
function drawGround(world){
  const A=world.A,gy=H*0.86;
  const g=ctx.createLinearGradient(0,gy,0,H);g.addColorStop(0,A.ground[0]);g.addColorStop(1,A.ground[1]);
  ctx.beginPath();ctx.moveTo(0,H);ctx.lineTo(0,gy+8);
  for(let i=0;i<=10;i++){const x=i/10*W,y=gy-snoise(i*0.9+world.fp.seed*0.01)*8;ctx.lineTo(x,y);}
  ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle=g;ctx.fill();
  const L=A.light;ctx.globalCompositeOperation='lighter';
  const lg=ctx.createRadialGradient(L.x*W,gy,0,L.x*W,gy,W*0.6);lg.addColorStop(0,withA(L.glow,0.12));lg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=lg;ctx.fillRect(0,gy-20,W,H-gy+20);ctx.globalCompositeOperation='source-over';
}
function drawPlant(world,pl,growth,wind,t){
  const sp=pl.sp,A=world.A,P=A.plant,nodes=pl.nodes,tip=new Array(nodes.length),scl=pl.scale,lightX=A.light.x;
  pl._flowers=[];
  ctx.globalAlpha=0.22;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(pl.x,pl.baseY+4,42*scl,9*scl,0,0,TAU);ctx.fill();ctx.globalAlpha=1;
  ctx.lineCap='round';
  for(let i=0;i<nodes.length;i++){
    const nd=nodes[i];
    if(growth<nd.appear-0.001){tip[i]=null;continue;}
    const f=clamp((growth-nd.appear)/0.16),ef=easeOut(f);
    const par=nd.p<0?{x:pl.x,y:pl.baseY,ang:0}:tip[nd.p];
    if(nd.p>=0&&!par){tip[i]=null;continue;}
    const swayAmp=wind*(0.02+nd.depth*0.05),sway=snoise(t*1.3+nd.seed+nd.depth*0.7)*swayAmp;
    const ang=par.ang+nd.ang+sway,len=nd.len*ef*scl;
    const ex=par.x+Math.sin(ang)*len,ey=par.y-Math.cos(ang)*len;
    tip[i]={x:ex,y:ey,ang};
    const w0=Math.max(1.0,(sp.depth-nd.depth+1)*1.6*scl),w1=Math.max(0.8,(sp.depth-nd.depth)*1.4*scl);
    ctx.strokeStyle=nd.col;ctx.lineWidth=(w0+w1)/2;
    ctx.beginPath();ctx.moveTo(par.x,par.y);ctx.lineTo(ex,ey);ctx.stroke();
    if(nd.depth>0&&f>0.4){ctx.globalAlpha=0.35;ctx.strokeStyle=P.stemLit;ctx.lineWidth=Math.max(0.6,w1*0.45);const ox=(lightX<0.5?-1:1)*0.8;ctx.beginPath();ctx.moveTo(par.x+ox,par.y);ctx.lineTo(ex+ox,ey);ctx.stroke();ctx.globalAlpha=1;}
    if(nd.leaf&&f>0.5)drawLeaf(par.x,par.y,ang,scl,nd,sp,ef);
    if(nd.flower&&f>0.6){pl._flowers.push({x:ex,y:ey});drawFlower(ex,ey,sp,P,scl,nd,ef,t);}
  }
}
function drawLeaf(x0,y0,ang,scl,nd,sp,ef){
  const size=(sp.leafShape==='blade'?7:5)*scl*(0.7+ef*0.6),dir=ang+(nd.side||1)*0.9;
  const ex=x0+Math.sin(dir)*size*2.2,ey=y0-Math.cos(dir)*size*2.2;
  ctx.fillStyle=nd.leafCol;
  const px=-Math.cos(dir),py=-Math.sin(dir),wlt=size*0.9;
  ctx.beginPath();ctx.moveTo(x0,y0);
  ctx.quadraticCurveTo(x0+px*wlt+Math.sin(dir)*size,y0+py*wlt-Math.cos(dir)*size,ex,ey);
  ctx.quadraticCurveTo(x0-px*wlt+Math.sin(dir)*size,y0-py*wlt-Math.cos(dir)*size,x0,y0);
  ctx.fill();
}
function drawFlower(x,y,sp,P,scl,nd,op,t){
  const beat=Audio_.beatFlash,lvl=Audio_.level;
  const size=6*sp.flowerSize*scl*op*(1+beat*0.18+lvl*0.12);
  const petals=sp.flower==='star'?5:sp.flower==='fan'?7:sp.flower==='willow'?0:6;
  ctx.save();ctx.translate(x,y);
  ctx.globalCompositeOperation='lighter';
  const glowR=size*(3.2+beat*1.5+lvl);
  const gg=ctx.createRadialGradient(0,0,0,0,0,glowR);gg.addColorStop(0,withA(P.petalCore,0.55*op));gg.addColorStop(0.4,withA(P.petal,0.18*op));gg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=gg;ctx.beginPath();ctx.arc(0,0,glowR,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';
  if(sp.flower==='willow'){ctx.strokeStyle=withA(P.petal,0.85*op);ctx.lineWidth=1.4*scl;ctx.lineCap='round';
    for(let i=0;i<5;i++){const a=(i/5-0.5)*1.2;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(Math.sin(a)*size,size*1.2,Math.sin(a)*size*1.4,size*3.2*(0.8+0.2*Math.sin(t+nd.seed)));ctx.stroke();}}
  else{const petalCore=mixColor(P.petal,P.petalCore,0.6),petalDark=mixColor(P.petal,'hsl(0,0%,8%)',0.25);
    for(let i=0;i<petals;i++){ctx.save();ctx.rotate(i/petals*TAU+nd.seed);
      const pl_=size*(sp.flower==='fan'?1.6:1.25),pw=size*(sp.flower==='star'?0.36:0.7);
      const g=ctx.createLinearGradient(0,0,0,-pl_);g.addColorStop(0,petalDark);g.addColorStop(0.5,P.petal);g.addColorStop(1,petalCore);
      ctx.fillStyle=g;ctx.globalAlpha=op;ctx.beginPath();ctx.moveTo(0,0);ctx.quadraticCurveTo(pw,-pl_*0.5,0,-pl_);ctx.quadraticCurveTo(-pw,-pl_*0.5,0,0);ctx.fill();ctx.restore();}}
  ctx.globalCompositeOperation='lighter';
  const cR=size*0.6*(1+beat*0.3),cg=ctx.createRadialGradient(0,0,0,0,0,cR);cg.addColorStop(0,'#fff');cg.addColorStop(0.5,P.petalCore);cg.addColorStop(1,withA(P.petalCore,0));
  ctx.fillStyle=cg;ctx.globalAlpha=op;ctx.beginPath();ctx.arc(0,0,cR,0,TAU);ctx.fill();
  ctx.globalCompositeOperation='source-over';ctx.restore();
}
function drawVignette(world){
  const A=world.A;
  const g=ctx.createRadialGradient(W*0.5,H*0.45,Math.min(W,H)*0.2,W*0.5,H*0.5,Math.max(W,H)*0.75);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,`rgba(0,0,0,${A.vignette})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=A.fogA*0.25;ctx.fillStyle=withA(A.fog,1);ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
}

let last=performance.now();
function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(now-last)/1000);last=now;
  if(!world){ctx.fillStyle='#08070f';ctx.fillRect(0,0,W,H);return;}
  Audio_.sample();
  const t=now*0.001;
  let growth=easeOut(clamp(Audio_.progress()*1.04));
  if(!Audio_.playing&&Audio_.duration>0&&Audio_.curTime()>=Audio_.duration-0.3)growth=1;
  let targetWind;
  if(Audio_.playing)targetWind=0.5+Audio_.level*5.2+Audio_.bass*2.0;
  else{const since=(now-endedAt)/1000;targetWind=(endedAt&&since>2)?0.18:0.6;}
  world._wind=mix(world._wind,targetWind,0.05);

  drawSky(world);drawHills(world);drawGround(world);
  updateParticles(world,dt,t,world._wind*0.04);
  if(world.A.particle==='rain')drawParticles(world);
  const order=world.plants.slice().sort((a,b)=>a.z-b.z);
  for(const pl of order)drawPlant(world,pl,growth,world._wind,t);
  if(world.A.particle!=='rain')drawParticles(world);
  drawVignette(world);
  if(mode==='play')npBar.style.width=(Audio_.progress()*100)+'%';
}
requestAnimationFrame(frame);

const intro=document.getElementById('intro'),hud=document.getElementById('hud'),gardenView=document.getElementById('gardenView');
const npName=document.getElementById('npName'),npMood=document.getElementById('npMood'),npBar=document.getElementById('npBar'),toGarden2=document.getElementById('toGarden2');
const show=el=>el.classList.remove('hidden'),hide=el=>el.classList.add('hidden');
let keptThis=false;

async function startFromArrayBuffer(ab,name){
  intro.style.pointerEvents='none';
  try{
    const buf=await Audio_.load(ab);
    const fp=fingerprint(buf,name);
    world=buildWorld(fp,name);keptThis=false;endedAt=0;
    Audio_.reset();Audio_.play(onSongEnd);mode='play';
    npName.textContent=name;npMood.textContent='· '+world.A.label;
    document.getElementById('pauseBtn').textContent='暂停';
    hide(intro);show(hud);show(toGarden2);
  }catch(e){console.error(e);alert('这首歌没读出来，换一首试试？\n'+(e.message||e));intro.style.pointerEvents='';}
}
function onSongEnd(){endedAt=performance.now();if(!keptThis)keepCurrent(false);}

const drop=document.getElementById('drop'),fileInput=document.getElementById('file');
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);});
['dragenter','dragover'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==='drop'){const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio'))readFile(f);}drop.classList.remove('hot');}));
function readFile(f){Audio_.ensure();const r=new FileReader();r.onload=()=>startFromArrayBuffer(r.result,f.name.replace(/\.[^.]+$/,''));r.readAsArrayBuffer(f);}

/* ---------- collection ---------- */
const STORE='musicgarden.v1';
const loadG=()=>{try{return JSON.parse(localStorage.getItem(STORE))||[];}catch(e){return[];}};
const saveG=g=>localStorage.setItem(STORE,JSON.stringify(g.slice(-60)));
function keepCurrent(manual){
  if(!world)return;
  const g=loadG();
  if(g.some(x=>x.seed===world.fp.seed)){if(manual)flash('这一株已经在花园里了');return;}
  g.push({seed:world.fp.seed,name:world.name,when:Date.now(),e:world.fp.energy,b:world.fp.brightness,d:world.fp.dynamics,dur:world.fp.duration,arche:world.arche,label:world.A.label});
  saveG(g);keptThis=true;if(manual)flash('已收进花园 🌱');
}
function flash(msg){const d=document.createElement('div');d.textContent=msg;d.style.cssText='position:fixed;left:50%;top:22%;transform:translateX(-50%);background:rgba(20,18,34,.85);border:1px solid var(--line);padding:10px 18px;border-radius:999px;z-index:30;font-size:14px;backdrop-filter:blur(8px);transition:.5s;';document.body.appendChild(d);setTimeout(()=>d.style.opacity='0',1400);setTimeout(()=>d.remove(),2000);}

/* ---------- garden view ---------- */
function openGarden(){mode='garden';Audio_.pause();if(world){document.getElementById('pauseBtn').textContent='继续';}buildGardenGrid();hide(intro);hide(hud);show(gardenView);}
document.getElementById('toGarden').onclick=openGarden;
toGarden2.onclick=()=>{if(!keptThis)keepCurrent(false);openGarden();};
document.getElementById('backBtn').onclick=()=>{hide(gardenView);if(world){show(hud);show(toGarden2);mode='play';}else{show(intro);intro.style.pointerEvents='';mode='intro';}};
function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function buildGardenGrid(){
  const g=loadG(),grid=document.getElementById('grid'),sub=document.getElementById('gardenSub');grid.innerHTML='';
  if(!g.length){sub.textContent='';grid.innerHTML='<div class="empty">花园还是空的 🌑<br>回去听一首歌，它会在这里长出来。</div>';return;}
  sub.textContent=`你听过的 ${g.length} 首歌，都在这里长着。`;
  g.slice().reverse().forEach(item=>{
    const card=document.createElement('div');card.className='card';
    const cv=document.createElement('canvas');cv.width=380;cv.height=300;card.appendChild(cv);
    const meta=document.createElement('div');meta.className='meta';const dt=new Date(item.when);
    meta.innerHTML=`<div class="mname">${escapeHtml(item.name)}</div><div class="mwhen">${item.label} · ${dt.getMonth()+1}月${dt.getDate()}日</div>`;card.appendChild(meta);
    const del=document.createElement('button');del.className='del';del.textContent='×';del.onclick=e=>{e.stopPropagation();saveG(loadG().filter(x=>x.seed!==item.seed));buildGardenGrid();};card.appendChild(del);
    card.onclick=()=>flash('这是「'+item.name+'」长成的样子 · 想再听就回去丢一次这首歌');
    grid.appendChild(card);renderThumb(cv,item);
  });
}
function renderThumb(cv,item){
  const fp={energy:item.e,brightness:item.b,dynamics:item.d,seed:item.seed,duration:item.dur};
  const sW=W,sH=H;W=cv.width;H=cv.height;const wo=buildWorld(fp,item.name);W=sW;H=sH;
  thumbDraw(cv.getContext('2d'),wo,cv.width,cv.height);
}
function thumbDraw(c,wo,w,h){
  const A=wo.A;
  const g=c.createLinearGradient(0,0,0,h);g.addColorStop(0,A.sky[0]);g.addColorStop(0.5,A.sky[1]);g.addColorStop(1,A.sky[2]);c.fillStyle=g;c.fillRect(0,0,w,h);
  const L=A.light,lx=L.x*w,ly=L.y*h,R=Math.min(w,h)*0.12*L.r;
  c.globalCompositeOperation='lighter';
  const gg=c.createRadialGradient(lx,ly,0,lx,ly,R*5);gg.addColorStop(0,withA(L.glow,0.6));gg.addColorStop(1,'rgba(0,0,0,0)');c.fillStyle=gg;c.beginPath();c.arc(lx,ly,R*5,0,TAU);c.fill();
  const cg=c.createRadialGradient(lx,ly,0,lx,ly,R);cg.addColorStop(0,'#fff');cg.addColorStop(1,L.col);c.fillStyle=cg;c.beginPath();c.arc(lx,ly,R,0,TAU);c.fill();
  c.globalCompositeOperation='source-over';
  for(let layer=0;layer<3;layer++){const baseY=h*(0.6+layer*0.08),amp=h*(0.06+layer*0.03);c.beginPath();c.moveTo(0,h);c.lineTo(0,baseY);
    for(let i=0;i<=8;i++){const x=i/8*w,y=baseY-(snoise(i*1.3+wo.fp.seed*0.001+layer)*0.5+0.5)*amp;c.lineTo(x,y);}c.lineTo(w,h);c.closePath();c.fillStyle=A.hills[layer];c.fill();}
  const gy=h*0.84,gr=c.createLinearGradient(0,gy,0,h);gr.addColorStop(0,A.ground[0]);gr.addColorStop(1,A.ground[1]);c.fillStyle=gr;c.fillRect(0,gy,w,h-gy);
  for(const pl of wo.plants)thumbPlant(c,wo,pl);
  const vg=c.createRadialGradient(w/2,h*0.4,h*0.2,w/2,h/2,h*0.8);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(0,0,0,${A.vignette})`);c.fillStyle=vg;c.fillRect(0,0,w,h);
}
function thumbPlant(c,wo,pl){
  const sp=pl.sp,P=wo.A.plant,nodes=pl.nodes,tip=new Array(nodes.length),scl=pl.scale;
  for(let i=0;i<nodes.length;i++){const nd=nodes[i];const par=nd.p<0?{x:pl.x,y:pl.baseY,ang:0}:tip[nd.p];if(nd.p>=0&&!par){tip[i]=null;continue;}
    const ang=par.ang+nd.ang,len=nd.len*scl,ex=par.x+Math.sin(ang)*len,ey=par.y-Math.cos(ang)*len;tip[i]={x:ex,y:ey,ang};
    c.strokeStyle=nd.col;c.lineWidth=Math.max(0.6,(sp.depth-nd.depth)*1.2*scl);c.lineCap='round';c.beginPath();c.moveTo(par.x,par.y);c.lineTo(ex,ey);c.stroke();
    if(nd.flower){const fs=4*sp.flowerSize*scl;c.globalCompositeOperation='lighter';const gg=c.createRadialGradient(ex,ey,0,ex,ey,fs*4);gg.addColorStop(0,withA(P.petalCore,0.7));gg.addColorStop(1,'rgba(0,0,0,0)');c.fillStyle=gg;c.beginPath();c.arc(ex,ey,fs*4,0,TAU);c.fill();c.globalCompositeOperation='source-over';c.fillStyle=P.petal;c.beginPath();c.arc(ex,ey,fs,0,TAU);c.fill();c.fillStyle=P.petalCore;c.beginPath();c.arc(ex,ey,fs*0.45,0,TAU);c.fill();}}
}
