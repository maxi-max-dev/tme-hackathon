<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>音乐花园 · 一首歌长成一座能走进去的岛</title>
<style>
  :root{--ink:#f3f0ff;--muted:#a7a3c4;--line:rgba(255,255,255,.10);--glass:rgba(18,16,30,.55);
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#05050c;color:var(--ink);font-family:var(--font);}
  #gl{position:fixed;inset:0;display:block;touch-action:none;}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    text-align:center;padding:24px;z-index:10;transition:opacity .6s;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  #intro .kicker{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
  #intro h1{font-size:clamp(26px,5.4vw,50px);font-weight:800;margin:0 0 14px;
    background:linear-gradient(120deg,#fff,#c9bcff 55%,#7ad7ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #intro p.sub{color:var(--muted);font-size:15.5px;margin:0 0 30px;max-width:470px;line-height:1.7;}
  .drop{width:min(440px,86vw);border:1.5px dashed rgba(255,255,255,.22);border-radius:22px;padding:26px 24px;
    background:rgba(255,255,255,.03);cursor:pointer;transition:.25s;backdrop-filter:blur(6px);}
  .drop:hover,.drop.hot{border-color:rgba(160,200,255,.7);background:rgba(120,160,255,.10);transform:translateY(-2px);}
  .drop .big{font-size:18px;font-weight:700;margin-bottom:6px;}
  .drop .small{font-size:12.5px;color:var(--muted);}
  .or{margin:22px 0 12px;color:var(--muted);font-size:12px;letter-spacing:.2em;}
  .seeds{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:560px;}
  .seed{border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--ink);padding:8px 15px;border-radius:999px;
    font-size:13.5px;cursor:pointer;transition:.18s;}
  .seed:hover{background:rgba(255,255,255,.13);transform:translateY(-2px);}
  .seed .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;box-shadow:0 0 8px currentColor;}
  #hud{position:fixed;left:0;right:0;bottom:0;z-index:8;padding:16px 20px 18px;
    background:linear-gradient(180deg,transparent,rgba(5,5,12,.55));transition:opacity .5s,transform .5s;
    display:flex;flex-direction:column;gap:9px;align-items:center;}
  #hud.hidden{opacity:0;pointer-events:none;transform:translateY(14px);}
  .npline{display:flex;align-items:baseline;gap:11px;justify-content:center;flex-wrap:wrap;}
  .npname{font-size:15px;font-weight:700;max-width:62vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .npmood{font-size:12px;color:var(--muted);}
  .bar{width:min(540px,82vw);height:3.5px;border-radius:4px;background:rgba(255,255,255,.14);overflow:hidden;}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#9b8cff,#7ad7ff);box-shadow:0 0 12px rgba(140,180,255,.7);}
  .ctrls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .btn{border:1px solid var(--line);background:var(--glass);color:var(--ink);backdrop-filter:blur(8px);border-radius:999px;
    padding:7px 14px;font-size:13px;cursor:pointer;transition:.18s;}
  .btn:hover{background:rgba(255,255,255,.14);}
  #hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:8;font-size:12.5px;color:var(--muted);
    background:rgba(10,10,20,.5);border:1px solid var(--line);border-radius:999px;padding:6px 15px;backdrop-filter:blur(8px);
    transition:opacity .8s;pointer-events:none;}
  #hint.gone{opacity:0;}
  .toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);background:rgba(18,16,30,.85);border:1px solid var(--line);
    padding:9px 18px;border-radius:999px;z-index:30;font-size:13.5px;backdrop-filter:blur(8px);transition:.5s;}
  #err{position:fixed;left:12px;bottom:12px;z-index:40;color:#ff9ab0;font:12px monospace;max-width:80vw;white-space:pre-wrap;}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="overlay" id="intro">
  <div class="kicker">音 乐 花 园</div>
  <h1>一首歌，长成一座能走进去的岛</h1>
  <p class="sub">丢一首歌进来。它会一边放，一边在这座岛上长出只属于它的活物——花、树、晶体、光灵，看歌的情绪而定。你能俯瞰它、绕着看、伸手去拨。听过的歌，都留在这座越来越大的岛上。</p>
  <label class="drop" id="drop">
    <div class="big">把歌拖进来，或点这里选一首</div>
    <div class="small">mp3 / wav / m4a / flac · 全在你本机播放，不上传</div>
    <input type="file" id="file" accept="audio/*" hidden>
  </label>
  <div class="or">— 或者，先试试这些 —</div>
  <div class="seeds" id="seeds"></div>
</div>

<div id="hint">拖动旋转俯瞰 · 滚轮/双指缩放 · 挥过岛面拨花草 · 点一株回到那首歌</div>

<div id="hud" class="hidden">
  <div class="npline"><span class="npname" id="npName">—</span><span class="npmood" id="npMood"></span></div>
  <div class="bar"><i id="npBar"></i></div>
  <div class="ctrls">
    <button class="btn" id="pauseBtn">暂停</button>
    <button class="btn" id="newBtn">换一首</button>
    <button class="btn" id="overviewBtn">看全岛</button>
  </div>
</div>
<div id="err"></div>

<script src="vendor/three.min.js"></script>
<script>
"use strict";
window.onerror=(m,s,l)=>{document.getElementById('err').textContent='err: '+m+' @'+l;};
const TAU=Math.PI*2, clamp=(x,a=0,b=1)=>x<a?a:x>b?b:x, lerp=(a,b,t)=>a+(b-a)*t, mix=lerp, easeOut=t=>1-Math.pow(1-t,3);
function mulberry32(s){let a=s>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}

/* =========================================================================
   AUDIO  (one-pass fingerprint + live FFT)
   ========================================================================= */
const Audio_={
  ac:null,src:null,analyser:null,buf:null,freq:null,startT:0,pauseT:0,playing:false,duration:0,
  bass:0,mid:0,treble:0,level:0,energyHist:[],beat:0,beatFlash:0,lastBeat:-1,
  ensure(){if(!this.ac)this.ac=new (window.AudioContext||window.webkitAudioContext)();if(this.ac.state==='suspended')this.ac.resume();},
  async load(ab){this.ensure();this.buf=await this.ac.decodeAudioData(ab);this.duration=this.buf.duration;return this.buf;},
  play(onEnd){this.stopNode();const s=this.ac.createBufferSource();s.buffer=this.buf;
    const an=this.ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.78;const g=this.ac.createGain();g.gain.value=0.9;
    s.connect(an);an.connect(g);g.connect(this.ac.destination);this.src=s;this.analyser=an;this.freq=new Uint8Array(an.frequencyBinCount);
    s.onended=()=>{if(this.playing&&this.curTime()>=this.duration-0.25){this.playing=false;onEnd&&onEnd();}};
    const off=this.pauseT||0;s.start(0,off);this.startT=this.ac.currentTime-off;this.playing=true;this.energyHist.length=0;},
  stopNode(){if(this.src){try{this.src.onended=null;this.src.stop();}catch(e){}this.src=null;}},
  pause(){if(!this.playing)return;this.pauseT=this.curTime();this.playing=false;this.stopNode();},
  resume(onEnd){if(this.playing)return;this.play(onEnd);},
  reset(){this.stopNode();this.playing=false;this.pauseT=0;this.startT=0;},
  curTime(){return this.playing?Math.min(this.duration,this.ac.currentTime-this.startT):(this.pauseT||0);},
  progress(){return this.duration?clamp(this.curTime()/this.duration):0;},
  sample(){if(!this.analyser){this.bass=this.mid=this.treble=this.level=0;this.beat=0;return;}
    this.analyser.getByteFrequencyData(this.freq);const f=this.freq,n=f.length;let b=0,m=0,t=0;const bE=8,mE=64,tE=Math.min(n,260);
    for(let i=1;i<bE;i++)b+=f[i];for(let i=bE;i<mE;i++)m+=f[i];for(let i=mE;i<tE;i++)t+=f[i];
    b/=(bE-1)*255;m/=(mE-bE)*255;t/=(tE-mE)*255;const k=this.playing?0.35:0.08;
    this.bass=mix(this.bass,b,k);this.mid=mix(this.mid,m,k);this.treble=mix(this.treble,t,k);this.level=mix(this.level,(b*1.1+m+t*0.8)/3,k);
    const e=b*1.4+m*0.6;const h=this.energyHist;h.push(e);if(h.length>43)h.shift();let avg=0;for(let i=0;i<h.length;i++)avg+=h[i];avg/=Math.max(1,h.length);
    let vc=0;for(let i=0;i<h.length;i++){const d=h[i]-avg;vc+=d*d;}vc/=Math.max(1,h.length);
    const th=avg*1.32+Math.sqrt(vc)*0.6+0.02,now=this.ac.currentTime;this.beat=0;
    if(this.playing&&e>th&&now-this.lastBeat>0.16&&e>0.06){this.beat=clamp(e*1.4);this.beatFlash=1;this.lastBeat=now;}this.beatFlash*=0.9;}
};
function fingerprint(buf,name){
  const ch=buf.getChannelData(0),N=ch.length,step=Math.max(1,Math.floor(N/24000));
  let sumSq=0,hf=0,cnt=0,prev=0,hashAcc=2166136261^Math.floor(buf.duration*1000);
  const wc=64,env=new Float32Array(wc),perWin=Math.max(1,Math.floor(N/wc));
  for(let i=0;i<N;i+=step){const s=ch[i];sumSq+=s*s;hf+=Math.abs(s-prev);prev=s;cnt++;
    if((cnt&255)===0){hashAcc^=Math.floor(s*32768)&0xffff;hashAcc=Math.imul(hashAcc,16777619);}env[Math.min(wc-1,Math.floor(i/perWin))]+=s*s;}
  const rms=Math.sqrt(sumSq/Math.max(1,cnt)),bright=(hf/Math.max(1,cnt))/(rms+1e-4);
  let em=0;for(let i=0;i<wc;i++){env[i]=Math.sqrt(env[i]/perWin*step);em+=env[i];}em/=wc;
  let ev=0;for(let i=0;i<wc;i++){const d=env[i]-em;ev+=d*d;}ev=Math.sqrt(ev/wc);
  return{energy:clamp(rms*3.4),brightness:clamp(bright*0.62),dynamics:clamp((ev/(em+1e-4))*0.9),seed:(hashAcc^hashStr(name||'song'))>>>0,duration:buf.duration};
}

/* =========================================================================
   MOOD  (deterministic palette/weather + form bias from fingerprint)
   colors are hex ints for THREE.Color
   ========================================================================= */
const MOODS={
  dawn:{label:'平静·明亮',skyT:0xf7c9d8,skyB:0x6a5aa0,sun:0xffe6c0,sunDir:[-0.6,0.5,-0.3],
    fog:0xd9b8d0,fogD:0.012,dir:0xffd9b0,dirI:1.7,amb:0x6a6a90,ambI:0.55,hemiSky:0xffd9e6,hemiGround:0x3a5a3a,
    ground:0x6f8f55,accent:0xff90b8,particle:'pollen',pCol:0xffe09a,night:false,forms:{flora:3,lantern:2,terrain:1,crystal:0,spirit:0}},
  sunlit:{label:'热烈·明亮',skyT:0x8fd0ff,skyB:0x3aa0b0,sun:0xfff2c0,sunDir:[0.6,0.6,-0.2],
    fog:0xbfe8e0,fogD:0.009,dir:0xfff0c8,dirI:2.0,amb:0x88a0a0,ambI:0.55,hemiSky:0xbfeaff,hemiGround:0x4a6a32,
    ground:0x7aa048,accent:0xffd24a,particle:'firefly',pCol:0xfff0a0,night:false,forms:{flora:4,lantern:1,terrain:1,crystal:0,spirit:0}},
  ember:{label:'激烈·暗',skyT:0x4a1830,skyB:0x14060f,sun:0xff7a3a,sunDir:[0.3,0.35,-0.2],
    fog:0x2a0e18,fogD:0.02,dir:0xff8a40,dirI:1.6,amb:0x40202a,ambI:0.4,hemiSky:0x5a2030,hemiGround:0x200810,
    ground:0x4a2a2a,accent:0xff7a30,particle:'ember',pCol:0xff8a40,night:true,forms:{crystal:4,flora:1,terrain:1,lantern:1,spirit:0}},
  rain:{label:'平静·暗',skyT:0x3a5a86,skyB:0x101a2e,sun:0x9ec4e6,sunDir:[0.5,0.55,-0.3],
    fog:0x2a3a52,fogD:0.02,dir:0xbcd6f0,dirI:1.1,amb:0x40506a,ambI:0.55,hemiSky:0x5a7090,hemiGround:0x223040,
    ground:0x46586a,accent:0x9ad0ff,particle:'rain',pCol:0xbfe0ff,night:true,forms:{spirit:3,lantern:2,terrain:1,flora:1,crystal:0}},
  gloom:{label:'低沉·雾',skyT:0x6a6480,skyB:0x222030,sun:0xb0a8c8,sunDir:[-0.4,0.45,-0.3],
    fog:0x4a4660,fogD:0.03,dir:0xc4bce0,dirI:1.0,amb:0x50506a,ambI:0.6,hemiSky:0x807a98,hemiGround:0x303040,
    ground:0x55556a,accent:0xc69aff,particle:'spore',pCol:0xd8c0ff,night:false,forms:{spirit:3,terrain:2,lantern:1,crystal:1,flora:0}},
  twilight:{label:'流动·暮',skyT:0x7a4ab0,skyB:0x241640,sun:0xffd070,sunDir:[0.7,0.4,-0.2],
    fog:0x46306a,fogD:0.015,dir:0xffc070,dirI:1.5,amb:0x50406a,ambI:0.5,hemiSky:0x8a5ac0,hemiGround:0x342050,
    ground:0x5a4a72,accent:0xff9ad0,particle:'firefly',pCol:0xffd070,night:true,forms:{lantern:3,crystal:2,flora:1,spirit:1,terrain:0}},
  nightbloom:{label:'静·夜光',skyT:0x2a2a60,skyB:0x0a0a1e,sun:0xdfe6ff,sunDir:[-0.5,0.5,-0.3],
    fog:0x161636,fogD:0.018,dir:0xc0caff,dirI:1.0,amb:0x303058,ambI:0.5,hemiSky:0x4a4a90,hemiGround:0x18182e,
    ground:0x3a3a5a,accent:0x7af0ff,particle:'firefly',pCol:0x9af0ff,night:true,forms:{lantern:3,spirit:2,crystal:1,flora:1,terrain:0}}
};
const MKEYS=Object.keys(MOODS);
const IDEAL={dawn:[0.74,0.30,0.18],sunlit:[0.88,0.88,0.35],ember:[0.24,0.78,0.50],rain:[0.33,0.34,0.46],gloom:[0.42,0.46,0.20],twilight:[0.82,0.46,0.38],nightbloom:[0.58,0.10,0.42]};
function genSpec(fp,name){
  const rng=mulberry32(fp.seed);
  const v=clamp((fp.brightness-0.52)*2.6+0.5), a=clamp((fp.energy-0.32)*1.95+0.48), dyn=fp.dynamics;
  let mood='dawn',best=1e9;
  for(const k of MKEYS){const I=IDEAL[k];const dv=v-I[0],da=a-I[1],dd=dyn-I[2];const s=dv*dv+da*da+dd*dd*0.7+(rng()-0.5)*0.11;if(s<best){best=s;mood=k;}}
  const M=MOODS[mood];
  // weighted form pick (seeded) -> surprise within mood
  const fw=M.forms;let tot=0;for(const k in fw)tot+=fw[k];let r=rng()*tot,form='flora';for(const k in fw){r-=fw[k];if(r<=0){form=k;break;}}
  if(form==='terrain')form=rng()<0.5?'flora':'lantern';   // 'terrain' has no geometry yet — use a real, visible form
  const params={
    height:lerp(0.8,1.0,a)*lerp(0.9,1.25,rng()),
    bushiness:0.5+a*0.5+rng()*0.3,
    count:2+Math.round(a*2+rng()*2),
    hueJit:(rng()-0.5),
    big:rng()<0.5

  return {fp,name,v,a,dyn,mood,M,form,params,seed:fp.seed};
}

/* =========================================================================
   THREE setup
   ========================================================================= */
let renderer,scene,camera,sky,skyCanvas,skyTex,island,islandTop,keyLight,hemi,ambient,sunSprite,cursorLight,cursorGlow,rippleSprite;
let W=innerWidth,H=innerHeight;
const ISLAND_TOP_Y=0;            // top surface plane height
let islandR=10;
const Cam={r:34,az:0.9,po:0.86,tr:34,taz:0.9,tpo:0.86,target:new THREE.Vector3(0,2,0),ttarget:new THREE.Vector3(0,2,0)};
let glowTex,ringTex;

function makeGlowTex(){
  const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,0,64,64,64);gr.addColorStop(0,'rgba(255,255,255,0.95)');gr.addColorStop(0.16,'rgba(255,255,255,0.5)');gr.addColorStop(0.42,'rgba(255,255,255,0.12)');gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr;g.fillRect(0,0,128,128);const t=new THREE.CanvasTexture(c);return t;
}
function makeRingTex(){
  const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');
  g.strokeStyle='rgba(255,255,255,1)';g.lineWidth=7;g.beginPath();g.arc(64,64,52,0,TAU);g.stroke();
  const t=new THREE.CanvasTexture(c);return t;
}
function initGL(){
  const canvas=document.getElementById('gl');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
  renderer.setSize(W,H,false);
  renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=0.82;
  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(46,W/H,0.1,2000);
  glowTex=makeGlowTex();ringTex=makeRingTex();

  // sky dome — color-managed gradient texture (tone-mapping off so colors read as authored)
  skyCanvas=document.createElement('canvas');skyCanvas.width=8;skyCanvas.height=256;
  skyTex=new THREE.CanvasTexture(skyCanvas);skyTex.encoding=THREE.sRGBEncoding;skyTex.minFilter=THREE.LinearFilter;skyTex.generateMipmaps=false;
  sky=new THREE.Mesh(new THREE.SphereGeometry(600,32,16),new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide,fog:false,depthWrite:false,toneMapped:false}));
  scene.add(sky);
  sunSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,depthTest:false,transparent:true,opacity:0.42}));
  sunSprite.scale.setScalar(16);scene.add(sunSprite);

  // lights
  hemi=new THREE.HemisphereLight(0x88aacc,0x335533,0.6);scene.add(hemi);
  ambient=new THREE.AmbientLight(0x404060,0.5);scene.add(ambient);
  keyLight=new THREE.DirectionalLight(0xffffff,1.6);keyLight.castShadow=true;
  keyLight.shadow.mapSize.set(2048,2048);keyLight.shadow.camera.near=1;keyLight.shadow.camera.far=120;
  keyLight.shadow.camera.left=-30;keyLight.shadow.camera.right=30;keyLight.shadow.camera.top=30;keyLight.shadow.camera.bottom=-30;
  keyLight.shadow.bias=-0.0006;keyLight.shadow.radius=4;scene.add(keyLight);scene.add(keyLight.target);

  // floating island
  island=new THREE.Group();scene.add(island);
  const topGeo=new THREE.CylinderGeometry(islandR,islandR*0.97,1.4,80,1);
  // gentle bump on top vertices
  const pos=topGeo.attributes.position;const rng=mulberry32(12345);
  for(let i=0;i<pos.count;i++){const y=pos.getY(i);if(y>0.6){const x=pos.getX(i),z=pos.getZ(i);pos.setY(i,y+Math.sin(x*0.7)*0.1+Math.cos(z*0.8)*0.1);}}
  topGeo.computeVertexNormals();
  islandTop=new THREE.Mesh(topGeo,new THREE.MeshStandardMaterial({color:0x6f8f55,roughness:0.95,metalness:0.0}));
  islandTop.position.y=ISLAND_TOP_Y-0.7;islandTop.receiveShadow=true;island.add(islandTop);
  const rock=new THREE.Mesh(new THREE.CylinderGeometry(islandR*0.97,islandR*0.18,9,40,1),new THREE.MeshStandardMaterial({color:0x3a2f3a,roughness:1,metalness:0}));
  rock.position.y=ISLAND_TOP_Y-5.6;rock.castShadow=false;island.add(rock);

  // cursor light + glow decal + ripple
  cursorLight=new THREE.PointLight(0xfff0d0,0,18,2);scene.add(cursorLight);
  cursorGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0}));
  cursorGlow.scale.setScalar(7);cursorGlow.rotation.z=0;scene.add(cursorGlow);
  rippleSprite=new THREE.Sprite(new THREE.SpriteMaterial({map:ringTex,color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0}));
  rippleSprite.scale.setScalar(2);scene.add(rippleSprite);

  applyMood(MOODS.nightbloom);
  addEventListener('resize',onResize);onResize();
}

/* =========================================================================

   ========================================================================= */
function glowSprite(colorHex,scale){const s=new THREE.Sprite(new THREE.SpriteMaterial({map:glowTex,color:colorHex,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true}));s.scale.setScalar(scale);return s;}

  const accent=new THREE.Color(M.accent), accent2=new THREE.Color(M.accent).offsetHSL(P.hueJit*0.12,0,0.06);
  const thing={group,bend,form:spec.form,spec,blossoms:[],meshes:[],swx:0,swz:0,vx:0,vz:0,lit:0,grown:0,
    glowMats:[],beatMats:[]};

  function blossom(x,y,z,col,sc){const s=glowSprite(col,sc);s.position.set(x,y,z);bend.add(s);thing.blossoms.push({sprite:s,present:true,pop:1,base:sc,home:new THREE.Vector3(x,y,z)});return s;}
  function branch(x0,y0,z0,x1,y1,z1,r0,r1,colorHex){
    const dir=new THREE.Vector3(x1-x0,y1-y0,z1-z0);const len=dir.length();
    const geo=new THREE.CylinderGeometry(r1,r0,len,6,1);
    const mesh=new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:colorHex,roughness:0.85,metalness:0.05}));
    mesh.castShadow=true;mesh.position.set((x0+x1)/2,(y0+y1)/2,(z0+z1)/2);
    mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());bend.add(mesh);thing.meshes.push(mesh);return mesh;
  }

  const h=P.height*spec.M; // placeholder; real height below

    const H0=4.6*P.height, stemCol=0x6b4a2f;
    const leafA=new THREE.Color(M.ground).offsetHSL(0.02,0.25,0.07);
    const leafB=leafA.clone().offsetHSL(0.015,0,-0.08);
    const leafGeo=new THREE.IcosahedronGeometry(1,0);
    function leafBall(x,y,z,sc,col){const m=new THREE.Mesh(leafGeo,new THREE.MeshStandardMaterial({color:col,roughness:0.9,flatShading:true}));m.position.set(x,y,z);m.scale.setScalar(sc);m.castShadow=true;m.receiveShadow=true;bend.add(m);thing.meshes.push(m);}

        leafBall(nx+(rng()-0.5)*0.7,ny+0.2,nz+(rng()-0.5)*0.7,(0.85+rng()*0.7)*(P.big?1.2:1),(rng()<0.5?leafA:leafB).getHex());
        if(rng()<0.6){const col=(rng()<0.5?accent:accent2).getHex();blossom(nx+(rng()-0.5)*0.4,ny+0.5,nz+(rng()-0.5)*0.4,col,1.4+rng()*0.9*(P.big?1.3:1));}

      const geo=new THREE.ConeGeometry(0.4+rng()*0.5,hgt,5,1);

    const cx=0,cy=2.7*P.height;
    // solid glowing lantern body (emissive sphere) so it reads as an object, not a blown blob
    const body=new THREE.Mesh(new THREE.IcosahedronGeometry(1,1),new THREE.MeshStandardMaterial({color:M.accent,emissive:M.accent,emissiveIntensity:1.3,roughness:0.4,flatShading:true}));
    body.scale.setScalar(1.0*(P.big?1.3:1));body.position.set(cx,cy,0);body.castShadow=true;bend.add(body);thing.meshes.push(body);thing.beatMats.push(body.material);

    const orbN=4+P.count;thing.orbit=[];

      const orb={sprite:o,r:1.4+Math.random()*1.8,a:Math.random()*TAU,sp:0.4+Math.random()*0.7,yb:cy+(Math.random()-0.5)*1.4,tilt:Math.random()*0.8};thing.orbit.push(orb);

    for(let i=0;i<n;i++){const o=glowSprite(i%2?M.pCol:M.accent,0.6+Math.random()*0.7);bend.add(o);
      const s={sprite:o,r:1+Math.random()*2.6,a:Math.random()*TAU,sp:0.5+Math.random()*1.0,yb:1+Math.random()*4*P.height,tilt:Math.random()*0.6,ph:Math.random()*TAU};thing.swarm.push(s);

/* flying scattered blossoms (world space) */

/* =========================================================================
   FIELD / placement
   ========================================================================= */
const Field={things:[],live:null};
const wind={x:0,z:0};
function slotPos(index){
  // golden-angle spiral; index 0 sits at the island centre (the live song = the star)
  const r=Math.sqrt(index)*2.2;const a=index*2.399963;
  islandR=Math.max(10,r+3.5);

}
function addThing(spec,index,opts){
  opts=opts||{};

  const p=slotPos(index);t.group.position.copy(p);
  t.live=!!opts.live;t.growthT=opts.growthT!=null?opts.growthT:1;t.srcUrl=opts.srcUrl||null;t.index=index;

/* =========================================================================
   INTERACTION
   ========================================================================= */
const Ptr={x:0,y:0,px:0,py:0,down:false,drag:false,onThing:null,moved:0,active:false,idle:99,
  world:new THREE.Vector3(),vWorld:new THREE.Vector3(),pWorld:new THREE.Vector3(),speed:0,has:false};
const raycaster=new THREE.Raycaster();const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),-ISLAND_TOP_Y);
const ndc=new THREE.Vector2();
function updateCursorWorld(){
  ndc.set((Ptr.x/W)*2-1,-(Ptr.y/H)*2+1);raycaster.setFromCamera(ndc,camera);
  const hit=raycaster.ray.intersectPlane(groundPlane,_q);
  if(hit){Ptr.pWorld.copy(Ptr.world);Ptr.world.copy(_q);Ptr.vWorld.subVectors(Ptr.world,Ptr.pWorld);Ptr.has=true;
    Ptr.speed=Ptr.vWorld.length();}
  else Ptr.has=false;
}
function thingAtPointer(){
  ndc.set((Ptr.x/W)*2-1,-(Ptr.y/H)*2+1);raycaster.setFromCamera(ndc,camera);
  let best=null,bd=1e9;const o=new THREE.Vector3();
  for(const t of Field.things){t.group.getWorldPosition(o);
    // distance from ray to thing center (approx by projecting)
    const toC=o.clone().sub(raycaster.ray.origin);const proj=toC.dot(raycaster.ray.direction);if(proj<0)continue;
    const closest=raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(proj));
    const d=closest.distanceTo(o);if(d<3.2*(t._baseScale||1)&&d<bd){bd=d;best=t;}}

function pointerPos(e){const r=renderer.domElement.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
function onDown(e){renderer.domElement.setPointerCapture&&renderer.domElement.setPointerCapture(e.pointerId);
  const p=pointerPos(e);Ptr.x=p.x;Ptr.y=p.y;Ptr.px=p.x;Ptr.py=p.y;Ptr.down=true;Ptr.drag=false;Ptr.moved=0;Ptr.active=true;Ptr.idle=0;
  updateCursorWorld();Ptr.onThing=thingAtPointer();hideHint();}
function onMove(e){const p=pointerPos(e);const dx=p.x-Ptr.x,dy=p.y-Ptr.y;Ptr.px=Ptr.x;Ptr.py=Ptr.y;Ptr.x=p.x;Ptr.y=p.y;Ptr.active=true;Ptr.idle=0;
  if(Ptr.down){Ptr.moved+=Math.hypot(dx,dy);

function onUp(e){if(Ptr.down&&!Ptr.drag&&Ptr.moved<8){const t=Ptr.onThing||thingAtPointer();if(t)selectThing(t);}
  Ptr.down=false;Ptr.drag=false;Ptr.onThing=null;}
function onWheel(e){e.preventDefault();Cam.tr=clamp(Cam.tr*(1+e.deltaY*0.0012),10,70);}
// pinch zoom
let pinch0=0;
function onTouchMove(e){if(e.touches&&e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.hypot(dx,dy);if(pinch0)Cam.tr=clamp(Cam.tr*(pinch0/d),10,70);pinch0=d;}}

/* =========================================================================
   CAMERA + LOOP
   ========================================================================= */
function updateCamera(dt){
  Cam.r=mix(Cam.r,Cam.tr,0.10);Cam.az=mix(Cam.az,Cam.taz,0.12);Cam.po=mix(Cam.po,Cam.tpo,0.12);
  Cam.target.lerp(Cam.ttarget,0.08);
  const sp=Math.sin(Cam.po),cp=Math.cos(Cam.po);
  camera.position.set(Cam.target.x+Cam.r*sp*Math.cos(Cam.az),Cam.target.y+Cam.r*cp,Cam.target.z+Cam.r*sp*Math.sin(Cam.az));
  camera.lookAt(Cam.target);
  sky.position.copy(camera.position);
}
let endedAt=0,lastT=performance.now(),mode='intro';
const cursorState={has:false,p:new THREE.Vector3(),v:new THREE.Vector3(),R:7,speed:0};
function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(now-lastT)/1000);lastT=now;
  if((!W||!H)&&innerWidth&&innerHeight)onResize();
  Audio_.sample();
  Ptr.idle+=dt;if(Ptr.idle>1.0)Ptr.active=false;
  Ptr.vWorld.multiplyScalar(0.7);
  // wind from music; settles to ~0 when ended & quiet
  let breeze; if(Audio_.playing)breeze=0.5+Audio_.level*2.4+Audio_.bass*1.2; else{const since=(now-endedAt)/1000;breeze=(endedAt&&since>2.5)?0.05:0.4;}
  wind.x=mix(wind.x,Math.sin(now*0.0004)*breeze,0.04);wind.z=mix(wind.z,Math.cos(now*0.00033)*breeze*0.7,0.04);

  // cursor state for things
  cursorState.has=Ptr.active&&Ptr.has&&!Ptr.drag;
  cursorState.p.copy(Ptr.world);cursorState.v.copy(Ptr.vWorld);cursorState.speed=Ptr.speed;cursorState.R=7;
  if(cursorState.has){cursorLight.position.set(Ptr.world.x,ISLAND_TOP_Y+3,Ptr.world.z);cursorLight.intensity=mix(cursorLight.intensity,2.4,0.2);
    cursorGlow.position.set(Ptr.world.x,ISLAND_TOP_Y+0.4,Ptr.world.z);cursorGlow.material.opacity=mix(cursorGlow.material.opacity,0.32,0.2);}
  else{cursorLight.intensity=mix(cursorLight.intensity,0,0.1);cursorGlow.material.opacity=mix(cursorGlow.material.opacity,0,0.1);}

  // growth (live), bounded
  const live=Field.live;
  if(live){let g=easeOut(clamp(Audio_.progress()*1.05));if(!Audio_.playing&&Audio_.duration>0&&Audio_.curTime()>=Audio_.duration-0.3)g=1;live.growthT=Math.max(live.growthT,clamp(Audio_.progress()*1.05));}

  // beat: rebloom + ripple
  if(Audio_.beat>0.25){if(live)live.beatRebloom();
    const c=live?live.group.position:Cam.target;rippleSprite.position.set(c.x,ISLAND_TOP_Y+0.3,c.z);rippleSprite.material.opacity=0.5;rippleSprite.scale.setScalar(2);}
  if(rippleSprite.material.opacity>0.01){rippleSprite.material.opacity*=0.92;rippleSprite.scale.x+=dt*30;rippleSprite.scale.y+=dt*30;}

  for(const t of Field.things){t.update(dt,t.live?t.growthT:1,curMood,Audio_.level,Audio_.beatFlash,cursorState);}
  updateFlyers(dt);updateAmbient(dt,Audio_.level);
  updateCamera(dt);
  // sun pulse with music
  const sb=1+Audio_.level*0.5+Audio_.beatFlash*0.3;sunSprite.scale.setScalar(16*sb);

  renderer.render(scene,camera);
  if(live&&mode==='play')npBar.style.width=(Audio_.progress()*100)+'%';
}

/* =========================================================================
   UI / FLOW
   ========================================================================= */
const intro=document.getElementById('intro'),hud=document.getElementById('hud'),hintEl=document.getElementById('hint');
const npName=document.getElementById('npName'),npMood=document.getElementById('npMood'),npBar=document.getElementById('npBar');
const show=el=>el.classList.remove('hidden'),hide=el=>el.classList.add('hidden');
let hintHidden=false;function hideHint(){if(!hintHidden){hintHidden=true;hintEl.classList.add('gone');}}
function toast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.style.opacity='0',1500);setTimeout(()=>d.remove(),2100);}

const STORE='musicgarden.v3';
const loadG=()=>{try{return JSON.parse(localStorage.getItem(STORE))||[];}catch(e){return[];}};
const saveG=g=>localStorage.setItem(STORE,JSON.stringify(g.slice(-36)));
function rebuildField(){
  for(const t of Field.things)scene.remove(t.group);Field.things.length=0;Field.live=null;
  loadG().forEach((it,idx)=>{const spec=genSpec({energy:it.e,brightness:it.b,dynamics:it.d,seed:it.seed,duration:it.dur},it.name);
    addThing(spec,idx,{growthT:1,baseScale:1.4,srcUrl:it.src||null});});
}
let keptThis=false,liveSpec=null;
function commitLive(){
  if(!Field.live)return;const g=loadG(),fp=Field.live.spec.fp;
  if(!g.some(x=>x.seed===fp.seed)){g.push({seed:fp.seed,name:Field.live.spec.name,when:Date.now(),e:fp.energy,b:fp.brightness,d:fp.dynamics,dur:fp.duration,src:Field.live.srcUrl||null});saveG(g);}
  Field.live.live=false;Field.live.growthT=1;Field.live=null;
}
async function startBuffer(ab,name,srcUrl){
  intro.style.pointerEvents='none';
  try{
    const buf=await Audio_.load(ab);const fp=fingerprint(buf,name);const spec=genSpec(fp,name);
    if(Field.live)commitLive();
    rebuildField();
    // remove any existing copy of this seed (it becomes the live one)
    for(let i=Field.things.length-1;i>=0;i--){if(Field.things[i].spec.fp.seed===fp.seed){scene.remove(Field.things[i].group);Field.things.splice(i,1);}}
    const idx=loadG().length;                         // new slot at the growing edge
    const t=addThing(spec,idx,{live:true,growthT:0,baseScale:1.7,srcUrl:srcUrl||null});
    Field.live=t;liveSpec=spec;keptThis=false;endedAt=0;
    applyMood(spec.M);buildAmbient(spec.M);
    // frame the live thing so it's the star
    Cam.ttarget.set(t.group.position.x,t.group.position.y+3.4,t.group.position.z);Cam.tr=21;Cam.tpo=0.74;Cam.taz=0.7;
    Audio_.reset();Audio_.play(onEnd);mode='play';
    npName.textContent=name;npMood.textContent='· '+spec.M.label+' · '+formCN(spec.form);
    document.getElementById('pauseBtn').textContent='暂停';
    hide(intro);show(hud);
  }catch(e){console.error(e);document.getElementById('err').textContent='读歌失败: '+(e.message||e);alert('这首歌没读出来，换一首试试？\n'+(e.message||e));intro.style.pointerEvents='';}
}
function formCN(f){return {flora:'花树',crystal:'晶簇',lantern:'灯花',spirit:'光灵'}[f]||f;}
function onEnd(){endedAt=performance.now();if(!keptThis){keptThis=true;const g=loadG(),fp=Field.live.spec.fp;
  if(!g.some(x=>x.seed===fp.seed)){g.push({seed:fp.seed,name:Field.live.spec.name,when:Date.now(),e:fp.energy,b:fp.brightness,d:fp.dynamics,dur:fp.duration,src:Field.live.srcUrl||null});saveG(g);}
  toast('这一株留在了你的岛上 🌱');}}

const drop=document.getElementById('drop'),fileInput=document.getElementById('file');
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);});
['dragenter','dragover'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==='drop'){const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio'))readFile(f);}drop.classList.remove('hot');}));
function readFile(f){Audio_.ensure();const r=new FileReader();r.onload=()=>startBuffer(r.result,f.name.replace(/\.[^.]+$/,''),null);r.readAsArrayBuffer(f);}

const SAMPLES=[['calm','晨之歌','#f4a8c8'],['happy','明亮日','#ffd24a'],['epic','史诗','#ff7a3a'],['sad','蓝色雨','#7ab0ff'],['dark','夜','#9a7aff'],['tense','紧绷','#c06bff'],['gloom','雾','#c0a8e0']];
const seedsEl=document.getElementById('seeds');
for(const[file,label,col] of SAMPLES){const b=document.createElement('div');b.className='seed';b.innerHTML='<span class="dot" style="color:'+col+'"></span>'+label;b.onclick=()=>playSample('assets/'+file+'.mp3',label);seedsEl.appendChild(b);}
async function playSample(url,label){Audio_.ensure();try{const ab=await fetch(url).then(r=>r.arrayBuffer());startBuffer(ab,label,url);}catch(e){toast('试听文件没加载到');console.error(e);}}

document.getElementById('pauseBtn').onclick=function(){if(Audio_.playing){Audio_.pause();this.textContent='继续';}else{Audio_.resume(onEnd);this.textContent='暂停';}};
document.getElementById('newBtn').onclick=()=>{if(Field.live)commitLive();Audio_.reset();mode='intro';hide(hud);show(intro);intro.style.pointerEvents='';};
document.getElementById('overviewBtn').onclick=()=>{Cam.ttarget.set(0,2,0);Cam.tr=Math.max(30,islandR*2.2);Cam.tpo=0.7;};

// boot
const canvas=document.getElementById('gl');
canvas.addEventListener('pointerdown',onDown);canvas.addEventListener('pointermove',onMove);
canvas.addEventListener('pointerup',onUp);canvas.addEventListener('pointercancel',onUp);
canvas.addEventListener('wheel',onWheel,{passive:false});
canvas.addEventListener('touchmove',onTouchMove,{passive:false});canvas.addEventListener('touchend',onTouchEnd);
try{ initGL(); rebuildField(); requestAnimationFrame(frame); }
catch(e){document.getElementById('err').textContent='init fail: '+(e.message||e)+' '+(e.stack||'');}
</script>
