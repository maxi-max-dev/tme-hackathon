<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字与光 · 读＝懂，看＝感</title>
<style>
  :root{ --text:#f5f3ff; --muted:#9a98b8; --line:rgba(255,255,255,.16); --accent:#8b7bff; --accent2:#e06bff; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:#04040a;}
  #bg{position:fixed;inset:0;z-index:0;background:radial-gradient(120% 100% at 50% 64%,#15132c,#08070f 70%,#040409);transition:background 1.1s linear;}
  #glow{position:fixed;inset:0;z-index:1;display:block;}
  /* 文字层：完全不动，只淡入淡出 */
  .textwrap{position:fixed;z-index:2;left:50%;top:45%;transform:translate(-50%,-50%);width:min(800px,86vw);text-align:center;pointer-events:none;}
  #label{font-size:12.5px;letter-spacing:.34em;text-transform:uppercase;color:rgba(255,255,255,.62);margin-bottom:20px;transition:opacity .45s ease;min-height:18px;font-weight:600;}
  #nowText{font-size:clamp(27px,4.4vw,50px);font-weight:680;line-height:1.5;letter-spacing:.015em;color:#fdfcff;
    text-shadow:0 2px 22px rgba(0,0,0,.85),0 1px 4px rgba(0,0,0,.9);transition:opacity .45s ease;}
  /* 控制 */
  .ui{position:fixed;z-index:3;left:0;right:0;pointer-events:none;}
  .ui *{pointer-events:auto;}
  .top{top:0;padding:15px 20px;display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .brand{font-weight:800;font-size:15px;opacity:.92;text-shadow:0 2px 14px rgba(0,0,0,.6);}
  .brand span{color:var(--accent2);}
  #status{font-size:12px;color:var(--muted);text-align:right;max-width:52vw;text-shadow:0 1px 8px rgba(0,0,0,.6);}
  .bottom{bottom:0;padding:0 20px 18px;display:flex;flex-direction:column;align-items:center;gap:9px;}
  .transport{display:flex;align-items:center;gap:11px;width:min(680px,92vw);background:rgba(8,8,16,.5);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;padding:9px 13px;}
  .iconbtn{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:16px;cursor:pointer;display:grid;place-items:center;flex:0 0 auto;}
  .iconbtn:hover{filter:brightness(1.12);}
  .seek{flex:1;min-width:100px;height:7px;border-radius:99px;background:rgba(255,255,255,.12);position:relative;overflow:hidden;cursor:pointer;}
  .seek i{position:absolute;inset:0 auto 0 0;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .time{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums;flex:0 0 auto;min-width:72px;text-align:center;}
  .filebtn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:11px;padding:8px 13px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;flex:0 0 auto;}
  .filebtn:hover{border-color:var(--accent);}
  .row2{display:flex;gap:9px;align-items:center;width:min(680px,92vw);justify-content:center;flex-wrap:wrap;}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;border-radius:11px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  input{background:rgba(0,0,0,.34);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:8px 11px;font-family:inherit;font-size:12px;flex:1;min-width:180px;max-width:300px;}
  .hint{font-size:11px;color:var(--muted);text-shadow:0 1px 8px rgba(0,0,0,.6);text-align:center;}
  a{color:var(--accent2);text-decoration:none;}
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="glow"></canvas>

<div class="textwrap">
  <div id="label">—</div>
  <div id="nowText">载入一首歌，跟着播放读它</div>
</div>

<div class="ui">
  <div class="top">
    <div class="brand">字与光 <span>·</span> 读＝懂，看＝感</div>
    <div id="status">载入中…</div>
  </div>
  <div class="bottom">
    <div class="transport">
      <button class="iconbtn" id="play">▶</button>
      <span class="time" id="time">0:00 / 0:00</span>
      <div class="seek" id="seek"><i></i></div>
      <label class="filebtn" style="cursor:pointer">⬆ 换我的歌<input id="file" type="file" accept="audio/*" hidden></label>
    </div>
    <div class="row2">
      <button class="btn" id="aiBtn">✦ 让 AI 读懂这首歌</button>
      <input id="key" type="password" placeholder="Gemini key（AIza…，只存你浏览器）">
    </div>
    <div class="hint">字不动、读它＝懂这首歌；背景的光跟着音乐呼吸＝感到这首歌。换内容/变光都落在真正的转折点上。没 key 也能跑。</div>
  </div>
</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpHue=(a,b,t)=>{const d=((b-a+540)%360)-180;return (a+d*t+360)%360;};
const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};

const SONG_URL='assets/epic.mp3', SONG_NAME='Heroic Age';
let SEGMENTS=[], SONG={summary:''}, DUR=0, rawBytes=null, rawMime='audio/mpeg';
let HITS=[], PERIOD=0.5;

/* ============ 复用基础 DSP ============ */
const NORM=arr=>{const s=Array.from(arr).sort((a,b)=>a-b);const lo=s[(s.length*.05)|0]||0,hi=s[(s.length*.95)|0]||1,d=(hi-lo)||1,o=new Float32Array(arr.length);for(let i=0;i<arr.length;i++)o[i]=clamp((arr[i]-lo)/d,0,1);return o;};
const SMOOTH=(arr,k)=>{const o=new Float32Array(arr.length);for(let i=0;i<arr.length;i++){let s=0,c=0;for(let j=-k;j<=k;j++){const x=i+j;if(x>=0&&x<arr.length){s+=arr[x];c++;}}o[i]=s/c;}return o;};
function mixMono(ab){ if(ab.numberOfChannels===1)return ab.getChannelData(0); const a=ab.getChannelData(0),b=ab.getChannelData(1),o=new Float32Array(a.length); for(let i=0;i<a.length;i++)o[i]=(a[i]+b[i])*.5; return o; }

/* ============ 切分①：真实音乐边界（多频段特征 + 自相似 checkerboard novelty） ============ */
// 沿"声音真正变了"的地方切，而不是固定时长。再吸附到最近的强拍，让转折落在拍上。
function feats(ch,sr,fps){
  const hop=Math.max(1,(sr/fps)|0), N=Math.max(2,(ch.length/hop)|0);
  const a1=1-Math.exp(-2*Math.PI*150/sr), a2=1-Math.exp(-2*Math.PI*1500/sr); let lp1=0,lp2=0;
  const low=new Float32Array(N),mid=new Float32Array(N),high=new Float32Array(N),tot=new Float32Array(N);
  for(let f=0;f<N;f++){ const s0=f*hop; let sl=0,sm=0,sh=0,st=0,c=0;
    for(let i=0;i<hop;i++){ const x=ch[s0+i]||0; lp1+=a1*(x-lp1); lp2+=a2*(x-lp2); const lo=lp1,md=lp2-lp1,hi=x-lp2; sl+=lo*lo;sm+=md*md;sh+=hi*hi;st+=x*x;c++; }
    low[f]=Math.sqrt(sl/c);mid[f]=Math.sqrt(sm/c);high[f]=Math.sqrt(sh/c);tot[f]=Math.sqrt(st/c); }
  const bright=new Float32Array(N), flux=new Float32Array(N);
  for(let f=0;f<N;f++) bright[f]=high[f]/(tot[f]+1e-6);
  for(let f=1;f<N;f++) flux[f]=Math.max(0,tot[f]-tot[f-1]);
  const cols=[low,mid,high,bright,flux].map(NORM);
  const F=[]; for(let i=0;i<N;i++) F.push([cols[0][i],cols[1][i],cols[2][i],cols[3][i],cols[4][i]]);
  return {F,tot:NORM(tot),fps,N};
}
function structureSegment(ch,sr,hits){
  const {F,tot,fps,N}=feats(ch,sr,8);
  const L=Math.max(6,Math.round(fps*2.5)), sig2=2*0.30*0.30, tw=(L*0.6)*(L*0.6);
  const sim=(i,j)=>{ let d=0; for(let k=0;k<5;k++){const x=F[i][k]-F[j][k]; d+=x*x;} return Math.exp(-d/sig2); };
  const nov=new Float32Array(N);
  for(let i=L;i<N-L;i++){ let s=0;
    for(let a=-L;a<L;a++){ for(let b=-L;b<L;b++){ const sgn=((a<0)===(b<0))?1:-1; s+=sgn*Math.exp(-((a*a+b*b)/(2*tw)))*sim(i+a,i+b); } }
    nov[i]=s; }
  const novS=SMOOTH(NORM(nov),2);
  let mean=0; for(let i=0;i<N;i++)mean+=novS[i]; mean/=N;
  let v=0; for(let i=0;i<N;i++)v+=(novS[i]-mean)**2; const std=Math.sqrt(v/N);
  // 取 novelty 最强的前 K 个局部峰 = 只留真正的大转折（封顶，避免切碎）
  const floor=mean+0.30*std, cand=[];
  for(let i=2;i<N-2;i++){ if(novS[i]>floor&&novS[i]>=novS[i-1]&&novS[i]>novS[i+1]&&novS[i]>=novS[i-2]&&novS[i]>novS[i+2]) cand.push({i,v:novS[i]}); }
  cand.sort((a,b)=>b.v-a.v);
  const minGap=Math.round(fps*4.5), cap=clamp(Math.round((N/fps)/9),3,9), chosen=[];
  for(const c of cand){ if(chosen.length>=cap)break; if(chosen.every(x=>Math.abs(x-c.i)>=minGap)) chosen.push(c.i); }
  chosen.sort((a,b)=>a-b);
  const bnd=[0,...chosen,N];
  const strong=(hits||[]).filter(h=>h.strong).map(h=>h.t), allT=(hits||[]).map(h=>h.t);
  const near=(ts,list,bd)=>{ let best=null,d=bd; for(const ht of list){ const dd=Math.abs(ht-ts); if(dd<d){d=dd;best=ht;} } return best; };
  const snap=ts=>{ return near(ts,strong,0.36) ?? near(ts,allT,0.30) ?? ts; }; // 先吸强拍，没有再吸最近的拍
  const secs=bnd.map((b,k)=> k===0?0 : k===bnd.length-1?N/fps : snap(b/fps));
  const uniq=[...new Set(secs.map(x=>+x.toFixed(2)))].sort((a,b)=>a-b);
  const segs=[];
  for(let k=0;k<uniq.length-1;k++){ const s=uniq[k],e=Math.max(s+0.5,uniq[k+1]);
    const fa=Math.round(s*fps),fb=Math.min(N,Math.round(e*fps)); let m=0,c=0; for(let i=fa;i<fb;i++){m+=tot[i];c++;} m/=c||1;
    segs.push({start:s,end:e,energy:+m.toFixed(3),intensity:+m.toFixed(3),now:'',label:'',mood:''}); }
  // 合并相邻"同性质"段（能量接近=不是真转折，别制造多余变化）
  const merged=[segs[0]];
  for(let k=1;k<segs.length;k++){ const a=merged[merged.length-1], b=segs[k];
    if(Math.abs(a.energy-b.energy)<0.13){ const wa=a.end-a.start, wb=b.end-b.start, en=+( (a.energy*wa+b.energy*wb)/(wa+wb) ).toFixed(3); a.end=b.end; a.energy=en; a.intensity=en; }
    else merged.push(b); }
  return merged;
}
// 没 key 的本机粗读（mood/now/label/intensity；内容沿真实段落给）
function dspFill(){
  const n=SEGMENTS.length; if(!n)return; let maxI=0; SEGMENTS.forEach((s,i)=>{if(s.energy>SEGMENTS[maxI].energy)maxI=i;});
  SEGMENTS.forEach((s,i)=>{ const e=s.energy, prev=i>0?SEGMENTS[i-1].energy:e, last=i===n-1, rising=e>prev+0.1, falling=e<prev-0.1;
    s.intensity=e;
    // 按真实能量+走向给（不硬设末段；末段低能量才算收束、高能量算尾声冲顶）
    s.label = i===0?'开场' : i===maxI?'高潮' : rising?'渐强' : (last&&e<0.3)?'收束' : (last)?'尾声' : falling?'回落' : e<0.3?'留白' : '铺垫';
    s.now = i===0?'从安静里，慢慢起势'
          : i===maxI?'全推到最满，最用力的一刻'
          : rising?'一层层往上堆，劲在攒'
          : (last&&e<0.3)?'慢慢松下来，归于安静'
          : (last)?'冲到最后，稳稳收尾'
          : falling?'松下来，退回一点'
          : e<0.3?'很轻，几乎只剩呼吸和留白'
          : '稳稳往前走，铺着底色';
    s.mood = e<0.3?'冷·安静':e<0.6?'暖·期待':'暖·激动'; });
  SONG.summary='本机粗读：一条由弱到强、再收束的情绪线（填 key 让 AI 真正读懂）';
}

/* ============ 情绪 → 色相 ============ */
const WARM=[[/紧张|焦虑|压抑/,8],[/激动|燃|亢奋|爆发|热血|激昂|壮烈/,20],[/喜悦|欢快|快乐|俏皮|明亮|轻快/,46],[/温暖|温柔|希望|憧憬|期待|庄严|柔/,34]];
const COOL=[[/平静|宁静|安静|放松|舒缓/,190],[/忧伤|悲|孤独|失落|惆怅|思念/,222],[/神秘|诡异|阴郁|黑暗|悬疑/,266],[/梦幻|空灵|缥缈|辽阔|开阔/,284]];
function moodHue(m){ m=m||''; const warm=/暖|warm|热/.test(m), cool=/冷|cold|凉/.test(m);
  if(cool){ for(const [re,h] of COOL) if(re.test(m)) return h; return 212; }
  if(warm){ for(const [re,h] of WARM) if(re.test(m)) return h; return 34; }
  for(const [re,h] of WARM) if(re.test(m)) return h; for(const [re,h] of COOL) if(re.test(m)) return h; return 258; }

/* ============ 拍点检测（复用；给吸附 + 背景脉动） ============ */
function detectHits(ch,sr){
  const fps=120, hop=Math.max(1,(sr/fps)|0), N=Math.max(2,(ch.length/hop)|0);
  const fc=170, a=1-Math.exp(-2*Math.PI*fc/sr); let lp=0;
  const full=new Float32Array(N), bass=new Float32Array(N), treb=new Float32Array(N);
  for(let f=0;f<N;f++){ const s0=f*hop; let sf=0,sb=0,st=0,c=0;
    for(let i=0;i<hop;i++){ const x=ch[s0+i]||0; lp+=a*(x-lp); const t=x-lp; sf+=x*x; sb+=lp*lp; st+=t*t; c++; }
    full[f]=Math.sqrt(sf/(c||1)); bass[f]=Math.sqrt(sb/(c||1)); treb[f]=Math.sqrt(st/(c||1)); }
  const flux=new Float32Array(N);
  for(let f=1;f<N;f++) flux[f]=Math.max(0,full[f]-full[f-1])+1.4*Math.max(0,bass[f]-bass[f-1])+0.5*Math.max(0,treb[f]-treb[f-1]);
  const fx=SMOOTH(flux,2);
  let best=0,bestLag=Math.round(fps*0.5);
  for(let lag=Math.round(fps*0.3);lag<=Math.round(fps*1.0);lag++){ let s=0; for(let f=lag;f<N;f++)s+=fx[f]*fx[f-lag]; if(s>best){best=s;bestLag=lag;} }
  PERIOD=bestLag/fps;
  const win=Math.round(fps*0.45), minGap=Math.round(fps*0.11), peaks=[]; let lastPk=-1e9;
  for(let f=2;f<N-2;f++){ let m=0,c=0; const lo=Math.max(0,f-win),hi=Math.min(N,f+win);
    for(let j=lo;j<hi;j++){m+=fx[j];c++;} m/=c; let vv=0; for(let j=lo;j<hi;j++)vv+=(fx[j]-m)**2; const sd=Math.sqrt(vv/c);
    if(fx[f]>m+1.0*sd && fx[f]>=fx[f-1]&&fx[f]>fx[f+1]&&fx[f]>=fx[f-2]&&fx[f]>fx[f+2] && f-lastPk>=minGap){ peaks.push({t:f/fps,raw:fx[f]}); lastPk=f; } }
  if(!peaks.length) return [];
  const sorted=peaks.map(p=>p.raw).sort((a,b)=>a-b);
  const loV=sorted[(sorted.length*.1)|0]||0, hiV=sorted[(sorted.length*.92)|0]||1, dv=(hiV-loV)||1, strongThr=sorted[(sorted.length*.6)|0]||hiV;
  return peaks.map(p=>({t:p.t, str:clamp((p.raw-loV)/dv,0,1), strong:p.raw>=strongThr}));
}

/* ============ 音频 ============ */
let actx=null,master=null,analyser=null,td=null,source=null,startTime=0,playing=false,lastT=0,liveE=0,buf=null;
function initAudio(){ if(actx)return; actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain();master.gain.value=.9; analyser=actx.createAnalyser();analyser.fftSize=1024; td=new Uint8Array(analyser.fftSize); master.connect(analyser); analyser.connect(actx.destination); }
function liveEnergy(){ if(!analyser||!playing)return 0; analyser.getByteTimeDomainData(td); let s=0; for(let i=0;i<td.length;i++){const x=(td[i]-128)/128;s+=x*x;} return Math.sqrt(s/td.length); }
function start(){ stop(); initAudio(); if(actx.state==='suspended')actx.resume(); source=actx.createBufferSource(); source.buffer=buf; source.loop=true; source.connect(master); startTime=actx.currentTime+.05-lastT; source.start(actx.currentTime+.05,lastT%(DUR||1)); playing=true; $('#play').textContent='⏸'; }
function stop(){ playing=false; if(source){try{source.stop();}catch(e){}try{source.disconnect();}catch(e){}source=null;} $('#play').textContent='▶'; }
function nowT(){ return playing&&actx ? (((actx.currentTime-startTime)%(DUR||1))+(DUR||1))%(DUR||1) : lastT; }

/* ============ 呈现②-文字层：固定、清晰、只淡入淡出（负责"懂"） ============ */
let _shown=-1,_swap=null;
function showNow(idx){ if(idx===_shown)return; _shown=idx; const s=SEGMENTS[idx];
  const el=$('#nowText'), lb=$('#label'); el.style.opacity=0; lb.style.opacity=0;
  clearTimeout(_swap); _swap=setTimeout(()=>{ el.textContent=s?(s.now||'…'):'…'; lb.textContent=s?(s.label||''):''; el.style.opacity=1; lb.style.opacity=1; },260); }
function setNowImmediate(idx){ _shown=idx; const s=SEGMENTS[idx]; $('#nowText').textContent=s?(s.now||'…'):'…'; $('#label').textContent=s?(s.label||''):''; $('#nowText').style.opacity=1; $('#label').style.opacity=1; }

/* ============ 呈现②-背景层：跟音乐呼吸/脉动的氛围光（负责"感"，不描绘含义） ============ */
const glow=$('#glow'), g=glow.getContext('2d');
let W=2,H=2,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth; H=innerHeight; glow.width=W*DPR; glow.height=H*DPR; glow.style.width=W+'px'; glow.style.height=H+'px'; g.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();
let bgH=255,bgI=0.3,pulse=0,curIdx=-1;
function setBgTarget(idx){ const s=SEGMENTS[idx]; if(!s)return; $('#bg').style.background='radial-gradient(120% 100% at 50% 64%, hsl('+Math.round(moodHue(s.mood))+' '+Math.round(clamp(24+s.intensity*30,22,56))+'% '+Math.round(6+s.intensity*7)+'%), #08070f 68%, #040409)'; }
function softGlow(x,y,r,hue,alpha){ const gr=g.createRadialGradient(x,y,0,x,y,r); gr.addColorStop(0,'hsla('+hue+',92%,62%,'+alpha+')'); gr.addColorStop(0.5,'hsla('+hue+',88%,52%,'+alpha*0.4+')'); gr.addColorStop(1,'hsla('+hue+',80%,40%,0)'); g.fillStyle=gr; g.beginPath(); g.arc(x,y,r,0,7); g.fill(); }
function renderGlow(t){
  g.clearRect(0,0,W,H);
  const D=Math.min(W,H), e=clamp(bgI*0.55 + liveE*1.5 + pulse*0.35,0,1.15), hue=Math.round(bgH);
  g.globalCompositeOperation='lighter';
  // 主光：底部上射，随能量呼吸 + 拍点脉动
  softGlow(W/2+Math.sin(t*0.05)*W*0.05, H*0.74, D*(0.5+e*0.55), hue, 0.10+e*0.34);
  // 两团缓慢漂移的副光，铺情绪底色
  softGlow(W*0.26+Math.sin(t*0.07+1)*W*0.05, H*(0.46+Math.sin(t*0.04)*0.03), D*(0.34+e*0.4), (hue+20)%360, 0.06+e*0.22);
  softGlow(W*0.74+Math.sin(t*0.06+3)*W*0.05, H*(0.52+Math.cos(t*0.05)*0.03), D*(0.32+e*0.4), (hue+340)%360, 0.06+e*0.22);
  // 能量高时加一缕顶光
  if(e>0.5) softGlow(W/2, H*0.16, D*(0.4+e*0.3), hue, (e-0.5)*0.3);
  // 文字后方压暗，保证可读
  g.globalCompositeOperation='source-over';
  const sc=g.createRadialGradient(W/2,H*0.45,0,W/2,H*0.45,D*0.62);
  sc.addColorStop(0,'rgba(2,2,8,0.62)'); sc.addColorStop(0.55,'rgba(2,2,8,0.34)'); sc.addColorStop(1,'rgba(2,2,8,0)');
  g.fillStyle=sc; g.fillRect(0,0,W,H);
}

/* ============ 主循环 ============ */
function segIndexAt(t){ if(!SEGMENTS.length)return -1; let i=0; for(let k=0;k<SEGMENTS.length;k++) if(t>=SEGMENTS[k].start)i=k; return i; }
let hitCursor=0;
function drive(t){
  const idx=segIndexAt(t);
  if(idx!==curIdx){ curIdx=idx; setBgTarget(idx); showNow(idx); } // 换内容 + 变光：都在真实转折(=段边界,已吸附拍)发生
  const s=SEGMENTS[curIdx];
  if(s){ bgH=lerpHue(bgH,moodHue(s.mood),0.05); bgI=lerp(bgI,s.intensity,0.05); }
  while(hitCursor<HITS.length && HITS[hitCursor].t<=t){ const h=HITS[hitCursor]; pulse=Math.max(pulse,0.25+h.str*0.5); hitCursor++; }
}
function tick(dt){ pulse*=0.90; }
let prev=performance.now();
function loop(){
  const now=performance.now(), dt=Math.min(0.05,(now-prev)/1000); prev=now;
  if(playing){ const t=nowT(); if(t<lastT-0.2){ hitCursor=0; curIdx=-1; } lastT=t; liveE=lerp(liveE,liveEnergy(),0.4); }
  else liveE*=0.92;
  const t=lastT; drive(t); tick(dt); renderGlow(t);
  $('#seek i').style.width=(DUR?t/DUR*100:0)+'%'; $('#time').textContent=fmt(t)+' / '+fmt(DUR);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// 同步步进（后台标签 rAF 节流时给自测用）
window.__step=(seconds,fps=60)=>{ const dt=1/fps,n=Math.round(seconds*fps); for(let i=0;i<n;i++){ lastT=(lastT+dt)%(DUR||1); if(lastT<dt){hitCursor=0;curIdx=-1;} drive(lastT); tick(dt); } renderGlow(lastT); return window.__state(); };
window.__seek=t=>{ lastT=clamp(t,0,DUR); hitCursor=0; while(hitCursor<HITS.length&&HITS[hitCursor].t<lastT)hitCursor++; curIdx=-1; drive(lastT); renderGlow(lastT); return window.__state(); };

/* ============ 载入 → 分析 ============ */
async function ingest(name,arrbuf,mime){
  stop(); lastT=0; hitCursor=0; curIdx=-1; _shown=-1;
  rawBytes=new Uint8Array(arrbuf.slice(0)); rawMime=mime||'audio/mpeg';
  $('#status').textContent='正在解码 '+name+' …';
  initAudio(); buf=await actx.decodeAudioData(arrbuf.slice(0)); DUR=buf.duration;
  $('#status').textContent='正在分析（真实边界 + 拍点）…';
  const ch=mixMono(buf), sr=buf.sampleRate;
  HITS=detectHits(ch,sr); SEGMENTS=structureSegment(ch,sr,HITS); SONG={summary:''}; dspFill();
  resize(); setBgTarget(0); bgH=moodHue(SEGMENTS[0].mood); bgI=SEGMENTS[0].intensity; setNowImmediate(0);
  $('#status').textContent='✓ '+name+'（'+Math.round(DUR)+'s）· 真实边界切成 '+SEGMENTS.length+' 段 · '+HITS.length+' 拍点 · 本机粗读，点「让 AI 读懂」换真解读';
}
async function boot(){ try{ $('#status').textContent='正在载入 '+SONG_NAME+' …'; const a=await fetch(SONG_URL).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();}); await ingest(SONG_NAME,a,'audio/mpeg'); }catch(e){ $('#status').textContent='载入失败：'+((e&&e.message)||e); } }
boot();
$('#file').onchange=e=>{ const f=e.target.files[0]; if(f) f.arrayBuffer().then(b=>ingest(f.name,b,f.type||'audio/mpeg')).catch(err=>$('#status').textContent='解码失败：'+((err&&err.message)||err)); };
$('#play').onclick=()=>{ if(playing)stop(); else start(); };
$('#seek').onclick=e=>{ const r=$('#seek').getBoundingClientRect(); const p=clamp((e.clientX-r.left)/r.width,0,1); lastT=p*DUR; hitCursor=0; while(hitCursor<HITS.length&&HITS[hitCursor].t<lastT)hitCursor++; curIdx=-1; if(playing){ stop(); start(); } else { drive(lastT); renderGlow(lastT); } };

/* ============ Gemini（复用：summary + 每段 now/label/intensity/mood） ============ */
const GEMINI_MODELS=['gemini-2.5-flash','gemini-1.5-flash','gemini-2.5-flash-lite'];
const SCHEMA={ type:'OBJECT', properties:{ summary:{type:'STRING'},
  segments:{type:'ARRAY',items:{type:'OBJECT',properties:{ i:{type:'INTEGER'}, now:{type:'STRING'}, label:{type:'STRING'}, intensity:{type:'NUMBER'}, mood:{type:'STRING'} }, required:['i','now','label','intensity','mood']}} }, required:['summary','segments'] };
const PROMPT='你在帮人「读懂」一首歌——他们边听边看你的文字。下面是本机沿音乐真实转折切好的段落(每段含能量 energy 0-1，结构已定，勿改 i/start/end)。完整听这段音频后输出 JSON：\n- summary：一句话概括整首(≤22字)。\n- 每段 segments[]：\n  · now：大白话讲「这一段」音乐在干什么、什么感觉。现在时、有画面感、像耳边轻声解说。**不要技术词**(BPM/调式/和弦/分贝)。≤24字。\n  · label：这段角色，二到四字(开场/铺垫/渐强/爆发/副歌/收束)。\n  · intensity：0~1。\n  · mood：「暖」或「冷」+一个情绪词(暖·期待/冷·孤独)。\n基于真实听到的，别套模板。只输出 JSON。';
function u8ToB64(u8){ let s='';const C=0x8000; for(let i=0;i<u8.length;i+=C)s+=String.fromCharCode.apply(null,u8.subarray(i,i+C)); return btoa(s); }
function applyAI(data){ if(!data)return false;
  if(data.summary)SONG.summary=String(data.summary).trim();
  if(Array.isArray(data.segments)){ for(const f of data.segments){ const s=SEGMENTS[f.i]; if(!s)continue;
    if(f.now)s.now=String(f.now).trim(); if(f.label)s.label=String(f.label).trim();
    if(typeof f.intensity==='number')s.intensity=clamp(f.intensity,0,1); if(f.mood)s.mood=String(f.mood).trim(); } }
  curIdx=-1; _shown=-1; setNowImmediate(segIndexAt(lastT)); setBgTarget(segIndexAt(lastT)); return true; }
window.__applyAI=applyAI;
$('#aiBtn').onclick=async()=>{
  if(!SEGMENTS.length||!rawBytes){ $('#status').textContent='还没载入歌曲'; return; }
  let key=$('#key').value.trim()||localStorage.getItem('gk')||'';
  if(!key){ $('#status').textContent='👉 先填 Gemini key（AIza…）再点'; $('#key').focus(); return; }
  localStorage.setItem('gk',key);
  const facts=SEGMENTS.map((s,i)=>({i,start:+s.start.toFixed(1),end:+s.end.toFixed(1),energy:s.energy}));
  const body={ contents:[{parts:[{inline_data:{mime_type:rawMime,data:u8ToB64(rawBytes)}},{text:PROMPT+'\n\n【段落事实】\n'+JSON.stringify(facts)}]}], generationConfig:{temperature:0.8,maxOutputTokens:2048,responseMimeType:'application/json',responseSchema:SCHEMA} };
  let lastErr='';
  for(const m of GEMINI_MODELS){ $('#status').textContent='AI 正在完整听这首歌（'+m+'）…';
    try{ const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+m+':generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await r.json().catch(()=>({}));
      if(r.ok){ const txt=((j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts)||[]).map(p=>p.text||'').join('').trim(); let d=null; try{d=JSON.parse(txt);}catch(e){try{d=JSON.parse(txt.slice(txt.indexOf('{'),txt.lastIndexOf('}')+1));}catch(e2){}} if(d&&applyAI(d)){ $('#status').textContent='✓ AI 已读懂（'+m+'）· 放歌：读字＝懂，看光＝感'; return; } lastErr='返回不是有效 JSON'; continue; }
      lastErr=(j.error&&j.error.message)||('HTTP '+r.status); if(!/quota|exceed|not found|NOT_FOUND|unsupported|limit|404/i.test(lastErr))break;
    }catch(e){ lastErr=String(e); break; } }
  $('#status').textContent='AI 出错：'+lastErr;
};

/* ============ 自测钩子 ============ */
window.__state=()=>({ t:+lastT.toFixed(2), playing, dur:+DUR.toFixed(1), idx:curIdx, shownNow:$('#nowText').textContent, shownLabel:$('#label').textContent,
  bg:[Math.round(bgH),+bgI.toFixed(2),+pulse.toFixed(2)], liveE:+liveE.toFixed(3), hits:HITS.length, period:+PERIOD.toFixed(2),
  segs:SEGMENTS.length });
window.__sections=()=>SEGMENTS.map((s,i)=>({i,t:fmt(s.start)+'–'+fmt(s.end),dur:+(s.end-s.start).toFixed(1),inten:s.intensity,mood:s.mood,now:s.now}));
window.__boundaries=()=>SEGMENTS.map(s=>+s.start.toFixed(2));
</script>
