<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>音乐花园 · 一首歌开成一朵花</title>
<style>
  :root{--ink:#5b4a52;--muted:#9a8a92;--line:rgba(120,90,100,.16);--glass:rgba(255,250,250,.7);
    --font:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;background:#f6ece6;color:var(--ink);font-family:var(--font);}
  #gl{position:fixed;inset:0;display:block;touch-action:none;}
  .overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    text-align:center;padding:24px;z-index:10;transition:opacity .6s;}
  .overlay.hidden{opacity:0;pointer-events:none;}
  #intro .kicker{font-size:12px;letter-spacing:.34em;text-transform:uppercase;color:var(--muted);margin-bottom:16px;}
  #intro h1{font-size:clamp(26px,5.4vw,50px);font-weight:800;margin:0 0 14px;letter-spacing:.01em;
    background:linear-gradient(120deg,#e08aa6,#d98f6a 55%,#caa15e);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #intro p.sub{color:var(--muted);font-size:15.5px;margin:0 0 30px;max-width:470px;line-height:1.7;}
  .drop{width:min(440px,86vw);border:1.5px dashed rgba(180,120,140,.4);border-radius:22px;padding:26px 24px;
    background:rgba(255,255,255,.4);cursor:pointer;transition:.25s;backdrop-filter:blur(6px);}
  .drop:hover,.drop.hot{border-color:rgba(220,140,160,.8);background:rgba(255,240,244,.7);transform:translateY(-2px);}
  .drop .big{font-size:18px;font-weight:700;margin-bottom:6px;color:#7a5a64;}
  .drop .small{font-size:12.5px;color:var(--muted);}
  .or{margin:22px 0 12px;color:var(--muted);font-size:12px;letter-spacing:.2em;}
  .seeds{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:560px;}
  .seed{border:1px solid var(--line);background:rgba(255,255,255,.55);color:#6a5a62;padding:8px 15px;border-radius:999px;
    font-size:13.5px;cursor:pointer;transition:.18s;}
  .seed:hover{background:#fff;transform:translateY(-2px);box-shadow:0 6px 18px rgba(180,120,140,.18);}
  .seed .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:7px;vertical-align:middle;box-shadow:0 0 8px currentColor;}
  #loading{color:var(--muted);font-size:13px;margin-top:8px;height:18px;}
  #hud{position:fixed;left:0;right:0;bottom:0;z-index:8;padding:16px 20px 18px;
    background:linear-gradient(180deg,transparent,rgba(246,236,230,.7));transition:opacity .5s,transform .5s;
    display:flex;flex-direction:column;gap:9px;align-items:center;}
  #hud.hidden{opacity:0;pointer-events:none;transform:translateY(14px);}
  .npline{display:flex;align-items:baseline;gap:11px;justify-content:center;flex-wrap:wrap;}
  .npname{font-size:15px;font-weight:700;color:#6a5a62;max-width:62vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .npmood{font-size:12px;color:var(--muted);}
  .bar{width:min(540px,82vw);height:3.5px;border-radius:4px;background:rgba(160,120,130,.22);overflow:hidden;}
  .bar>i{display:block;height:100%;width:0;background:linear-gradient(90deg,#e89ab0,#e0b070);box-shadow:0 0 10px rgba(230,160,140,.6);}
  .ctrls{display:flex;gap:9px;align-items:center;flex-wrap:wrap;justify-content:center;}
  .btn{border:1px solid var(--line);background:var(--glass);color:#6a5a62;backdrop-filter:blur(8px);border-radius:999px;
    padding:7px 14px;font-size:13px;cursor:pointer;transition:.18s;}
  .btn:hover{background:#fff;}
  #hint{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:8;font-size:12.5px;color:var(--muted);
    background:rgba(255,250,250,.6);border:1px solid var(--line);border-radius:999px;padding:6px 15px;backdrop-filter:blur(8px);
    transition:opacity .8s;pointer-events:none;}
  #hint.gone{opacity:0;}
  .toast{position:fixed;left:50%;top:18%;transform:translateX(-50%);background:rgba(255,250,250,.9);border:1px solid var(--line);
    padding:9px 18px;border-radius:999px;z-index:30;font-size:13.5px;color:#6a5a62;backdrop-filter:blur(8px);transition:.5s;box-shadow:0 8px 24px rgba(180,120,140,.15);}
  #credit{position:fixed;right:10px;bottom:8px;z-index:6;font-size:10px;color:var(--muted);opacity:.6;}
  #err{position:fixed;left:10px;bottom:10px;z-index:40;color:#c0506a;font:12px monospace;max-width:80vw;white-space:pre-wrap;}
</style>
</head>
<body>
<canvas id="gl"></canvas>

<div class="overlay" id="intro">
  <div class="kicker">音 乐 花 园</div>
  <h1>一首歌，开成一朵花</h1>
  <p class="sub">丢一首歌进来。它会一边放，一边在这片暖花园里开出只属于它的一朵花——什么情绪、什么走向，就什么花、什么颜色、怎么开。挥手能拨它、晃出花瓣，它跟着歌一下下亮。听过的歌，都留在这片花园里。</p>
  <label class="drop" id="drop">
    <div class="big">把歌拖进来，或点这里选一首</div>
    <div class="small">mp3 / wav / m4a / flac · 全在你本机播放，不上传</div>
    <input type="file" id="file" accept="audio/*" hidden>
  </label>
  <div class="or">— 或者，先试试这些 —</div>
  <div class="seeds" id="seeds"></div>
  <div id="loading">正在备花……</div>
</div>

<div id="hint">挥动鼠标/手指拨花 · 按住空地拖动可在花园里走 · 点一朵花回到那首歌</div>

<div id="hud" class="hidden">
  <div class="npline"><span class="npname" id="npName">—</span><span class="npmood" id="npMood"></span></div>
  <div class="bar"><i id="npBar"></i></div>
  <div class="ctrls">
    <button class="btn" id="pauseBtn">暂停</button>
    <button class="btn" id="newBtn">换一首</button>
    <button class="btn" id="overviewBtn">看整园</button>
  </div>
</div>
<div id="credit">花模型 © Poly Pizza 作者 (CC-BY)</div>
<div id="err"></div>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from './vendor/GLTFLoader.js';
const errEl=document.getElementById('err');
window.onerror=(m,s,l)=>{errEl.textContent='err: '+m+' @'+l;};

/* ---------- utils ---------- */
const TAU=Math.PI*2, clamp=(x,a=0,b=1)=>x<a?a:x>b?b:x, lerp=(a,b,t)=>a+(b-a)*t, mix=lerp, easeOut=t=>1-Math.pow(1-t,3);
const easeOutBack=t=>{const c=1.7;return 1+(c+1)*Math.pow(t-1,3)+c*Math.pow(t-1,2);};
function mulberry32(s){let a=s>>>0;return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
function snoise(x){return Math.sin(x)*0.55+Math.sin(x*2.17+1.3)*0.3+Math.sin(x*4.7+4.1)*0.15;}

/* =========================================================================
   AUDIO  (one-pass fingerprint + live FFT)
   ========================================================================= */
const Audio_={
  ac:null,src:null,analyser:null,buf:null,freq:null,startT:0,pauseT:0,playing:false,duration:0,
  bass:0,mid:0,treble:0,level:0,energyHist:[],beat:0,beatFlash:0,lastBeat:-1,
  ensure(){if(!this.ac)this.ac=new (window.AudioContext||window.webkitAudioContext)();if(this.ac.state==='suspended')this.ac.resume();},
  async load(ab){this.ensure();this.buf=await this.ac.decodeAudioData(ab);this.duration=this.buf.duration;return this.buf;},
  play(onEnd){this.stopNode();const s=this.ac.createBufferSource();s.buffer=this.buf;
    const an=this.ac.createAnalyser();an.fftSize=1024;an.smoothingTimeConstant=0.78;const g=this.ac.createGain();g.gain.value=0.9;
    s.connect(an);an.connect(g);g.connect(this.ac.destination);this.src=s;this.analyser=an;this.freq=new Uint8Array(an.frequencyBinCount);
    s.onended=()=>{if(this.playing&&this.curTime()>=this.duration-0.25){this.playing=false;onEnd&&onEnd();}};
    const off=this.pauseT||0;s.start(0,off);this.startT=this.ac.currentTime-off;this.playing=true;this.energyHist.length=0;},
  stopNode(){if(this.src){try{this.src.onended=null;this.src.stop();}catch(e){}this.src=null;}},
  pause(){if(!this.playing)return;this.pauseT=this.curTime();this.playing=false;this.stopNode();},
  resume(onEnd){if(this.playing)return;this.play(onEnd);},
  reset(){this.stopNode();this.playing=false;this.pauseT=0;this.startT=0;},
  curTime(){return this.playing?Math.min(this.duration,this.ac.currentTime-this.startT):(this.pauseT||0);},
  progress(){return this.duration?clamp(this.curTime()/this.duration):0;},
  sample(){if(!this.analyser){this.bass=this.mid=this.treble=this.level=0;this.beat=0;return;}
    this.analyser.getByteFrequencyData(this.freq);const f=this.freq,n=f.length;let b=0,m=0,t=0;const bE=8,mE=64,tE=Math.min(n,260);
    for(let i=1;i<bE;i++)b+=f[i];for(let i=bE;i<mE;i++)m+=f[i];for(let i=mE;i<tE;i++)t+=f[i];
    b/=(bE-1)*255;m/=(mE-bE)*255;t/=(tE-mE)*255;const k=this.playing?0.35:0.08;
    this.bass=mix(this.bass,b,k);this.mid=mix(this.mid,m,k);this.treble=mix(this.treble,t,k);this.level=mix(this.level,(b*1.1+m+t*0.8)/3,k);
    const e=b*1.4+m*0.6;const h=this.energyHist;h.push(e);if(h.length>43)h.shift();let avg=0;for(let i=0;i<h.length;i++)avg+=h[i];avg/=Math.max(1,h.length);
    let vc=0;for(let i=0;i<h.length;i++){const d=h[i]-avg;vc+=d*d;}vc/=Math.max(1,h.length);
    const th=avg*1.32+Math.sqrt(vc)*0.6+0.02,now=this.ac.currentTime;this.beat=0;
    if(this.playing&&e>th&&now-this.lastBeat>0.16&&e>0.06){this.beat=clamp(e*1.4);this.beatFlash=1;this.lastBeat=now;}this.beatFlash*=0.9;}
};
function fingerprint(buf,name){
  const ch=buf.getChannelData(0),N=ch.length,step=Math.max(1,Math.floor(N/24000));
  let sumSq=0,hf=0,cnt=0,prev=0,hashAcc=2166136261^Math.floor(buf.duration*1000);
  const wc=64,env=new Float32Array(wc),perWin=Math.max(1,Math.floor(N/wc));
  for(let i=0;i<N;i+=step){const s=ch[i];sumSq+=s*s;hf+=Math.abs(s-prev);prev=s;cnt++;
    if((cnt&255)===0){hashAcc^=Math.floor(s*32768)&0xffff;hashAcc=Math.imul(hashAcc,16777619);}env[Math.min(wc-1,Math.floor(i/perWin))]+=s*s;}
  const rms=Math.sqrt(sumSq/Math.max(1,cnt)),bright=(hf/Math.max(1,cnt))/(rms+1e-4);
  let em=0;for(let i=0;i<wc;i++){env[i]=Math.sqrt(env[i]/perWin*step);em+=env[i];}em/=wc;
  let ev=0;for(let i=0;i<wc;i++){const d=env[i]-em;ev+=d*d;}ev=Math.sqrt(ev/wc);
  return{energy:clamp(rms*3.4),brightness:clamp(bright*0.62),dynamics:clamp((ev/(em+1e-4))*0.9),seed:(hashAcc^hashStr(name||'song'))>>>0,duration:buf.duration};
}

/* =========================================================================
   MOOD -> flower choice / color / bloom (deterministic from fingerprint)
   ========================================================================= */
// petal-tint hue per mood region (THREE hsl), + which flowers fit
const FLOWER_FILES=['daisy','bellflower','pastelplume','sunflower','marigold'];
const MOODS={
  dawn:{label:'平静 · 明亮',petal:0xffb3c9,sky:[0xfde4ea,0xf3d6c4],fog:0xf6ddd8,flowers:['daisy','marigold','pastelplume']},
  sunlit:{label:'热烈 · 明亮',petal:0xffd14a,sky:[0xfff0cf,0xffe0bf],fog:0xfdebcf,flowers:['sunflower','marigold','daisy']},
  ember:{label:'激烈 · 暖',petal:0xff7a52,sky:[0xffcdb0,0xf0a890],fog:0xf2c3b0,flowers:['sunflower','marigold']},
  rain:{label:'平静 · 凉',petal:0x9ec6ff,sky:[0xd6e2f2,0xc2cfe2],fog:0xd2dceb,flowers:['bellflower','pastelplume','daisy']},
  gloom:{label:'低沉 · 柔',petal:0xc6a8ff,sky:[0xe2dcee,0xd2c8e2],fog:0xdfd8ec,flowers:['pastelplume','bellflower']},
  twilight:{label:'流动 · 暮',petal:0xff9ad0,sky:[0xf0cfe6,0xd9b8e6],fog:0xe6cce0,flowers:['bellflower','pastelplume','marigold']},
  nightbloom:{label:'静 · 夜光',petal:0x9af0e0,sky:[0xcfe0e6,0xbcd0dc],fog:0xd2e0e2,flowers:['bellflower','pastelplume']}
};
const MKEYS=Object.keys(MOODS);
const IDEAL={dawn:[0.74,0.30,0.18],sunlit:[0.88,0.88,0.35],ember:[0.24,0.78,0.50],rain:[0.33,0.34,0.46],gloom:[0.42,0.46,0.20],twilight:[0.82,0.46,0.38],nightbloom:[0.58,0.10,0.42]};
function genSpec(fp,name){
  const rng=mulberry32(fp.seed);
  const v=clamp((fp.brightness-0.52)*2.6+0.5), a=clamp((fp.energy-0.32)*1.95+0.48), dyn=fp.dynamics;
  let mood='dawn',best=1e9;
  for(const k of MKEYS){const I=IDEAL[k];const dv=v-I[0],da=a-I[1],dd=dyn-I[2];const s=dv*dv+da*da+dd*dd*0.7+(rng()-0.5)*0.11;if(s<best){best=s;mood=k;}}
  const M=MOODS[mood];
  const flower=M.flowers[(rng()*M.flowers.length)|0];
  // petal tint: mood hue with seed jitter
  const tc=new THREE.Color(M.petal);const hsl={};tc.getHSL(hsl);
  tc.setHSL((hsl.h+(rng()-0.5)*0.06+1)%1, clamp(hsl.s*(0.85+0.3*a)), clamp(hsl.l*(0.92+0.16*v)));
  return {fp,name,v,a,dyn,mood,M,flower,
    tint:tc.getHex(), tintAmt:0.45+0.35*rng(),
    scale:0.85+a*0.5+rng()*0.3,
    count:1+(rng()<0.4+0.4*a?1:0)+(rng()<0.25*a?1:0),  // 1-3 blooms in a small cluster
    sway:0.7+dyn*0.8, seed:fp.seed};
}

/* =========================================================================
   THREE — soft warm garden
   ========================================================================= */
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio||1));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.02;
const scene=new THREE.Scene();
let W=innerWidth,H=innerHeight;
const camera=new THREE.PerspectiveCamera(44,W/H,0.1,400);

// gradient sky dome (warm, color-managed)
const skyCanvas=document.createElement('canvas');skyCanvas.width=8;skyCanvas.height=256;
const skyTex=new THREE.CanvasTexture(skyCanvas);skyTex.encoding=THREE.sRGBEncoding;skyTex.minFilter=THREE.LinearFilter;skyTex.generateMipmaps=false;
const sky=new THREE.Mesh(new THREE.SphereGeometry(260,32,16),new THREE.MeshBasicMaterial({map:skyTex,side:THREE.BackSide,fog:false,depthWrite:false,toneMapped:false}));
scene.add(sky);
function setSky(topHex,botHex){const g=skyCanvas.getContext('2d');const grd=g.createLinearGradient(0,0,0,256);
  const c=new THREE.Color();c.setHex(topHex);grd.addColorStop(0,'#'+c.getHexString());c.setHex(botHex);grd.addColorStop(1,'#'+c.getHexString());
  g.fillStyle=grd;g.fillRect(0,0,8,256);skyTex.needsUpdate=true;}

// soft warm lights
const hemi=new THREE.HemisphereLight(0xfff2e6,0xe9cbb6,0.95);scene.add(hemi);
const ambient=new THREE.AmbientLight(0xfff0e6,0.32);scene.add(ambient);
const key=new THREE.DirectionalLight(0xffe9cc,1.55);key.position.set(7,12,8);key.castShadow=true;
key.shadow.mapSize.set(2048,2048);key.shadow.camera.near=1;key.shadow.camera.far=80;
key.shadow.camera.left=-26;key.shadow.camera.right=26;key.shadow.camera.top=26;key.shadow.camera.bottom=-26;key.shadow.bias=-0.0005;key.shadow.radius=7;scene.add(key);scene.add(key.target);
const fill=new THREE.DirectionalLight(0xffd6e6,0.45);fill.position.set(-8,5,4);scene.add(fill);

// ground — soft round meadow
const ground=new THREE.Mesh(new THREE.CircleGeometry(60,72),new THREE.MeshStandardMaterial({color:0xdfc9b8,roughness:1}));
ground.rotation.x=-Math.PI/2;ground.position.y=0;ground.receiveShadow=true;scene.add(ground);
const groundRing=new THREE.Mesh(new THREE.RingGeometry(58,60,72),new THREE.MeshBasicMaterial({color:0xcdb4a2,transparent:true,opacity:0.5,fog:true}));
groundRing.rotation.x=-Math.PI/2;groundRing.position.y=0.01;scene.add(groundRing);

let curMood=MOODS.dawn;
function applyMood(M){
  setSky(M.sky[0],M.sky[1]);
  scene.fog=new THREE.Fog(M.fog,30,150);
  scene.background=new THREE.Color(M.fog);
  ground.material.color.setHex(M.fog).multiplyScalar(0.86);
  curMood=M;
}
applyMood(MOODS.dawn);

/* glow + petal textures */
function softTex(){const c=document.createElement('canvas');c.width=c.height=128;const g=c.getContext('2d');
  const gr=g.createRadialGradient(64,64,0,64,64,64);gr.addColorStop(0,'rgba(255,255,255,.95)');gr.addColorStop(0.3,'rgba(255,255,255,.45)');gr.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=gr;g.fillRect(0,0,128,128);return new THREE.CanvasTexture(c);}
function petalTex(){const c=document.createElement('canvas');c.width=c.height=64;const g=c.getContext('2d');
  g.translate(32,32);const gr=g.createRadialGradient(0,-6,2,0,0,30);gr.addColorStop(0,'rgba(255,255,255,1)');gr.addColorStop(1,'rgba(255,255,255,.2)');
  g.fillStyle=gr;g.beginPath();g.ellipse(0,0,13,24,0,0,TAU);g.fill();return new THREE.CanvasTexture(c);}
const GLOW=softTex(), PETAL=petalTex();

/* =========================================================================
   FLOWER TEMPLATES (load all GLBs up front)
   ========================================================================= */
const FLOWERS={};
const loader=new GLTFLoader();
function loadFlower(name){return new Promise((res)=>{
  loader.load('assets/flowers/'+name+'.glb',(g)=>{
    const o=g.scene;o.traverse(m=>{if(m.isMesh){m.castShadow=true;m.receiveShadow=true;if(m.material){m.material.flatShading=false;m.material.needsUpdate=true;}}});
    FLOWERS[name]=o;res();
  },undefined,(e)=>{errEl.textContent+='\nflower load fail '+name;res();});
});}
let flowersReady=false;
Promise.all(FLOWER_FILES.map(loadFlower)).then(()=>{flowersReady=true;document.getElementById('loading').textContent='花备好了 · 选一首吧';
  setTimeout(()=>{const l=document.getElementById('loading');if(l)l.style.opacity=0;},1400);});

/* make a flower instance from a spec */
const _b3=new THREE.Box3(), _v3=new THREE.Vector3(), _v3b=new THREE.Vector3();
function makeFlower(spec){
  const group=new THREE.Group();
  const pivot=new THREE.Group();group.add(pivot);   // sway pivot at base
  const tintCol=new THREE.Color(spec.tint);
  const blooms=[];
  const rng=mulberry32((spec.seed^0x9e3779b9)>>>0);
  const n=spec.count;
  for(let i=0;i<n;i++){
    const tmpl=FLOWERS[spec.flower]; if(!tmpl)continue;
    const model=tmpl.clone(true);
    model.traverse(m=>{if(m.isMesh){m.castShadow=true;m.receiveShadow=true;
      m.material=m.material.clone();m.material.flatShading=false;
      const c=m.material.color; if(c){const greenish=(c.g>c.r&&c.g>=c.b&&(c.r+c.g+c.b)<1.5);
        if(!greenish)c.lerp(tintCol,spec.tintAmt);}
      if(m.material.emissive)m.material.emissiveIntensity=0;
      m.material.needsUpdate=true;}});
    _b3.setFromObject(model);const size=_b3.getSize(_v3).clone();const ctr=_b3.getCenter(_v3b).clone();
    const s=(3.0/Math.max(0.01,size.y))*spec.scale*(i===0?1:0.7+rng()*0.25);
    model.scale.setScalar(s);
    const ox=i===0?0:(rng()-0.5)*1.8, oz=i===0?0:(rng()-0.5)*1.8;
    model.position.set(ox-ctr.x*s, -_b3.min.y*s, oz-ctr.z*s);
    model.rotation.y=rng()*TAU;
    pivot.add(model);
    blooms.push({model, topY:(size.y*s)*0.92, ox, oz, sway:0.8+rng()*0.5});
  }
  // soft glow at the bloom top (the "亮一下")
  const glow=new THREE.Sprite(new THREE.SpriteMaterial({map:GLOW,color:tintCol.clone().lerp(new THREE.Color(0xffffff),0.4),blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0}));
  const topY=blooms.length?Math.max(...blooms.map(b=>b.topY)):3;
  glow.scale.setScalar(topY*1.3);glow.position.y=topY*0.8;pivot.add(glow);

  const fl={group,pivot,blooms,glow,spec,tintCol, swx:0,swz:0,vx:0,vz:0,lit:0,growthT:0,live:false,srcUrl:null,topY,
    shedCool:0};
  group.scale.setScalar(0.001);
  fl.update=function(dt,gT,level,beat,cursor){
    // bloom: scale up with overshoot, bounded
    const g=clamp(gT);const sc=g<1?easeOutBack(clamp(g/0.92)):1;
    group.scale.setScalar(Math.max(0.001,sc));
    // beat pulse + glow + lit
    const pulse=1+beat*0.05+level*0.02;
    pivot.scale.setScalar(pulse);
    glow.material.opacity=clamp((0.12+beat*0.5+level*0.25+fl.lit*0.4)*g);
    glow.scale.setScalar(topY*(1.1+beat*0.5+level*0.3));
    // sway physics: wind + cursor lean + beat, settles
    let tx=wind.x*0.10*fl.spec.sway, tz=wind.z*0.10*fl.spec.sway;
    if(cursor.has){
      const dx=cursor.p.x-group.position.x, dz=cursor.p.z-group.position.z, d=Math.hypot(dx,dz);
      if(d<cursor.R){const fall=1-d/cursor.R, inv=1/(d+0.001);
        tx+=(dz*inv)*fall*0.45; tz+=-(dx*inv)*fall*0.45;
        tx+=cursor.v.z*fall*0.05; tz+=-cursor.v.x*fall*0.05;
        fl.lit=Math.max(fl.lit,fall);
        if(cursor.speed>0.5 && fl.shedCool<=0){ shedPetals(fl, Math.min(6,2+(cursor.speed*2|0)), cursor.v); fl.shedCool=0.12; }
      }
    }
    fl.shedCool-=dt;
    if(beat>0.3){fl.vx+=(Math.random()-0.5)*beat*0.05;fl.vz+=(Math.random()-0.5)*beat*0.05;}
    fl.vx=(fl.vx+(tx-fl.swx)*0.12)*0.85; fl.swx=clamp(fl.swx+fl.vx,-0.5,0.5);
    fl.vz=(fl.vz+(tz-fl.swz)*0.12)*0.85; fl.swz=clamp(fl.swz+fl.vz,-0.5,0.5);
    pivot.rotation.x=fl.swx; pivot.rotation.z=fl.swz;
    fl.lit*=0.9;
  };
  return fl;
}

/* petal particles (shed) */
const petals=[];const _wp=new THREE.Vector3();
function shedPetals(fl,k,vel){
  for(let i=0;i<k;i++){
    if(petals.length>240)break;
    const b=fl.blooms[(Math.random()*fl.blooms.length)|0]; if(!b)break;
    b.model.getWorldPosition(_wp);
    const pc=fl.tintCol.clone();const hsl={};pc.getHSL(hsl);pc.setHSL(hsl.h,clamp(hsl.s*1.7,0.25,0.85),clamp(hsl.l*0.9,0.4,0.66));
    const s=new THREE.Sprite(new THREE.SpriteMaterial({map:PETAL,color:pc,transparent:true,depthWrite:false,opacity:0.95,rotation:Math.random()*TAU}));
    s.scale.setScalar(0.5+Math.random()*0.4);
    s.position.set(_wp.x+(Math.random()-0.5),_wp.y+b.topY*0.4+Math.random()*0.6,_wp.z+(Math.random()-0.5));
    scene.add(s);
    petals.push({s,vx:(vel?vel.x:0)*0.35+(Math.random()-0.5)*0.5,vy:0.5+Math.random()*0.5,vz:(vel?vel.z:0)*0.35+(Math.random()-0.5)*0.5,
      vr:(Math.random()-0.5)*0.2,life:1,spin:Math.random()*TAU});
  }
}
function updatePetals(dt){
  for(let i=petals.length-1;i>=0;i--){const p=petals[i];p.vy-=2.6*dt;p.s.position.x+=p.vx*dt*8;p.s.position.y+=p.vy*dt*8;p.s.position.z+=p.vz*dt*8;
    p.vx*=0.96;p.vz*=0.96;p.spin+=p.vr;p.s.material.rotation=p.spin;p.life-=0.012;p.s.material.opacity=clamp(p.life)*0.95;
    if(p.life<=0||p.s.position.y<0.02){scene.remove(p.s);petals.splice(i,1);}}
}

/* drifting pollen motes for atmosphere */
const motes=new THREE.Group();scene.add(motes);
{ const mat=new THREE.SpriteMaterial({map:GLOW,color:0xffffff,blending:THREE.AdditiveBlending,depthWrite:false,transparent:true,opacity:0.0});
  for(let i=0;i<60;i++){const s=new THREE.Sprite(mat.clone());s.scale.setScalar(0.3+Math.random()*0.5);
    s.position.set((Math.random()-0.5)*44,Math.random()*16,(Math.random()-0.5)*44);s.userData={ph:Math.random()*TAU};motes.add(s);} }
function updateMotes(dt,level){const now=performance.now();motes.children.forEach(s=>{const u=s.userData;s.position.y+=0.01+0.01*Math.sin(now*0.001+u.ph);if(s.position.y>16)s.position.y=0;s.position.x+=wind.x*0.01;s.material.opacity=clamp((0.12+0.18*Math.sin(now*0.002+u.ph))*(0.5+level));});}

/* =========================================================================
   FIELD + CAMERA + POINTER
   ========================================================================= */
const Field={flowers:[],live:null};
const wind={x:0,z:0};
const Cam={r:18,az:0.7,po:0.82,tr:18,taz:0.7,tpo:0.82,target:new THREE.Vector3(0,2,0),ttarget:new THREE.Vector3(0,2,0)};
function slotPos(index){const r=index===0?0:(3.2+Math.sqrt(index)*3.0);const a=index*2.399963;return new THREE.Vector3(Math.cos(a)*r,0,Math.sin(a)*r);}
function addFlower(spec,index,opts){opts=opts||{};const fl=makeFlower(spec);const p=slotPos(index);fl.group.position.copy(p);
  fl.live=!!opts.live;fl.growthT=opts.growthT!=null?opts.growthT:1;fl.srcUrl=opts.srcUrl||null;fl.index=index;
  scene.add(fl.group);Field.flowers.push(fl);return fl;}

const Ptr={x:0,y:0,down:false,drag:false,onFlower:null,moved:0,active:false,idle:99,
  world:new THREE.Vector3(),vWorld:new THREE.Vector3(),pWorld:new THREE.Vector3(),speed:0,has:false};
const raycaster=new THREE.Raycaster();const groundPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);const ndc=new THREE.Vector2();const _hit=new THREE.Vector3();
function updateCursorWorld(){ndc.set((Ptr.x/W)*2-1,-(Ptr.y/H)*2+1);raycaster.setFromCamera(ndc,camera);
  const hit=raycaster.ray.intersectPlane(groundPlane,_hit);
  if(hit){Ptr.pWorld.copy(Ptr.world);Ptr.world.copy(_hit);Ptr.vWorld.subVectors(Ptr.world,Ptr.pWorld);Ptr.has=true;Ptr.speed=Ptr.vWorld.length();}else Ptr.has=false;}
function flowerAtPointer(){ndc.set((Ptr.x/W)*2-1,-(Ptr.y/H)*2+1);raycaster.setFromCamera(ndc,camera);
  let best=null,bd=1e9;const o=new THREE.Vector3();
  for(const fl of Field.flowers){fl.group.getWorldPosition(o);const toC=o.clone().sub(raycaster.ray.origin);const proj=toC.dot(raycaster.ray.direction);if(proj<0)continue;
    const closest=raycaster.ray.origin.clone().add(raycaster.ray.direction.clone().multiplyScalar(proj));const d=closest.distanceTo(o.setY(o.y+fl.topY*0.4));
    if(d<2.6&&d<bd){bd=d;best=fl;}}return best;}
function pointerPos(e){const r=canvas.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
canvas.addEventListener('pointerdown',e=>{canvas.setPointerCapture&&canvas.setPointerCapture(e.pointerId);const p=pointerPos(e);Ptr.x=p.x;Ptr.y=p.y;Ptr.down=true;Ptr.drag=false;Ptr.moved=0;Ptr.active=true;Ptr.idle=0;updateCursorWorld();Ptr.onFlower=flowerAtPointer();hideHint();});
canvas.addEventListener('pointermove',e=>{const p=pointerPos(e);const dx=p.x-Ptr.x,dy=p.y-Ptr.y;Ptr.x=p.x;Ptr.y=p.y;Ptr.active=true;Ptr.idle=0;
  if(Ptr.down){Ptr.moved+=Math.hypot(dx,dy);if(!Ptr.drag&&Ptr.moved>8)Ptr.drag=!Ptr.onFlower;if(Ptr.drag){Cam.taz-=dx*0.005;Cam.tpo=clamp(Cam.tpo-dy*0.004,0.38,1.2);}}
  updateCursorWorld();hideHint();});
function up(e){if(Ptr.down&&!Ptr.drag&&Ptr.moved<8){const fl=Ptr.onFlower||flowerAtPointer();if(fl)selectFlower(fl);}Ptr.down=false;Ptr.drag=false;Ptr.onFlower=null;}
canvas.addEventListener('pointerup',up);canvas.addEventListener('pointercancel',up);
canvas.addEventListener('wheel',e=>{e.preventDefault();Cam.tr=clamp(Cam.tr*(1+e.deltaY*0.0012),8,46);},{passive:false});
let pinch0=0;canvas.addEventListener('touchmove',e=>{if(e.touches&&e.touches.length===2){e.preventDefault();const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.hypot(dx,dy);if(pinch0)Cam.tr=clamp(Cam.tr*(pinch0/d),8,46);pinch0=d;}},{passive:false});
canvas.addEventListener('touchend',()=>pinch0=0);
function selectFlower(fl){Cam.ttarget.set(fl.group.position.x,fl.topY*0.5,fl.group.position.z);Cam.tr=clamp(11,8,46);
  if(fl.srcUrl)playSample(fl.srcUrl,fl.spec.name);else toast('《'+fl.spec.name+'》— 把这首再拖进来就能再听一次');}

function updateCamera(){Cam.r=mix(Cam.r,Cam.tr,0.1);Cam.az=mix(Cam.az,Cam.taz,0.12);Cam.po=mix(Cam.po,Cam.tpo,0.12);Cam.target.lerp(Cam.ttarget,0.09);
  const sp=Math.sin(Cam.po),cp=Math.cos(Cam.po);
  camera.position.set(Cam.target.x+Cam.r*sp*Math.cos(Cam.az),Cam.target.y+Cam.r*cp,Cam.target.z+Cam.r*sp*Math.sin(Cam.az));
  camera.lookAt(Cam.target);sky.position.copy(camera.position);}

/* =========================================================================
   LOOP
   ========================================================================= */
let endedAt=0,lastT=performance.now(),mode='intro';
const cursorState={has:false,p:new THREE.Vector3(),v:new THREE.Vector3(),R:6.5,speed:0};
function frame(now){
  requestAnimationFrame(frame);
  const dt=Math.min(0.05,(now-lastT)/1000);lastT=now;
  Audio_.sample();
  Ptr.idle+=dt;if(Ptr.idle>1.0)Ptr.active=false;Ptr.vWorld.multiplyScalar(0.7);
  let breeze;if(Audio_.playing)breeze=0.5+Audio_.level*2.2+Audio_.bass*1.1;else{const since=(now-endedAt)/1000;breeze=(endedAt&&since>2.5)?0.18:0.4;}
  wind.x=mix(wind.x,Math.sin(now*0.0004)*breeze,0.04);wind.z=mix(wind.z,Math.cos(now*0.00033)*breeze*0.7,0.04);
  cursorState.has=Ptr.active&&Ptr.has&&!Ptr.drag;cursorState.p.copy(Ptr.world);cursorState.v.copy(Ptr.vWorld);cursorState.speed=Ptr.speed;cursorState.R=6.5;

  const live=Field.live;
  if(live){let g=clamp(Audio_.progress()*1.05);if(!Audio_.playing&&Audio_.duration>0&&Audio_.curTime()>=Audio_.duration-0.3)g=1;live.growthT=Math.max(live.growthT,g);}

  for(const fl of Field.flowers)fl.update(dt,fl.live?fl.growthT:1,Audio_.level,Audio_.beatFlash,cursorState);
  updatePetals(dt);updateMotes(dt,Audio_.level);updateCamera();
  renderer.render(scene,camera);
  if(live&&mode==='play')npBar.style.width=(Audio_.progress()*100)+'%';
}
requestAnimationFrame(frame);
addEventListener('resize',()=>{W=innerWidth;H=innerHeight;if(!W||!H)return;renderer.setSize(W,H);camera.aspect=W/H;camera.updateProjectionMatrix();});

/* =========================================================================
   UI / FLOW
   ========================================================================= */
const intro=document.getElementById('intro'),hud=document.getElementById('hud'),hintEl=document.getElementById('hint');
const npName=document.getElementById('npName'),npMood=document.getElementById('npMood'),npBar=document.getElementById('npBar');
const show=el=>el.classList.remove('hidden'),hide=el=>el.classList.add('hidden');
let hintHidden=false;function hideHint(){if(!hintHidden){hintHidden=true;hintEl.classList.add('gone');}}
function toast(m){const d=document.createElement('div');d.className='toast';d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.style.opacity='0',1500);setTimeout(()=>d.remove(),2100);}
const flowerCN={daisy:'雏菊',bellflower:'风铃花',pastelplume:'柔羽花',sunflower:'向日葵',marigold:'金盏花'};

const STORE='musicgarden.v4';
const loadG=()=>{try{return JSON.parse(localStorage.getItem(STORE))||[];}catch(e){return[];}};
const saveG=g=>localStorage.setItem(STORE,JSON.stringify(g.slice(-40)));

async function startBuffer(ab,name,srcUrl){
  if(!flowersReady){toast('花还在备……稍等一下');return;}
  intro.style.pointerEvents='none';
  try{
    const buf=await Audio_.load(ab);const fp=fingerprint(buf,name);const spec=genSpec(fp,name);
    // persist current live, rebuild: live at centre, past around
    if(Field.live){const g0=loadG(),lf=Field.live.spec.fp;if(!g0.some(x=>x.seed===lf.seed)){g0.push(memOf(Field.live));saveG(g0);}}
    for(const fl of Field.flowers)scene.remove(fl.group);Field.flowers.length=0;Field.live=null;
    let si=1;for(const it of loadG()){if(it.seed===fp.seed)continue;addFlower(specOf(it),si++,{growthT:1,srcUrl:it.src||null});}
    const fl=addFlower(spec,0,{live:true,growthT:0,srcUrl:srcUrl||null});Field.live=fl;keptThis=false;endedAt=0;
    applyMood(spec.M);
    Cam.target.set(0,fl.topY*0.5,0);Cam.ttarget.set(0,fl.topY*0.5,0);Cam.r=Cam.tr=13;Cam.az=Cam.taz=0.7;Cam.po=Cam.tpo=0.78;
    Audio_.reset();Audio_.play(onEnd);mode='play';
    npName.textContent=name;npMood.textContent='· '+spec.M.label+' · '+flowerCN[spec.flower];
    document.getElementById('pauseBtn').textContent='暂停';hide(intro);show(hud);
  }catch(e){console.error(e);errEl.textContent='读歌失败: '+(e.message||e);alert('这首歌没读出来，换一首试试？\n'+(e.message||e));intro.style.pointerEvents='';}
}
function memOf(fl){const fp=fl.spec.fp;return{seed:fp.seed,name:fl.spec.name,when:Date.now(),e:fp.energy,b:fp.brightness,d:fp.dynamics,dur:fp.duration,src:fl.srcUrl||null};}
function specOf(it){return genSpec({energy:it.e,brightness:it.b,dynamics:it.d,seed:it.seed,duration:it.dur},it.name);}
let keptThis=false;
function onEnd(){endedAt=performance.now();if(!keptThis){keptThis=true;const g=loadG();if(Field.live&&!g.some(x=>x.seed===Field.live.spec.fp.seed)){g.push(memOf(Field.live));saveG(g);}toast('这朵留在了你的花园里 🌸');}}

const drop=document.getElementById('drop'),fileInput=document.getElementById('file');
drop.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);});
['dragenter','dragover'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('hot');}));
['dragleave','drop'].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();if(ev==='drop'){const f=e.dataTransfer.files[0];if(f&&f.type.startsWith('audio'))readFile(f);}drop.classList.remove('hot');}));
function readFile(f){Audio_.ensure();const r=new FileReader();r.onload=()=>startBuffer(r.result,f.name.replace(/\.[^.]+$/,''),null);r.readAsArrayBuffer(f);}

const SAMPLES=[['calm','晨之歌','#f4a8c8'],['happy','明亮日','#ffd24a'],['epic','史诗','#ff8a52'],['sad','蓝色雨','#7ab0ff'],['dark','夜','#9a7aff'],['tense','紧绷','#c06bff'],['gloom','雾','#c0a8e0']];
const seedsEl=document.getElementById('seeds');
for(const[file,label,col] of SAMPLES){const b=document.createElement('div');b.className='seed';b.innerHTML='<span class="dot" style="color:'+col+'"></span>'+label;b.onclick=()=>playSample('assets/'+file+'.mp3',label);seedsEl.appendChild(b);}
async function playSample(url,label){Audio_.ensure();if(!flowersReady){toast('花还在备……稍等');return;}try{const ab=await fetch(url).then(r=>r.arrayBuffer());startBuffer(ab,label,url);}catch(e){toast('试听文件没加载到');console.error(e);}}

document.getElementById('pauseBtn').onclick=function(){if(Audio_.playing){Audio_.pause();this.textContent='继续';}else{Audio_.resume(onEnd);this.textContent='暂停';}};
document.getElementById('newBtn').onclick=()=>{if(Field.live){const g=loadG();if(!g.some(x=>x.seed===Field.live.spec.fp.seed)){g.push(memOf(Field.live));saveG(g);}}Audio_.reset();mode='intro';hide(hud);show(intro);intro.style.pointerEvents='';};
document.getElementById('overviewBtn').onclick=()=>{const n=Field.flowers.length;Cam.ttarget.set(0,1.5,0);Cam.tr=clamp(10+n*2.2,14,42);Cam.tpo=0.66;};

// preload garden from storage so it's there behind the intro
function bootField(){const wait=setInterval(()=>{if(!flowersReady)return;clearInterval(wait);let i=0;for(const it of loadG())addFlower(specOf(it),i++,{growthT:1,src:it.src});},120);}
bootField();
window.__G={Field,Audio_,Cam,cursorState,shedPetals,scene,camera,genSpec,fingerprint,applyMood,get live(){return Field.live;}};
</script>
