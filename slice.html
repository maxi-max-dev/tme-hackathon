<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>读懂这首歌 · 理解 → 实时解读</title>
<style>
  :root{ --line:rgba(255,255,255,.14); --text:#f2f2f7; --muted:#a6a6bd; --accent:#7c6cff; --accent2:#c06bff; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;background:#0a0a0f;overflow-x:hidden;}
  #bg{position:fixed;inset:0;z-index:-1;background:radial-gradient(130% 100% at 50% 8%,#1a1730,#0a0a12 70%,#06060a);transition:background .25s linear;}
  .wrap{max-width:900px;margin:0 auto;padding:22px 20px 60px;min-height:100%;display:flex;flex-direction:column;}
  .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
  .brand{font-weight:800;font-size:16px;opacity:.9;}
  #summary{color:var(--muted);font-size:14.5px;max-width:640px;text-align:right;}
  #summary b{color:var(--text);font-weight:600;}
  /* 主角：此刻文字 */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;min-height:42vh;padding:18px 6px 6px;}
  #label{display:inline-block;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent2);border:1px solid rgba(192,107,255,.4);background:rgba(192,107,255,.08);border-radius:999px;padding:4px 14px;margin-bottom:18px;transition:opacity .35s ease;min-height:26px;}
  #nowText{font-size:clamp(24px,4.6vw,46px);font-weight:750;line-height:1.32;max-width:18em;letter-spacing:.01em;background:linear-gradient(180deg,#fff,#e3dcff);-webkit-background-clip:text;background-clip:text;color:transparent;transition:opacity .35s ease;min-height:1.4em;}
  /* 控制 */
  .transport{display:flex;align-items:center;gap:12px;margin:8px 0 6px;flex-wrap:wrap;}
  .iconbtn{width:50px;height:50px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;flex:0 0 auto;}
  .iconbtn:hover{filter:brightness(1.1);}
  .seek{flex:1;min-width:160px;height:6px;border-radius:99px;background:rgba(255,255,255,.1);position:relative;overflow:hidden;}
  .seek i{position:absolute;inset:0 auto 0 0;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .btn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:11px 18px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
  .btn:hover{border-color:var(--accent);}
  .btn.solid{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;font-weight:700;}
  /* 结构弧 */
  .arcwrap{margin-top:14px;border:1px solid var(--line);border-radius:14px;background:rgba(0,0,0,.22);padding:10px 12px 4px;}
  .arclabel{font-size:11.5px;color:var(--muted);margin-bottom:4px;}
  #arc{display:block;width:100%;height:104px;}
  /* AI / key / status */
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:14px;}
  input{background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:10px 12px;font-family:inherit;font-size:13px;}
  .status{color:var(--muted);font-size:12.5px;margin-top:10px;}
  .hint{color:var(--muted);font-size:12px;margin-top:6px;}
  a{color:var(--accent2);text-decoration:none;}
</style>
</head>
<body>
<div id="bg"></div>
<div class="wrap">

  <div class="top">
    <div class="brand">读懂这首歌 <span style="color:var(--accent2)">·</span> See-the-Song</div>
    <div id="summary">载入中…</div>
  </div>

  <!-- 主角：此刻文字 -->
  <div class="stage">
    <div id="label">—</div>
    <div id="nowText">载入一首歌，跟着播放「读」它</div>
  </div>

  <div class="transport">
    <button class="iconbtn" id="play">▶</button>
    <div class="seek" id="seek"><i></i></div>
    <label class="btn" style="cursor:pointer">⬆ 上传我的歌<input id="file" type="file" accept="audio/*" hidden></label>
  </div>

  <!-- 结构 / 情绪弧 -->
  <div class="arcwrap">
    <div class="arclabel">整首的形状 · 情绪强度弧（标签＝段落角色，曲线＝强度，竖线＝你在哪）</div>
    <canvas id="arc"></canvas>
  </div>

  <div class="row">
    <button class="btn solid" id="aiBtn">✦ 让 AI 读懂这首歌（写解读 + 情绪弧）</button>
    <input id="key" type="password" placeholder="Gemini key（AIza…，只存你浏览器）" style="flex:1;min-width:220px;">
  </div>
  <div class="status" id="status">—</div>
  <div class="hint">没 key 也能跑（本机先给个粗读）。key 只存你浏览器、只发 Google，不进代码。去 <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com/apikey</a> 免费拿。</div>

</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpHue=(a,b,t)=>{ const d=((b-a+540)%360)-180; return (a+d*t+360)%360; };
const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};

const SONG_URL='assets/epic.mp3', SONG_NAME='Heroic Age';
let SEGMENTS=[], SONG={summary:''}, DUR=0, rawBytes=null, rawMime='audio/mpeg';

/* ================= 理解管线（复用：DSP 切段 + 每段能量） ================= */
const NORM=arr=>{const s=Array.from(arr).sort((a,b)=>a-b);const lo=s[Math.floor(s.length*.05)]||0,hi=s[Math.floor(s.length*.95)]||1,d=(hi-lo)||1,o=new Float32Array(arr.length);for(let i=0;i<arr.length;i++)o[i]=clamp((arr[i]-lo)/d,0,1);return o;};
const SMOOTH=(arr,k)=>{const o=new Float32Array(arr.length);for(let i=0;i<arr.length;i++){let s=0,c=0;for(let j=-k;j<=k;j++){const x=i+j;if(x>=0&&x<arr.length){s+=arr[x];c++;}}o[i]=s/c;}return o;};
function mixMono(ab){ if(ab.numberOfChannels===1)return ab.getChannelData(0); const a=ab.getChannelData(0),b=ab.getChannelData(1),o=new Float32Array(a.length); for(let i=0;i<a.length;i++)o[i]=(a[i]+b[i])*.5; return o; }
function rmsEnv(ch,sr,fps){ const hop=Math.max(1,Math.floor(sr/fps)),N=Math.max(1,Math.floor(ch.length/hop)),o=new Float32Array(N); for(let f=0;f<N;f++){const s0=f*hop;let s=0,c=0;for(let i=0;i<hop&&s0+i<ch.length;i++){const v=ch[s0+i];s+=v*v;c++;}o[f]=Math.sqrt(s/(c||1));} return o; }
function analyze(ab){ const sr=ab.sampleRate,fps=30,energy=SMOOTH(NORM(rmsEnv(mixMono(ab),sr,fps)),4); return {fps,n:energy.length,dur:ab.duration,energy}; }
function segment(tl){
  const {fps,n,energy:E}=tl, W=Math.max(1,Math.round(fps*0.6)), nov=new Float32Array(n);
  for(let i=W;i<n;i++) nov[i]=Math.abs(E[i]-E[i-W]);
  const novS=SMOOTH(nov,Math.round(fps*0.4));
  let mean=0; for(let i=0;i<n;i++)mean+=novS[i]; mean/=(n||1);
  let v=0; for(let i=0;i<n;i++)v+=(novS[i]-mean)**2; const std=Math.sqrt(v/(n||1));
  const thr=mean+0.7*std, minGap=Math.round(fps*6), bounds=[0]; let last=0;
  for(let i=1;i<n-1;i++){ if(novS[i]>thr&&novS[i]>=novS[i-1]&&novS[i]>novS[i+1]&&i-last>=minGap){bounds.push(i);last=i;} }
  bounds.push(n);
  const segs=[];
  for(let k=0;k<bounds.length-1;k++){ const s=bounds[k],e=Math.max(bounds[k]+1,bounds[k+1]); let m=0,c=0; for(let i=s;i<e;i++){m+=E[i];c++;} m/=c||1;
    segs.push({ start:s/fps, end:e/fps, energy:+m.toFixed(3), now:'', label:'', intensity:+m.toFixed(3), mood:'' }); }
  return segs;
}
// 无 key 时的本机粗读：给每段一个大白话 now / label / intensity / mood，让三层先转起来
function dspFill(){
  const n=SEGMENTS.length; if(!n)return; let maxI=0; SEGMENTS.forEach((s,i)=>{if(s.energy>SEGMENTS[maxI].energy)maxI=i;});
  SEGMENTS.forEach((s,i)=>{ const e=s.energy, prev=i>0?SEGMENTS[i-1].energy:e;
    s.intensity=e;
    s.label = i===0?'开场':i===n-1?'收束':i===maxI?'高潮':(e>prev+0.08?'渐强':e<prev-0.08?'回落':'铺垫');
    s.now = e<0.2?'很轻，几乎只剩空气和余白。':e<0.45?'声音慢慢铺开，像在酝酿。':e<0.7?'层层叠上来，情绪在往上走。':'全推到最满，最用力的一刻。';
    s.mood = e<0.3?'冷·安静':e<0.6?'暖·期待':'暖·激动';
  });
  SONG.summary='本机粗读：一条由弱到强、再收束的情绪线（填 key 让 AI 真正读懂）';
}

/* ================= 情绪 → 背景色 ================= */
// 暖/冷 前缀先定冷暖大方向，情绪词在该半区里挑具体色相
const WARM=[[/紧张|焦虑|压抑/,8],[/激动|燃|亢奋|爆发|热血|激昂|壮烈/,20],[/喜悦|欢快|快乐|俏皮|明亮|轻快/,46],[/温暖|温柔|希望|憧憬|期待|庄严|柔/,34]];
const COOL=[[/平静|宁静|安静|放松|舒缓/,190],[/忧伤|悲|孤独|失落|惆怅|思念/,222],[/神秘|诡异|阴郁|黑暗|悬疑/,266],[/梦幻|空灵|缥缈|辽阔|开阔/,284]];
function moodHue(m){ m=m||''; const warm=/暖|warm|热/.test(m), cool=/冷|cold|凉/.test(m);
  if(cool){ for(const [re,h] of COOL) if(re.test(m)) return h; return 212; }
  if(warm){ for(const [re,h] of WARM) if(re.test(m)) return h; return 34; }
  for(const [re,h] of WARM) if(re.test(m)) return h; for(const [re,h] of COOL) if(re.test(m)) return h; return 258; }
function moodColor(m,inten){ return {h:moodHue(m), s:clamp(28+inten*48,24,84), l:clamp(9+inten*15,7,26)}; }

/* ================= 音频（复用） ================= */
let actx=null,master=null,analyser=null,td=null,source=null,startTime=0,playing=false,buf=null,lastE=0;
function initAudio(){ if(actx)return; actx=new (window.AudioContext||window.webkitAudioContext)(); master=actx.createGain();master.gain.value=.9; analyser=actx.createAnalyser();analyser.fftSize=1024; td=new Uint8Array(analyser.fftSize); master.connect(analyser); analyser.connect(actx.destination); }
function liveEnergy(){ if(!analyser)return 0; analyser.getByteTimeDomainData(td); let s=0; for(let i=0;i<td.length;i++){const x=(td[i]-128)/128;s+=x*x;} return Math.sqrt(s/td.length); }
function start(){ stop(); initAudio(); if(actx.state==='suspended')actx.resume(); source=actx.createBufferSource(); source.buffer=buf; source.loop=true; source.connect(master); startTime=actx.currentTime+.04; source.start(startTime); playing=true; $('#play').textContent='⏸'; }
function stop(){ playing=false; if(source){try{source.stop();}catch(e){}try{source.disconnect();}catch(e){}source=null;} $('#play').textContent='▶'; }

/* ================= 呈现层 1：此刻文字（主角，淡入淡出） ================= */
let _shown=-1, _swapTimer=null;
function showNow(idx){
  if(idx===_shown)return; _shown=idx; const seg=SEGMENTS[idx];
  const el=$('#nowText'), lb=$('#label'); el.style.opacity=0; lb.style.opacity=0;
  clearTimeout(_swapTimer);
  _swapTimer=setTimeout(()=>{ el.textContent=seg?(seg.now||'…'):'…'; lb.textContent=seg?(seg.label||''):''; el.style.opacity=1; lb.style.opacity=1; },300);
}
function setNowImmediate(idx){ _shown=idx; const seg=SEGMENTS[idx]; $('#nowText').textContent=seg?(seg.now||'…'):'…'; $('#label').textContent=seg?(seg.label||''):''; $('#nowText').style.opacity=1; $('#label').style.opacity=1; }

/* ================= 呈现层 2：结构 / 情绪弧 ================= */
const arc=$('#arc'); let actx2=arc.getContext('2d'), aW=2,aH=2;
function resizeArc(){ const dpr=Math.min(devicePixelRatio||1,2), r=arc.getBoundingClientRect(); aW=Math.max(2,r.width); aH=Math.max(2,r.height); arc.width=aW*dpr; arc.height=aH*dpr; actx2.setTransform(dpr,0,0,dpr,0,0); }
function drawArc(e,curIdx){
  const c=actx2; c.clearRect(0,0,aW,aH); if(!SEGMENTS.length||!DUR)return;
  const baseY=aH-22, amp=aH-44, hue=Math.round(bgH);
  const xf=t=>(t/DUR)*aW, vof=s=>clamp(s.intensity!=null?s.intensity:s.energy,0,1);
  const line=[{x:0,v:vof(SEGMENTS[0])}].concat(SEGMENTS.map(s=>({x:xf((s.start+s.end)/2),v:vof(s)}))).concat([{x:aW,v:vof(SEGMENTS[SEGMENTS.length-1])}]);
  // 面积
  c.beginPath(); c.moveTo(0,baseY); line.forEach(p=>c.lineTo(p.x,baseY-p.v*amp)); c.lineTo(aW,baseY); c.closePath();
  c.fillStyle='hsla('+hue+',70%,62%,.16)'; c.fill();
  // 曲线
  c.beginPath(); line.forEach((p,i)=> i?c.lineTo(p.x,baseY-p.v*amp):c.moveTo(p.x,baseY-p.v*amp)); c.strokeStyle='hsla('+hue+',80%,72%,.9)'; c.lineWidth=2; c.stroke();
  // 段落分隔 + 标签
  c.textAlign='center'; c.textBaseline='alphabetic';
  SEGMENTS.forEach((s,i)=>{ const x0=xf(s.start),x1=xf(s.end);
    if(i>0){ c.strokeStyle='rgba(255,255,255,.08)'; c.lineWidth=1; c.beginPath();c.moveTo(x0,6);c.lineTo(x0,baseY);c.stroke(); }
    if(i===curIdx){ c.fillStyle='hsla('+hue+',60%,55%,.16)'; c.fillRect(x0,6,Math.max(1,x1-x0),baseY-6); }
    c.fillStyle=i===curIdx?'#fff':'rgba(255,255,255,.42)'; c.font=(i===curIdx?'700 ':'500 ')+'12px -apple-system,sans-serif';
    const lab=s.label||''; if((x1-x0)>26||i===curIdx) c.fillText(lab,(x0+x1)/2,aH-6);
  });
  // 播放头 + 点
  const px=xf(e); c.strokeStyle='#fff'; c.lineWidth=2; c.beginPath();c.moveTo(px,4);c.lineTo(px,baseY);c.stroke();
  const cur=SEGMENTS[curIdx]; const v=cur?vof(cur):0; c.fillStyle='#fff'; c.beginPath();c.arc(px,baseY-v*amp,3.5,0,7);c.fill();
}

/* ================= 呈现层 3：氛围背景（平滑渐变） ================= */
let bgH=255,bgS=22,bgL=11;
function setBg(){ const h=Math.round(bgH),s=Math.round(bgS),l=Math.round(bgL); $('#bg').style.background='radial-gradient(130% 100% at 50% 6%, hsl('+h+' '+s+'% '+(l+7)+'%), hsl('+((h+24)%360)+' '+s+'% '+Math.max(4,l-2)+'%) 68%, hsl('+((h+24)%360)+' '+Math.max(10,s-10)+'% 4%))'; }

/* ================= 渲染循环 ================= */
let lastIdx=-1;
function segIndexAt(t){ if(!SEGMENTS.length)return -1; let i=0; for(let k=0;k<SEGMENTS.length;k++){ if(t>=SEGMENTS[k].start)i=k; } return i; }
function loop(){
  let e=lastE, idx=-1, seg=null;
  if(SEGMENTS.length){
    if(playing&&actx){ e=actx.currentTime-startTime; e=DUR?(((e%DUR)+DUR)%DUR):0; lastE=e; }
    idx=segIndexAt(e); seg=SEGMENTS[idx];
    const live=playing?clamp(liveEnergy()*1.6,0,1):0;
    if(seg){ const tc=moodColor(seg.mood,clamp(seg.intensity*0.8+live*0.3,0,1)); bgH=lerpHue(bgH,tc.h,0.04); bgS=lerp(bgS,tc.s,0.04); bgL=lerp(bgL,tc.l+live*4,0.06); }
    if(idx!==lastIdx){ lastIdx=idx; showNow(idx); }
  }
  setBg(); drawArc(e,idx);
  $('#seek i').style.width=(DUR?e/DUR*100:0)+'%';
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
window.addEventListener('resize',resizeArc);

/* ================= 载入（内置 / 上传）→ DSP → 本机粗读 ================= */
async function ingest(name,arrbuf,mime){
  stop();
  rawBytes=new Uint8Array(arrbuf.slice(0)); rawMime=mime||'audio/mpeg';
  $('#status').textContent='正在解码 '+name+' …';
  initAudio(); buf=await actx.decodeAudioData(arrbuf.slice(0)); DUR=buf.duration;
  $('#status').textContent='正在分析 + 切段（本机）…';
  SEGMENTS=segment(analyze(buf)); SONG={summary:''}; dspFill();
  resizeArc(); lastIdx=-1; lastE=0; _shown=-1; setNowImmediate(0);
  $('#summary').innerHTML='<b>'+name+'</b> · '+SONG.summary;
  $('#status').textContent='✓ '+name+'（'+Math.round(DUR)+'s）· 切成 '+SEGMENTS.length+' 段 · 现在是本机粗读，点「让 AI 读懂」换成真解读';
}
async function boot(){ try{ $('#status').textContent='正在载入 '+SONG_NAME+' …'; const a=await fetch(SONG_URL).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();}); await ingest(SONG_NAME,a,'audio/mpeg'); }catch(e){ $('#status').textContent='载入失败：'+((e&&e.message)||e); } }
boot();
function loadFile(f){ if(!f)return; f.arrayBuffer().then(b=>ingest(f.name,b,f.type||'audio/mpeg')).catch(err=>{ $('#status').textContent='解码失败，换个文件试试（'+((err&&err.message)||err)+'）'; }); }
$('#file').onchange=e=>loadFile(e.target.files[0]);
$('#play').onclick=()=>{ if(playing)stop(); else start(); };

/* ================= Gemini：看完整首 + DSP 段落 → summary + 每段 now/label/intensity/mood ================= */
const GEMINI_MODELS=['gemini-2.5-flash','gemini-1.5-flash','gemini-2.5-flash-lite'];
const SCHEMA={ type:'OBJECT', properties:{
  summary:{type:'STRING'},
  segments:{type:'ARRAY',items:{type:'OBJECT',properties:{ i:{type:'INTEGER'}, now:{type:'STRING'}, label:{type:'STRING'}, intensity:{type:'NUMBER'}, mood:{type:'STRING'} }, required:['i','now','label','intensity','mood']}}
}, required:['summary','segments'] };
const PROMPT='你在帮听不见声音的人「读懂」一首歌——他们只看文字、不听声音。下面是本机把整首歌切好的段落(每段含能量 energy 0-1，结构已定，请勿改 i/start/end)。请你完整听这段音频，输出 JSON：\n- summary：一句话概括整首歌(开场给人看，≤24字)。\n- 每段 segments[]：\n  · now：用大白话讲「此刻」音乐在干什么、给人什么感觉。现在时、有画面感、像在你耳边轻声解说。**不要用技术词**(BPM/调式/和弦/分贝等)。≤30字。\n  · label：这一段的角色，二到四字(如 开场/铺垫/爆发/副歌/收束/尾声)。\n  · intensity：0~1，这一段的强度(和你听到的、以及 energy 对应)。\n  · mood：「暖」或「冷」+ 一个情绪词(如 暖·期待 / 冷·孤独)，只用来配背景色。\n要求：基于你真实听到的，别套模板、别写空话。只输出 JSON，不要解释或前缀。';
function u8ToB64(u8){ let s='';const C=0x8000; for(let i=0;i<u8.length;i+=C)s+=String.fromCharCode.apply(null,u8.subarray(i,i+C)); return btoa(s); }
function applyAI(data){
  if(!data)return false;
  if(data.summary)SONG.summary=String(data.summary).trim();
  if(Array.isArray(data.segments)){ for(const f of data.segments){ const s=SEGMENTS[f.i]; if(!s)continue;
    if(f.now)s.now=String(f.now).trim(); if(f.label)s.label=String(f.label).trim();
    if(typeof f.intensity==='number')s.intensity=clamp(f.intensity,0,1); if(f.mood)s.mood=String(f.mood).trim(); } }
  $('#summary').innerHTML='<b>'+($('#summary').querySelector('b')?$('#summary').querySelector('b').textContent:'')+'</b> · '+SONG.summary;
  lastIdx=-1; _shown=-1; setNowImmediate(segIndexAt(lastE)); return true;
}
window.__applyAI=applyAI; // 供测试注入「仿 Gemini」payload
$('#aiBtn').onclick=async()=>{
  if(!SEGMENTS.length||!rawBytes){ $('#status').textContent='还没载入歌曲'; return; }
  let key=$('#key').value.trim()||localStorage.getItem('gk')||'';
  if(!key){ $('#status').textContent='👉 先在右边填 Gemini key（AIza…）再点'; $('#key').focus(); return; }
  localStorage.setItem('gk',key);
  const facts=SEGMENTS.map((s,i)=>({i,start:+s.start.toFixed(1),end:+s.end.toFixed(1),energy:s.energy}));
  const body={ contents:[{parts:[{inline_data:{mime_type:rawMime,data:u8ToB64(rawBytes)}},{text:PROMPT+'\n\n【段落事实】\n'+JSON.stringify(facts)}]}], generationConfig:{temperature:0.8,maxOutputTokens:2048,responseMimeType:'application/json',responseSchema:SCHEMA} };
  let lastErr='';
  for(const m of GEMINI_MODELS){
    $('#status').textContent='AI 正在完整听这首歌（'+m+'）…';
    try{
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+m+':generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await r.json().catch(()=>({}));
      if(r.ok){ const txt=((j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts)||[]).map(p=>p.text||'').join('').trim(); let d=null; try{d=JSON.parse(txt);}catch(e){try{d=JSON.parse(txt.slice(txt.indexOf('{'),txt.lastIndexOf('}')+1));}catch(e2){}} if(d&&applyAI(d)){ $('#status').textContent='✓ AI 已读懂（'+m+'）· 跟着播放看「此刻」和情绪弧'; return; } lastErr='返回不是有效 JSON'; continue; }
      lastErr=(j.error&&j.error.message)||('HTTP '+r.status); if(!/quota|exceed|not found|NOT_FOUND|unsupported|limit|404/i.test(lastErr))break;
    }catch(e){ lastErr=String(e); break; }
  }
  $('#status').textContent='AI 出错：'+lastErr;
};

/* ================= 自测钩子 ================= */
window.__state=()=>({ summary:SONG.summary, dur:+DUR.toFixed(1), playhead:+lastE.toFixed(1), curIdx:segIndexAt(lastE), shownNow:$('#nowText').textContent, shownLabel:$('#label').textContent, bg:[Math.round(bgH),Math.round(bgS),Math.round(bgL)], segs:SEGMENTS.map((s,i)=>({i,t:fmt(s.start)+'–'+fmt(s.end),label:s.label,intensity:+(s.intensity||s.energy).toFixed(2),mood:s.mood,now:s.now})) });
</script>
