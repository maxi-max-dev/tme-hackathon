<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐花园 · 边放歌边长，一座会听歌的园子</title>
<style>
  :root{ --text:#f3f1ff; --muted:#a9a7c4; --line:rgba(255,255,255,.16); --accent:#7ddf8f; --accent2:#e06bff; }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;background:#06060c;}
  #garden{position:fixed;inset:0;z-index:0;display:block;}
  .ui{position:fixed;z-index:2;pointer-events:none;}
  .ui *{pointer-events:auto;}
  .top{top:0;left:0;right:0;padding:14px 18px;display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .brand{font-weight:800;font-size:15px;text-shadow:0 2px 14px rgba(0,0,0,.7);}
  .brand span{color:var(--accent);}
  #status{font-size:12px;color:var(--muted);text-align:right;max-width:50vw;text-shadow:0 1px 8px rgba(0,0,0,.7);}
  .panel{left:16px;top:54px;display:flex;flex-direction:column;gap:9px;width:212px;background:rgba(8,8,16,.46);backdrop-filter:blur(9px);border:1px solid var(--line);border-radius:15px;padding:13px;}
  .lab{font-size:11px;color:var(--muted);letter-spacing:.04em;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{background:rgba(255,255,255,.06);border:1px solid var(--line);color:var(--text);border-radius:10px;padding:7px 11px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;}
  .chip:hover{border-color:var(--accent);}
  .chip.sel{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#0a0a12;}
  .chip.planted::after{content:" 🌿";}
  .btn{background:transparent;border:1px solid var(--line);color:var(--text);border-radius:10px;padding:9px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn.solid{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#0a0a12;}
  .btn:hover{filter:brightness(1.08);}
  .transport{display:flex;align-items:center;gap:8px;}
  .seek{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.12);position:relative;overflow:hidden;cursor:pointer;}
  .seek i{position:absolute;inset:0 auto 0 0;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .time{font-size:10.5px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:64px;text-align:center;}
  input{background:rgba(0,0,0,.34);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:7px 10px;font-family:inherit;font-size:11.5px;width:100%;}
  .hint{position:fixed;z-index:2;bottom:12px;left:0;right:0;text-align:center;font-size:11.5px;color:var(--muted);text-shadow:0 1px 8px rgba(0,0,0,.8);}
  .vatag{font-size:11px;color:var(--muted);line-height:1.5;}.vatag b{color:#fff;}
  .ui,.hint{transition:opacity .4s ease;}
  body.clean .ui,body.clean .hint{opacity:0;pointer-events:none;}
  .det summary::-webkit-details-marker{display:none;}
  #card{position:fixed;z-index:3;left:50%;top:30%;transform:translate(-50%,-10px) scale(.96);opacity:0;pointer-events:none;
    text-align:center;background:rgba(12,12,22,.5);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:18px;padding:18px 30px;transition:opacity .5s ease,transform .5s cubic-bezier(.2,1,.3,1);box-shadow:0 12px 50px rgba(0,0,0,.5);}
  #card.on{opacity:1;transform:translate(-50%,0) scale(1);}
  #card .ct{font-size:12px;letter-spacing:.24em;color:var(--muted);}
  #card .cn{font-size:30px;font-weight:800;margin:6px 0 4px;background:linear-gradient(180deg,#fff,#dfe8ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  #card .cn.rare{background:linear-gradient(180deg,#ffe9a8,#ffb14e);-webkit-background-clip:text;background-clip:text;color:transparent;text-shadow:0 0 24px rgba(255,200,90,.5);}
  #card .cs{font-size:12.5px;color:var(--muted);}
</style>
</head>
<body>
<canvas id="garden"></canvas>

<div class="ui">
  <div class="top">
    <div class="brand">音乐花园 <span>·</span> 扔一首歌，看它长出什么</div>
    <div id="status">载入中…</div>
  </div>
  <div class="panel">
    <div class="lab">扔一首歌进来 🎵</div>
    <div class="chips" id="chips"></div>
    <div class="chips">
      <button class="chip" id="rnd" style="flex:1;text-align:center">🎲 随机扔一首</button>
      <label class="chip" style="cursor:pointer;flex:1;text-align:center">⬆ 我的歌<input id="file" type="file" accept="audio/*" hidden></label>
    </div>
    <div id="count" class="lab" style="color:#fff;font-weight:700;font-size:12.5px">🌿 已发现 0 株</div>
    <button class="btn" id="clear">🧹 清空花园</button>
    <details class="det"><summary class="lab" style="cursor:pointer;outline:none">⚙ 更准地读情绪（Gemini，选填）</summary>
      <input id="key" type="password" placeholder="Gemini key（AIza…）" style="margin-top:6px"><button class="btn" id="aiBtn" style="margin-top:6px">✦ 让 AI 读懂选中的歌</button></details>
    <div class="vatag" id="vatag"></div>
    <div class="vatag" id="wx" style="margin-top:2px"></div>
    <div class="transport" style="display:none"><button id="play">▶</button><span id="time"></span><div class="seek" id="seek"><i></i></div></div>
  </div>
</div>
<div id="card"></div>
<div class="hint" id="hint">扔一首歌 → 等它揭晓长成的植物 → 收进你的花园，越攒越多。不同情绪的歌长出不同品种(还有稀有✨)。点画面隐藏面板截图 · 音乐 CC-BY · Kevin MacLeod</div>

<script>
"use strict";
const $=s=>document.querySelector(s);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const lerpHue=(a,b,t)=>{const d=((b-a+540)%360)-180;return (a+d*t+360)%360;};
const ease=t=>{t=clamp(t,0,1);return t*t*(3-2*t);};
const rnd=(a,b)=>a+Math.random()*(b-a);
const fmt=s=>{s=Math.max(0,Math.round(s));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');};
function mulberry(seed){return function(){seed|=0;seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// 真歌：免费/CC-BY（Kevin MacLeod, incompetech.com）。内置曲标定真实情绪(DSP valence 对大调里的悲伤判不准)；上传曲走 DSP+Gemini
const SONGS=[ {id:'happy',name:'欢快 Happy',url:'assets/happy.mp3',va:{valence:0.7,arousal:0.6}},
  {id:'epic',name:'激昂 Epic',url:'assets/epic.mp3',va:{valence:0.5,arousal:0.92}},
  {id:'calm',name:'平静 Calm',url:'assets/calm.mp3',va:{valence:0.25,arousal:0.18}},
  {id:'tense',name:'紧张 Tense',url:'assets/tense.mp3',va:{valence:-0.4,arousal:0.55}},
  {id:'sad',name:'忧伤 Sad',url:'assets/sad.mp3',va:{valence:-0.65,arousal:0.2}},
  {id:'gloom',name:'哀恸 Gloom',url:'assets/gloom.mp3',va:{valence:-0.88,arousal:0.32}},
  {id:'dark',name:'低沉 Dark',url:'assets/dark.mp3',va:{valence:-0.5,arousal:0.62}} ];
const AN={};   // id -> {va, buf}
let selId='happy';

/* ================= 分析（复用：DSP + FFT 色度 → valence/arousal/弧） ================= */
const NORM=arr=>{const s=Array.from(arr).sort((a,b)=>a-b);const lo=s[(s.length*.05)|0]||0,hi=s[(s.length*.95)|0]||1,d=(hi-lo)||1,o=new Float32Array(arr.length);for(let i=0;i<arr.length;i++)o[i]=clamp((arr[i]-lo)/d,0,1);return o;};
const SMOOTH=(arr,k)=>{const o=new Float32Array(arr.length);for(let i=0;i<arr.length;i++){let s=0,c=0;for(let j=-k;j<=k;j++){const x=i+j;if(x>=0&&x<arr.length){s+=arr[x];c++;}}o[i]=s/c;}return o;};
function mixMono(ab){ if(ab.numberOfChannels===1)return ab.getChannelData(0); const a=ab.getChannelData(0),b=ab.getChannelData(1),o=new Float32Array(a.length); for(let i=0;i<a.length;i++)o[i]=(a[i]+b[i])*.5; return o; }
function bandFeat(ch,sr,fps){
  const hop=Math.max(1,(sr/fps)|0), N=Math.max(2,(ch.length/hop)|0);
  const a1=1-Math.exp(-2*Math.PI/sr*200), a2=1-Math.exp(-2*Math.PI/sr*2000); let lp1=0,lp2=0;
  const tot=new Float32Array(N), hi=new Float32Array(N);
  for(let f=0;f<N;f++){ const s0=f*hop; let st=0,sh=0,c=0;
    for(let i=0;i<hop;i++){ const x=ch[s0+i]||0; lp1+=a1*(x-lp1); lp2+=a2*(x-lp2); const h=x-lp2; st+=x*x; sh+=h*h; c++; }
    tot[f]=Math.sqrt(st/c); hi[f]=Math.sqrt(sh/c); }
  const totN=NORM(tot); const sorted=Array.from(tot).sort((a,b)=>a-b); const rawRMS=sorted[(sorted.length*0.7)|0]||0;
  let br=0,c2=0; for(let f=0;f<N;f++){ br+=hi[f]/(tot[f]+1e-6); c2++; }
  return {totN, fps, brightness:clamp(br/c2,0,1), rawRMS};
}
function onsets(ch,sr){
  const fps=100, hop=Math.max(1,(sr/fps)|0), N=Math.max(2,(ch.length/hop)|0), env=new Float32Array(N);
  for(let f=0;f<N;f++){ const s0=f*hop; let s=0,c=0; for(let i=0;i<hop;i++){const x=ch[s0+i]||0;s+=x*x;c++;} env[f]=Math.sqrt(s/c); }
  const flux=new Float32Array(N); for(let f=1;f<N;f++)flux[f]=Math.max(0,env[f]-env[f-1]);
  const fx=SMOOTH(NORM(flux),2); let peaks=0,last=-99,thr=0; for(let f=0;f<N;f++)thr+=fx[f]; thr=thr/N*1.6;
  for(let f=2;f<N-2;f++){ if(fx[f]>thr&&fx[f]>=fx[f-1]&&fx[f]>fx[f+1]&&f-last>=fps*0.12){peaks++;last=f;} }
  return {density: clamp(peaks/(N/fps)/5,0,1)};
}
function fft(re,im){ const n=re.length;
  for(let i=1,j=0;i<n;i++){ let bit=n>>1; for(;j&bit;bit>>=1)j^=bit; j^=bit; if(i<j){const tr=re[i];re[i]=re[j];re[j]=tr;const ti=im[i];im[i]=im[j];im[j]=ti;} }
  for(let len=2;len<=n;len<<=1){ const ang=-2*Math.PI/len, wr=Math.cos(ang), wi=Math.sin(ang);
    for(let i=0;i<n;i+=len){ let cr=1,ci=0; for(let k=0;k<len/2;k++){ const ar=re[i+k],ai=im[i+k];
      const br=re[i+k+len/2]*cr-im[i+k+len/2]*ci, bi=re[i+k+len/2]*ci+im[i+k+len/2]*cr;
      re[i+k]=ar+br; im[i+k]=ai+bi; re[i+k+len/2]=ar-br; im[i+k+len/2]=ai-bi;
      const ncr=cr*wr-ci*wi; ci=cr*wi+ci*wr; cr=ncr; } } }
}
const KMAJ=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const KMIN=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
function corr(a,b){ const n=a.length; let ma=0,mb=0; for(let i=0;i<n;i++){ma+=a[i];mb+=b[i];} ma/=n;mb/=n;
  let num=0,da=0,db=0; for(let i=0;i<n;i++){const x=a[i]-ma,y=b[i]-mb;num+=x*y;da+=x*x;db+=y*y;} return num/(Math.sqrt(da*db)+1e-9); }
function modeScore(ch,sr){
  const W=4096, hop=W*2; const chroma=new Float64Array(12);
  const re=new Float64Array(W), im=new Float64Array(W), win=new Float64Array(W);
  for(let i=0;i<W;i++) win[i]=0.5-0.5*Math.cos(2*Math.PI*i/(W-1));
  for(let s0=0;s0+W<ch.length;s0+=hop){ for(let i=0;i<W;i++){re[i]=ch[s0+i]*win[i];im[i]=0;} fft(re,im);
    for(let k=1;k<W/2;k++){ const f=k*sr/W; if(f<80||f>2000)continue; const mag=Math.sqrt(re[k]*re[k]+im[k]*im[k]);
      const pc=((Math.round(12*Math.log2(f/440))%12)+12)%12; chroma[pc]+=mag; } }
  let sum=0; for(let i=0;i<12;i++)sum+=chroma[i]; if(sum>0)for(let i=0;i<12;i++)chroma[i]/=sum;
  let bMaj=-2,bMin=-2; for(let r=0;r<12;r++){ const rot=Array.from({length:12},(_,i)=>chroma[(i+r)%12]);
    bMaj=Math.max(bMaj,corr(rot,KMAJ)); bMin=Math.max(bMin,corr(rot,KMIN)); }
  return clamp((bMaj-bMin)*3.2,-1,1);
}
function arc(totN,fps){
  const n=totN.length, W=Math.round(fps*0.6), nov=new Float32Array(n);
  for(let i=W;i<n;i++)nov[i]=Math.abs(totN[i]-totN[i-W]);
  const nv=SMOOTH(nov,Math.round(fps*0.4)); let mean=0;for(let i=0;i<n;i++)mean+=nv[i];mean/=n;
  let v=0;for(let i=0;i<n;i++)v+=(nv[i]-mean)**2;const sd=Math.sqrt(v/n);
  const thr=mean+0.7*sd, gap=Math.round(fps*5), b=[0];let last=0;
  for(let i=1;i<n-1;i++){if(nv[i]>thr&&nv[i]>=nv[i-1]&&nv[i]>nv[i+1]&&i-last>=gap){b.push(i);last=i;}} b.push(n);
  const segs=[]; for(let k=0;k<b.length-1;k++){const s=b[k],e=b[k+1];let m=0,c=0;for(let i=s;i<e;i++){m+=totN[i];c++;}segs.push({start:s/fps,end:e/fps,energy:+(m/(c||1)).toFixed(3)});}
  return segs;
}
function analyze(ab){
  const ch=mixMono(ab), sr=ab.sampleRate, fps=20;
  const bf=bandFeat(ch,sr,fps), od=onsets(ch,sr), segs=arc(bf.totN,fps);
  const ms=modeScore(ch,sr), loud=clamp(bf.rawRMS*9,0,1), dens=od.density, brN=bf.brightness;
  const arousal=clamp((0.6*loud + 0.4*dens - 0.45)*2.2, 0, 1);
  const valence=clamp(ms*2.0 + (brN-0.16)*2.0, -1, 1);
  return {valence:+valence.toFixed(2), arousal:+arousal.toFixed(2), brightness:+brN.toFixed(2), mode:+ms.toFixed(2), dur:ab.duration, segs, src:'本机'};
}

/* ================= VA → 花园风格（复用） ================= */
function styleFor(va){
  const V=va.valence, A=va.arousal, pos=(V+1)/2;
  const warmH=[42,28,12,340,310,52], coolH=[210,232,262,284,196];
  const sat=clamp(22+pos*42, 18, 70), light=clamp(48+pos*16, 46, 70);   // 收一收：低饱和、偏柔
  const open=clamp(0.2+pos*0.9,0.08,1), droop=clamp((0.5-V)*1.2,0,1);
  const pL=lerp(60,93,pos), pH=(pos>0.5? lerp(48,44,pos):lerp(214,206,1-pos)), pS=(pos>0.5? lerp(22,34,pos):lerp(10,18,pos));
  const grH=(pos>0.5? lerp(95,78,pos):165), grS=(pos>0.5?lerp(26,38,pos):12);
  return { V,A,pos, warmH,coolH,sat,light,open,droop,
    skyTop:`hsl(${pH} ${pS}% ${clamp(pL+4,0,97)}%)`, skyBot:`hsl(${pH} ${clamp(pS+6,0,60)}% ${clamp(pL-7,0,95)}%)`,
    sunny: clamp((pos-0.3)*1.5,0,1),
    groundTop:`hsla(${grH},${grS}%,${clamp(pL-16,18,58)}%,0.45)`, groundBot:`hsla(${grH},${grS}%,${clamp(pL-30,10,44)}%,0.7)`,
    density: Math.round(lerp(5,13,A)), height: lerp(0.15,0.33,A), sway:A,
    petalFly: V>0?A:0, fall:(V<0?A:0) };
}
// ===== 发现游戏：情绪指纹 + 一点随机 → 不同「品种」(明显不同、出乎意料) =====
const hsh2=(a,b)=>{const x=Math.sin(a*127.1+b*311.7)*43758.5;return x-Math.floor(x);};
const ARCH_NOUN={daisy:'雏菊',spike:'风铃草',bell:'铃兰',orb:'蒲公英',thorn:'蓟花',burst:'焰火花',weep:'垂泪兰',frond:'羽蕨'};
function pickArch(V,A,seed){ const pos=(V+1)/2; let w;
  if(pos>=0.5&&A>=0.55) w={daisy:3,burst:3,spike:2,bell:1,orb:1};
  else if(pos>=0.5)     w={daisy:2,frond:2,bell:2,orb:2,spike:1};
  else if(A>=0.55)      w={thorn:3,burst:2,spike:2,weep:1};
  else                  w={weep:3,bell:2,frond:2,orb:1,thorn:1};
  const ks=Object.keys(w); let tot=0; ks.forEach(k=>tot+=w[k]); let r=hsh(seed*9.71+3.3)*tot;
  for(const k of ks){ r-=w[k]; if(r<=0)return k; } return ks[0]; }
function plantName(V,A,arch,rare){ const pos=(V+1)/2;
  const adj=pos>=0.5?(A>=0.55?['灿烂','明媚','欢腾','跃动']:['温柔','恬静','和煦','软糯']):(A>=0.55?['凛冽','躁动','暗涌','锋利']:['忧郁','清冷','寂寥','薄暮']);
  return (rare?'✨':'')+adj[(hsh2(V,A)*adj.length)|0]+ARCH_NOUN[arch]+(rare?'·珍品':''); }
// 一株：会摇的茎 + 叶 + 按品种 arch 长出的花头；高度 hFrac（绘制时硬封顶）
function plantSpec(st,rng,xrel,arch){
  const pos=st.pos, fh=(pos>=0.5? st.warmH : st.coolH), hue=fh[(rng()*fh.length)|0]+(rng()*14-7), A=st.A;
  const hMul={daisy:1,spike:1,bell:0.95,orb:0.72,thorn:0.95,burst:1.05,weep:1.05,frond:0.82}[arch]||1;
  const leafMul={frond:2.8,daisy:0.7,orb:0.45,burst:0.55,thorn:0.5,weep:0.7}[arch]||1;
  return { arch, xrel, depth:0.85, phase:rng()*7, hFrac:clamp(lerp(0.42,0.9,A)*hMul*(0.85+rng()*0.3),0.2,1), bend:(rng()*2-1), leafMul,
    width:lerp(2,5.5,A)*0.9,
    flowerR:lerp(9,18,A)*(0.85+rng()*0.4)*(arch==='daisy'?1.5:arch==='burst'?1.3:arch==='orb'?1.4:1),
    petals: arch==='daisy'?(13+((rng()*6)|0)) : arch==='bell'?5 : 6,
    open:clamp(st.open+(rng()*0.16-0.08),0.05,1), droop:clamp(st.droop+((arch==='bell'||arch==='weep')?0.45:0),0,1),
    nflowers: arch==='daisy'?1 : arch==='spike'?(5+((A*5+rng()*2)|0)) : arch==='bell'?(3+((rng()*2)|0)) : arch==='weep'?(4+((rng()*3)|0)) : arch==='thorn'?(3+((A*3+rng())|0)) : 1,
    hue, sat:clamp(st.sat*(0.9+rng()*0.2),12,95), light:st.light,
    stemH: pos>=0.5? lerp(120,95,pos):145, stemS: pos>=0.5? lerp(22,46,pos):14, stemL: pos>=0.5? lerp(30,40,pos):26,
    g:0, grown:false, rare:false, name:'' };
}

/* ================= 渲染 ================= */
const cv=$('#garden'), g=cv.getContext('2d'); let W=2,H=2,DPR=1;
function resize(){ DPR=Math.min(devicePixelRatio||1,2); W=innerWidth;H=innerHeight; cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px'; g.setTransform(DPR,0,0,DPR,0,0); }
addEventListener('resize',resize); resize();

let G_SWAY=0.25, G_PULSE=0, G_WIND=0; // 整园共享的「此刻在听的音乐」律动量
// 天气系统：当前歌的情绪决定天气，整座园所有植物都跟着动
let G_DROOP=0, G_LADD=0;              // 雨→垂、阴↔晴→暗/亮（加到亮度）
let WX={wind:0.2,rain:0,bright:1,cloud:0,gust:0};
let clouds=[], rain=[];
if(!clouds.length) for(let i=0;i<6;i++) clouds.push({x:Math.random()*1600,y:0.1+Math.random()*0.3,r:80+Math.random()*180,sp:0.3+Math.random()*0.6});
function drawSky(x,y,w,h,st,glow){

function drawRain(){ if(WX.rain<0.05)return; const n=Math.round(WX.rain*WX.rain*240), slant=5+G_SWAY*20, off=G_WIND*( -700-WX.rain*900 );

function drawBackdrop(gy,st){

const hsh=a=>{const x=Math.sin(a*12.9898)*43758.5453;return x-Math.floor(x);}; // 0..1 稳定噪声

// 叶子：渐变+半透明+叶脉+微变化（破对称）

// 一株：从地面往上一根会摇的茎（按 availH 封顶，绝不长出浏览器），沿茎叶子 + 几朵同款花
function drawPlant(p,gy){
  // 硬封顶：顶部留边 + 花预留；茎的每个点都 clamp，绝不长出浏览器（任何尺寸）
  const minTop=Math.max(56, H*0.10), reserve=H*0.04+22;
  const availH=Math.max(20, gy-minTop-reserve);
  const H0=availH*clamp(p.hFrac,0.2,1)*p.g; if(H0<=2)return;
  const baseX=p.xrel*W, SEG=16; let px=baseX,py=gy,ang=-Math.PI/2; const pts=[];
  for(let i=0;i<SEG;i++){ const f=i/SEG, seglen=H0/SEG;
    const sway=Math.sin(G_WIND*1.05+p.phase+f*2.2)*(0.02+G_SWAY*0.13)*f;     // 越上越摇 = 风/舞动
    const scurve=Math.sin(f*Math.PI*1.3+p.bend*2)*0.05*p.bend;               // 自然 S 弯（破直插）
    ang += sway + scurve + p.bend*0.009 + G_DROOP*0.05*f;                     // 风/雨 → 倾斜/下垂
    const lim=0.5+G_DROOP*0.55; ang=clamp(ang, -Math.PI/2-lim, -Math.PI/2+lim); // 弯折上限：优雅倾斜不折断

    // 茎：渐变（下深上浅）+ 渐细 + 梢半透明 + 天气明暗
    g.beginPath(); g.moveTo(px,py); g.lineTo(nx,ny);
    g.lineWidth=Math.max(0.7,lerp(p.width,p.width*0.22,f)); g.strokeStyle=`hsla(${p.stemH},${p.stemS}%,${clamp(lerp(p.stemL,p.stemL+14,f)+G_LADD,0,100)}%,${lerp(1,0.5,f)})`; g.lineCap='round'; g.stroke();
    pts.push({x:nx,y:ny,ang,f}); px=nx;py=ny; }

  for(let i=2;i<pts.length-1;i+=leafStep){ const q=pts[i]; la+=2.39996; const side=Math.sin(la)>=0?1:-1;

    if(p.arch==='frond') drawLeaf(q.x,q.y, q.ang-side*(0.85+hsh(i*2+p.phase)*0.5), (H0*0.07+6)*(1-q.f*0.5)*lm, p); }
  drawHead(p,pts,minTop);   // 按品种长出花头（明显不同）
  if(p.rare && p.g>0.4){ const top=pts[pts.length-1], R=p.flowerR*3.2;   // 稀有：金色光环 + 闪粒
    const ag=g.createRadialGradient(top.x,top.y,0,top.x,top.y,R); ag.addColorStop(0,`hsla(48,100%,82%,${0.16*p.g})`); ag.addColorStop(1,'hsla(48,100%,82%,0)'); g.fillStyle=ag; g.beginPath();g.arc(top.x,top.y,R,0,7);g.fill();
    for(let s=0;s<5;s++){ const a=G_WIND*1.5+s*1.3, rr=p.flowerR*(1.7+Math.sin(G_WIND*2+s)*0.4); g.fillStyle='hsla(50,100%,90%,0.7)'; g.beginPath();g.arc(top.x+Math.cos(a)*rr,top.y+Math.sin(a)*rr,1.8,0,7);g.fill(); } }
}
function drawHead(p,pts,minTop){
  const top=pts[pts.length-1], g0=p.g, A=p.arch, fy=t=>Math.max(t.y,minTop+p.flowerR*1.3);

function drawFlower(x,y,ang,p,bloom){

// 蓟（冷+猛=尖锐带刺）
function drawThorn(x,y,ang,p,bloom){ if(bloom<=0)return; const r=p.flowerR*bloom*(1+G_PULSE*0.16), n=7, l=clamp(p.light+G_LADD-6,0,100);

/* ================= 花园（一个生命体）+ 累积 ================= */
const GARDEN={ plants:[], songs:[] };  // songs: 已种过的 {id,va,st}
let skyH=255,skyState=null;            // 当前天空（平滑过渡）
function blendStyle(){ const ss=GARDEN.songs; if(!ss.length)return styleFor({valence:0,arousal:0.3}); if(ss.length===1)return ss[0].st;
  let V=0,A=0; ss.forEach(s=>{V+=s.va.valence;A+=s.va.arousal;}); return styleFor({valence:V/ss.length,arousal:A/ss.length}); }
// 一首歌 = 一株（累积成一排）
const XSLOTS=[0.5,0.3,0.7,0.17,0.83,0.42,0.6,0.25,0.75];
function plantSong(va,opts){ opts=opts||{}; const idx=GARDEN.plants.length, st=styleFor(va);
  const seed=(opts.seed!=null? opts.seed : ((va.valence+2)*9301+va.arousal*4999+idx*131));
  const rng=mulberry(seed|0);
  const xrel=clamp((XSLOTS[idx%XSLOTS.length]||0.5)+(rng()*0.06-0.03),0.07,0.93);
  const arch=pickArch(va.valence,va.arousal, seed+idx*97.13), rare=hsh(seed*3.7+9.1)<0.14;
  const p=plantSpec(st,rng,xrel,arch); p.rare=rare; p.dur=va.dur||60; p.name=plantName(va.valence,va.arousal,arch,rare);
  GARDEN.plants.push(p); return {st,plant:p,arch,rare,name:p.name};
}

let actx=null,master=null,analyser=null,freq=null,td=null,src=null,startT=0,playing=false,curId=null,curVA=null,curSt=null,curPlants=null;

function songTime(){ return playing&&actx? (actx.currentTime-startT):(curVA?lastT:0); }
let lastT=0;
function stop(){ playing=false; if(src){try{src.stop();}catch(e){}try{src.disconnect();}catch(e){}src=null;} const pb=$('#play'); if(pb)pb.textContent='▶'; }
async function playSong(song){
  stop(); ac(); if(actx.state==='suspended')await actx.resume();
  const a=AN[song.id]||await getAnalysis(song); curVA=a.va; curId=song.id; curSt=styleFor(a.va);
  // 第一次放这首 → 种下它的植株（随播放实时长）
  if(!GARDEN.songs.find(s=>s.id===song.id)){ const r=plantSong(a.va); GARDEN.songs.push({id:song.id,va:a.va,st:r.st}); curPlants=r.plants; }
  else { curPlants=GARDEN.plants.filter(p=>p._sid===song.id); }
  // 标记这批属于该歌
  GARDEN.plants.forEach(p=>{ if(p._sid===undefined && curPlants&&curPlants.includes(p)) p._sid=song.id; });
  src=actx.createBufferSource(); src.buffer=a.buf; src.connect(master); lastT=lastT&&lastT<a.va.dur?lastT:0; startT=actx.currentTime-lastT; src.start(actx.currentTime, lastT%a.va.dur); playing=true; const pb=$('#play'); if(pb)pb.textContent='⏸';
  markChips();
}

/* ================= 发现游戏：扔歌 → 期待·揭晓 → 收藏 ================= */
let REVEAL=null;
function gyNow(){ return H*0.84; }
async function feedSong(song){ try{
  stop(); ac(); if(actx.state==='suspended')await actx.resume();
  $('#status').textContent='聆听「'+song.name+'」，看它长出什么…';
  const a=AN[song.id]||await getAnalysis(song); curVA=a.va; curId=song.id; curSt=styleFor(a.va);
  const r=plantSong(a.va, song.rndSeed!=null?{seed:song.rndSeed}:{}); r.plant._sid=curId; r.plant.g=0; r.plant.grown=false;
  GARDEN.songs.push({id:song.id+'#'+GARDEN.plants.length,va:a.va,st:r.st});
  REVEAL={p:r.plant, t:0, phase:'listen', name:r.name, rare:r.rare, x:r.plant.xrel*W, burst:0};
  showCard(false);
  src=actx.createBufferSource(); src.buffer=a.buf; src.connect(master); startT=actx.currentTime; lastT=0; src.start(); playing=true;
  updateCount(); markChips();
}catch(e){ $('#status').textContent='出错：'+((e&&e.message)||e); } }
function sparkBurst(x,y){ for(let i=0;i<28;i++){ const ang=Math.random()*Math.PI*2, sp=rnd(50,180); petals.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-50,r:rnd(1.5,3.6),hue:48,sat:95,rot:0,spin:0,sw:0,kind:'spark',life:0,max:rnd(0.7,1.2)}); } }
function advanceReveal(dt){ if(!REVEAL)return; REVEAL.t+=dt; const T=REVEAL.t, p=REVEAL.p;
  if(T<1.4){ REVEAL.phase='listen'; p.g=0.001; }
  else if(T<2.9){ REVEAL.phase='grow'; if(!REVEAL.burst){ REVEAL.burst=1; sparkBurst(REVEAL.x, gyNow()-H*0.32); } p.g=ease(clamp((T-1.4)/1.5,0,1)); }
  else if(T<5.4){ REVEAL.phase='card'; p.g=1; p.grown=true; if(!REVEAL.shown){REVEAL.shown=1; showCard(true); $('#status').textContent='🌱 收进你的花园 · 再扔一首？';} }
  else { p.g=1; p.grown=true; showCard(false); REVEAL=null; } }
function drawReveal(){ if(!REVEAL)return; const x=REVEAL.x, gy=gyNow();
  if(REVEAL.phase==='listen'){ const pr=clamp(REVEAL.t/1.4,0,1);
    g.fillStyle=`rgba(6,6,12,${0.22*Math.sin(pr*Math.PI)})`; g.fillRect(0,0,W,H);
    const sy=lerp(-20, gy-12, ease(pr)); const sg=g.createRadialGradient(x,sy,0,x,sy,34); sg.addColorStop(0,'hsla(48,100%,88%,0.95)'); sg.addColorStop(1,'hsla(48,100%,80%,0)'); g.fillStyle=sg; g.beginPath();g.arc(x,sy,34,0,7);g.fill();
    g.fillStyle='hsla(50,100%,93%,0.95)'; g.beginPath();g.arc(x,sy,3.6,0,7);g.fill();
    const ggl=g.createRadialGradient(x,gy,0,x,gy,60+50*pr); ggl.addColorStop(0,`hsla(48,90%,80%,${0.32*pr})`); ggl.addColorStop(1,'hsla(48,90%,80%,0)'); g.fillStyle=ggl; g.beginPath();g.arc(x,gy,60+50*pr,0,7);g.fill();
  } else if(REVEAL.phase==='grow' && REVEAL.t<1.68){ const fl=clamp(1-(REVEAL.t-1.4)/0.28,0,1); g.fillStyle=`rgba(255,250,235,${0.4*fl})`; g.fillRect(0,0,W,H); }
}
function showCard(show){ const el=$('#card'); if(!el)return; if(show&&REVEAL){ el.innerHTML='<div class="ct">🌱 你发现了</div><div class="cn'+(REVEAL.rare?' rare':'')+'">'+REVEAL.name+'</div><div class="cs">'+(REVEAL.rare?'✨ 稀有品种':'新品种')+' · 已收进花园</div>'; el.classList.add('on'); } else el.classList.remove('on'); }
function updateCount(){ const n=GARDEN.plants.length, m=GARDEN.plants.filter(p=>p.rare).length; const el=$('#count'); if(el)el.textContent='🌿 已发现 '+n+' 株'+(m?' · ✨'+m+' 稀有':''); }

/* ================= 主循环 ================= */
let prev=performance.now();
function loop(){
  const now=performance.now(), dt=Math.min(0.05,(now-prev)/1000); prev=now;
  // 听歌：实时律动量
  if(playing){ const e=liveEnergy(); LIVE=lerp(LIVE,clamp(e*2.2,0,1),0.35);
    if(e-prevE>0.018){ beatHold=Math.max(beatHold,clamp((e-prevE)*11,0,1)); } prevE=e; }
  else { LIVE*=0.94; }
  beatHold*=0.88; G_PULSE=beatHold;
  // ===== 天气：当前歌（停了用累积均值）的 VA → 天气量，整座园共享 =====
  let V=0,A=0.3; if(playing&&curVA){V=curVA.valence;A=curVA.arousal;} else if(GARDEN.songs.length){let sv=0,sa=0;GARDEN.songs.forEach(s=>{sv+=s.va.valence;sa+=s.va.arousal;});V=sv/GARDEN.songs.length;A=sa/GARDEN.songs.length;}
  WX.gust=WX.gust*0.95 + (Math.random()<0.025? Math.random()*(0.25+A*0.8):0);          // 阵风
  const windT=0.12 + A*0.55 + LIVE*0.8 + WX.gust, rainT=clamp((0.15-V)*1.5,0,1)*(0.4+A*0.6), brightT=clamp((V+0.45)*0.95,0.25,1.25), cloudT=clamp(0.1-V,0,1);
  WX.wind=lerp(WX.wind,windT,0.06); WX.rain=lerp(WX.rain,rainT,0.035); WX.bright=lerp(WX.bright,brightT,0.035); WX.cloud=lerp(WX.cloud,cloudT,0.03);
  G_SWAY=WX.wind; G_DROOP=WX.rain*0.7; G_LADD=(WX.bright-1)*16; G_WIND+=dt*(0.7+WX.wind*1.3);
  $('#wx').textContent=(playing||GARDEN.songs.length)?('天气 '+weatherName()):'';
  // 生长：由「揭晓瞬间」驱动（期待→长出→报名），不再随整首慢长
  if(playing&&curVA){ lastT=songTime()%curVA.dur; }
  advanceReveal(dt);
  // 天空：放歌时偏向当前歌情绪，否则用累积混合
  const target=playing&&curSt?curSt:blendStyle();
  if(!skyState)skyState=target; skyState=target; // 直接用（styleFor 便宜）；色相用 skyH 平滑
  // 画
  g.clearRect(0,0,W,H);
  if(!GARDEN.plants.length){ g.fillStyle='#0a0a14'; g.fillRect(0,0,W,H); g.fillStyle='rgba(255,255,255,.32)'; g.font='600 17px -apple-system,sans-serif'; g.textAlign='center'; g.fillText('扔一首歌进来 🎵 看它长出什么',W/2,H/2); }
  else { drawSky(0,0,W,H,target,LIVE); const gy=drawGround(0,0,W,H,target); drawBackdrop(gy,target);
    const list=GARDEN.plants.slice().sort((a,b)=>a.depth-b.depth);
    for(const p of list){ if(p.g<=0)continue;
      p.stemCol=`hsl(${p.stemH} ${p.stemS}% ${p.stemL}%)`; p.leafCol=`hsl(${p.stemH} ${p.stemS*0.9}% ${p.stemL+10}%)`;
      p.flowerCol=`hsl(${(p.hue+360)%360} ${p.sat}% ${p.light}%)`; p.centerCol=`hsl(${(p.hue+30)%360} ${clamp(p.sat+10,0,100)}% ${clamp(p.light+18,0,92)}%)`;
      g.globalAlpha=lerp(0.5,1,p.depth); drawPlant(p,gy); g.globalAlpha=1; }
    stepParticles(dt,target); drawParticles(); drawRain(); drawReveal();
  }
  // seek/time
  if(curVA){ $('#seek i').style.width=(lastT/curVA.dur*100)+'%'; $('#time').textContent=fmt(lastT)+'/'+fmt(curVA.dur); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
cv.addEventListener('click',()=>document.body.classList.toggle('clean'));

/* 飞瓣 / 落雨（跟当前律动） */
let petals=[];
function stepParticles(dt,st){
  if(playing){
    // 落叶（常有，能量越高越多）
    if(petals.length<130 && Math.random()<(0.13+LIVE*0.5)*(1-WX.rain*0.8)){ const lh=[100,80,55,38][(Math.random()*4)|0];
      petals.push({x:rnd(0,W),y:-14,vx:rnd(-16,16),vy:rnd(16,40),r:rnd(6,12),hue:lh,sat:rnd(35,55),rot:rnd(0,7),spin:rnd(-1.4,1.4),sw:rnd(0.5,1.3),kind:'leaf'}); }
    // 花瓣（暖歌额外飘，呼应「开花」）
    if(st.petalFly>0.25 && petals.length<170 && Math.random()<st.petalFly*0.35) petals.push({x:rnd(0,W),y:-10,vx:rnd(-10,16),vy:rnd(20,46),r:rnd(3,6),hue:st.warmH[(Math.random()*st.warmH.length)|0],sat:80,rot:rnd(0,7),spin:rnd(-2,2),sw:1,kind:'petal'});
  }
  for(let i=petals.length-1;i>=0;i--){ const p=petals[i]; p.vy+=(p.kind==='spark'?20:6)*dt; p.x+=p.vx*dt+Math.sin(G_WIND*1.6+p.rot)*p.sw; p.y+=p.vy*dt; p.rot+=p.spin*dt;
    if(p.kind==='spark'){ p.life+=dt; if(p.life>=p.max){petals.splice(i,1);} continue; }
    if(p.y>H+22)petals.splice(i,1); }
}
function drawParticles(){ for(const p of petals){ g.save(); g.translate(p.x,p.y); g.rotate(p.rot);
  if(p.kind==='spark'){ const a=clamp(1-p.life/p.max,0,1); const gr=g.createRadialGradient(0,0,0,0,0,p.r*2.2); gr.addColorStop(0,`hsla(50,100%,86%,${a})`); gr.addColorStop(1,'hsla(48,100%,80%,0)'); g.fillStyle=gr; g.beginPath();g.arc(0,0,p.r*2.2,0,7);g.fill(); }
  else if(p.kind==='leaf'){ g.fillStyle=`hsla(${p.hue},${p.sat}%,48%,.85)`; g.beginPath(); g.ellipse(0,0,p.r,p.r*0.42,0,0,7); g.fill(); g.strokeStyle=`hsla(${p.hue},${p.sat}%,30%,.5)`; g.lineWidth=0.6; g.beginPath(); g.moveTo(-p.r,0); g.lineTo(p.r,0); g.stroke(); }
  else { g.fillStyle=`hsla(${p.hue},82%,70%,.85)`; g.beginPath(); g.ellipse(0,0,p.r,p.r*0.5,0,0,7); g.fill(); }
  g.restore(); } }

/* ================= 载入 + 分析 ================= */
async function getAnalysis(song){ if(AN[song.id])return AN[song.id];
  $('#status').textContent='分析「'+song.name+'」…'; const ab=await fetch(song.url).then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.arrayBuffer();});
  const buf=await ac().decodeAudioData(ab); const va=analyze(buf); if(song.va){va.valence=song.va.valence;va.arousal=song.va.arousal;va.src='设定';} AN[song.id]={va,buf}; return AN[song.id]; }
function vaText(va){ const m=va.valence>0.15?'正向(暖)':va.valence<-0.15?'负向(冷)':'中性'; const e=va.arousal>0.6?'高能量(猛)':va.arousal<0.35?'低能量(缓)':'中等'; return `<b>${m} · ${e}</b>（${va.src}）<br>valence ${va.valence} · arousal ${va.arousal}`; }

/* ================= UI ================= */
function markChips(){ document.querySelectorAll('#chips .chip').forEach(b=>{ b.classList.toggle('sel',b.dataset.id===selId); }); }
function renderChips(){ const c=$('#chips'); c.innerHTML=''; SONGS.forEach(s=>{ const b=document.createElement('button'); b.className='chip'; b.dataset.id=s.id; b.textContent=s.name; b.onclick=()=>{ selId=s.id; feedSong(s); }; c.appendChild(b); }); markChips(); }
$('#rnd').onclick=()=>{ const pool=SONGS.filter(s=>s.url); if(!pool.length)return; const s=pool[(Math.random()*pool.length)|0]; feedSong({...s, rndSeed:Math.random()*1e6}); };
$('#clear').onclick=()=>{ stop(); GARDEN.plants=[];GARDEN.songs=[];petals=[];REVEAL=null;curId=null;curVA=null;lastT=0; showCard(false); updateCount(); $('#status').textContent='花园已清空 · 扔一首歌开始'; };
$('#file').onchange=async e=>{ const f=e.target.files[0]; if(!f)return; try{ const ab=await f.arrayBuffer(); const buf=await ac().decodeAudioData(ab.slice(0)); const va=analyze(buf); const id='up:'+f.name+Math.random().toString(36).slice(2,6); AN[id]={va,buf}; const song={id,name:'我的:'+f.name.slice(0,8),url:''}; SONGS.push(song); renderChips(); feedSong(song); }catch(err){ $('#status').textContent='解码失败：'+((err&&err.message)||err); } };
const _pb=$('#play'); if(_pb)_pb.onclick=()=>{ const s=SONGS.find(x=>x.id===selId)||SONGS[0]; feedSong(s); };

/* ================= Gemini：更准地读情绪 ================= */
const GEMINI_MODELS=['gemini-2.5-flash','gemini-1.5-flash','gemini-2.5-flash-lite'];
const SCHEMA={type:'OBJECT',properties:{valence:{type:'NUMBER'},arousal:{type:'NUMBER'},mood:{type:'STRING'},summary:{type:'STRING'}},required:['valence','arousal','mood','summary']};
const PROMPT='完整听这首歌，判断它的整体情绪，输出 JSON：valence(-1~1，-1=很悲伤/阴暗，1=很欢快/明亮)；arousal(0~1，0=很平静舒缓，1=很激昂猛烈)；mood(暖/冷 + 一个情绪词，如 暖·欢快 / 冷·忧伤)；summary(一句话这首歌的情绪，≤16字)。只输出 JSON。';
function u8b64(u8){let s='';const C=0x8000;for(let i=0;i<u8.length;i+=C)s+=String.fromCharCode.apply(null,u8.subarray(i,i+C));return btoa(s);}
$('#aiBtn').onclick=async()=>{ const song=SONGS.find(s=>s.id===selId); if(!song){$('#status').textContent='先选一首';return;}
  let key=$('#key').value.trim()||localStorage.getItem('gk')||''; if(!key){$('#status').textContent='👉 先填 Gemini key（AIza…）';$('#key').focus();return;} localStorage.setItem('gk',key);
  let bytes,mime='audio/mpeg'; if(song.url){ const ab=await fetch(song.url).then(r=>r.arrayBuffer()); bytes=new Uint8Array(ab);} else { $('#status').textContent='上传曲暂用本机情绪'; return; }
  const body={contents:[{parts:[{inline_data:{mime_type:mime,data:u8b64(bytes)}},{text:PROMPT}]}],generationConfig:{temperature:0.4,responseMimeType:'application/json',responseSchema:SCHEMA}};
  for(const m of GEMINI_MODELS){ $('#status').textContent='AI 在听「'+song.name+'」…('+m+')';
    try{ const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/'+m+':generateContent?key='+encodeURIComponent(key),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      const j=await r.json().catch(()=>({})); if(r.ok){ const txt=((j.candidates&&j.candidates[0]&&j.candidates[0].content&&j.candidates[0].content.parts)||[]).map(p=>p.text||'').join(''); let d=null; try{d=JSON.parse(txt);}catch(e){try{d=JSON.parse(txt.slice(txt.indexOf('{'),txt.lastIndexOf('}')+1));}catch(e2){}}
        if(d){ const a=AN[song.id]; a.va.valence=clamp(+d.valence,-1,1); a.va.arousal=clamp(+d.arousal,0,1); a.va.mood=d.mood; a.va.src='AI'; $('#vatag').innerHTML=vaText(a.va)+'<br>'+(d.summary||''); $('#status').textContent='✓ AI 读懂「'+song.name+'」('+d.mood+') · ▶ 放出来看它长'; return; } }
      var lastErr=(j.error&&j.error.message)||('HTTP '+r.status); if(!/quota|exceed|not found|NOT_FOUND|unsupported|limit|404/i.test(lastErr))break;
    }catch(e){ var lastErr=String(e); break; } }
  $('#status').textContent='AI 出错：'+(lastErr||'');
};

/* ================= 自测钩子 ================= */
window.__va=async()=>{ const o={}; for(const s of SONGS.filter(s=>s.url)){ o[s.id]=(await getAnalysis(s)).va; } return o; };
window.__state=()=>({playing,curId,songT:+lastT.toFixed(1),LIVE:+LIVE.toFixed(2),plants:GARDEN.plants.length,grown:GARDEN.plants.filter(p=>p.grown).length,songs:GARDEN.songs.map(s=>s.id),wx:{wind:+WX.wind.toFixed(2),rain:+WX.rain.toFixed(2),bright:+WX.bright.toFixed(2),cloud:+WX.cloud.toFixed(2)},weather:weatherName()});
window.__setT=t=>{ lastT=t; if(playing&&curId){ const s=SONGS.find(x=>x.id===curId); stop(); playSong(s);} };
renderChips(); updateCount();
$('#status').textContent='扔一首歌进来 🎵 看它长出什么品种';
</script>
